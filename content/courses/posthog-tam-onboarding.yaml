    name: PostHog CDP
    description: Data pipelines in PostHog — sources, transformations, and destinations.
    sectionExam:
      enabled: true
      passingScore: 0.75
      timeLimitMinutes: 8
      questionCount: 4
      blueprint:
        - conceptId: ph-cdp-overview
          minQuestions: 2
        - conceptId: ph-destinations-exports
          minQuestions: 2
      instructions: >-
        Show that you understand what PostHog CDP is for and where destinations and exports fit in a customer workflow.
  - id: querying

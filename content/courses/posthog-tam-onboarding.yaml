        - conceptId: hogql-basics
          minQuestions: 2
      instructions: >-
        This exam checks whether you can move from product questions to the right querying tool,
        especially when HogQL is the right fit.
concepts:
  - id: entities
    name: Entities — Things That Exist
    difficulty: 2
    estimatedMinutes: 10
    tags:
      - foundational
      - data-modeling
    prerequisites: []
    encompassing: []
    knowledgePoints:
      - id: what-is-an-entity
        instruction: >-
          An **entity** is anything you need to store information about in a system. Entities are the nouns — the people, places, things, and concepts that matter to your business.


          If you find yourself wanting to describe something with multiple facts (attributes), you are looking at an entity. A Customer is an entity because you want to track their name, email, and signup date. An Order is an entity because it has an order number, total, and status. A Product is an entity because it has a SKU, price, and description.


          Entities are not actions or verbs — those become relationships later.


          **The key test:** can you have more than one of this thing, and do you need to tell them apart? If yes, it is an entity.


          In a hospital system, Patient, Doctor, Appointment, and Medication are all entities. In a music streaming app, User, Song, Playlist, and Artist are entities.


          Recognizing entities is the first and most important step in data modeling because everything else — attributes, keys, relationships — hangs off of them.
        instructionContent:
          - type: callout
            title: Entity identification shortcut
            body: >-
              Ask three questions in order: can there be many of these, do we need to distinguish one from another, and do we track multiple facts about each one?
          - type: link
            url: https://www.lucidchart.com/pages/er-diagrams
            title: Visual ER diagram primer
            description: Use this when the learner needs a picture of how entities become boxes in a model.
        problems:
          - id: entities-p1
            type: multiple_choice
            question: Which of the following best describes an entity in data modeling?
            options:
              - A verb that describes an action in the system
              - A thing you need to store information about, like a Customer or Order
              - A single data value, like a name or email address
              - A rule that governs how data is validated
            correct: 1
            explanation: >-
              An entity is a noun — a thing you need to store information about. Customer, Order, and Product are classic examples. Verbs become relationships, single values become attributes, and
              rules become constraints.
          - id: entities-p2
            type: true_false
            question: In data modeling, an entity represents a single data value like a phone number or email address.
            correct: 'false'
            explanation: >-
              A single data value like a phone number is an attribute, not an entity. An entity is a thing (like a Customer) that has multiple attributes (name, phone number, email). Entities are the
              nouns; attributes are the facts about those nouns.
          - id: entities-p3
            type: scenario
            question: You are building a project management tool. Users create projects, add tasks to projects, and assign tasks to team members. Which of the following is NOT an entity in this system?
            options:
              - User
              - Project
              - Assigns (the act of assigning a task)
              - Task
            correct: 2
            explanation: >-
              'Assigns' is a verb describing the relationship between a User and a Task — it is a relationship, not an entity. User, Project, and Task are all nouns that you would store information
              about, making them entities.
      - id: identifying-entities
        instruction: >-
          The first step in any data modeling exercise is identifying entities. A reliable technique: read or write a plain-English description of the system and **circle the nouns**.


          In the sentence "Customers place orders for products," the nouns are Customer, Order, and Product — those are your candidate entities. Verbs like "place" and "for" hint at relationships you will define later.


          Not every noun becomes an entity. A good entity has three qualities: it has **multiple instances** (there are many customers, not just one), it needs to be **uniquely identified** (Customer 42 vs Customer 43), and it has **its own attributes** worth tracking.


          If a noun is really just a single attribute of another entity, it is not its own entity. For example, "color" is probably an attribute of Product, not a standalone entity — unless your system needs to track detailed information about each color (name, hex code, pantone number), in which case it might become one.
        workedExample: >-
          Consider an e-commerce system described as: 'Customers browse a catalog of products. They add items to a shopping cart and place orders. Each order contains one or more line items, and
          payments are processed for each order.' Step 1: Circle the nouns — Customer, Catalog, Product, Shopping Cart, Order, Line Item, Payment. Step 2: Evaluate each. Catalog is probably just the
          collection of products, not a separate entity. Shopping Cart might be an entity or might be a temporary state of an Order. The strong entities are: Customer, Product, Order, Line Item, and
          Payment. Each has multiple instances, needs unique identification, and has its own attributes.
        problems:
          - id: identifying-entities-p1
            type: multiple_choice
            question: In the sentence 'Students enroll in courses taught by professors,' how many entities can you identify?
            options:
              - 1 — only Student
              - 2 — Student and Course
              - 3 — Student, Course, and Professor
              - 4 — Student, Course, Professor, and Enroll
            correct: 2
            explanation: Student, Course, and Professor are the three entities (nouns that need to be tracked). 'Enroll' and 'taught by' are verbs describing relationships, not entities.
          - id: identifying-entities-p2
            type: multiple_choice
            question: The first step in data modeling is to identify entities by looking for the ___ in a system description.
            options:
              - nouns
              - verbs
              - numbers
              - dates
            correct: 0
            explanation: Entities are the nouns in your system — the people, places, things, and concepts you need to store information about. Verbs become relationships.
          - id: identifying-entities-p3
            type: scenario
            question: >-
              You read this product brief: 'Drivers deliver packages to customers. Each delivery has a timestamp and a signature.' A teammate says Delivery is not an entity because it started as a verb.
              How do you respond?
            options:
              - They are correct — 'deliver' is a verb, so Delivery cannot be an entity
              - Delivery has its own attributes (timestamp, signature) and multiple instances, so it qualifies as an entity
              - Delivery should be stored as an attribute on Package instead
              - Delivery is only a relationship and can never become an entity
            correct: 1
            explanation: >-
              The three-part test still applies. Delivery has multiple instances, needs unique identification, and has its own attributes (timestamp, signature). Some words that start as verbs evolve
              into entities once they accumulate their own facts. If you agreed with the teammate, revisit the entity identification shortcut.
    section: data-modeling-basics
  - id: attributes
    name: Attributes — Properties of Entities
    difficulty: 2
    estimatedMinutes: 14
    tags:
      - foundational
      - data-modeling
    prerequisites:
      - entities
    encompassing: []
    knowledgePoints:
      - id: what-are-attributes
        instruction: >-
          Attributes are the individual facts stored about one entity instance. A Customer might have first_name, email, and signup_date. An Order might have order_number, total_amount, and status.
          The first quality bar is atomicity: each attribute should hold one fact, not a bundled sentence. A field like 'name_and_address' is really several attributes hiding inside one column.
          Atomic attributes are easier to validate, filter, sort, and reuse in analysis.
        instructionContent:
          - type: callout
            title: Atomic first
            body: >-
              If you cannot answer "what single fact does this field store?" without saying "and", the field is probably too wide.
          - type: link
            url: https://www.postgresql.org/docs/current/datatype.html
            title: PostgreSQL data types overview
            description: Use this as a concrete reference for the kinds of atomic values attributes are usually meant to hold.
        problems:
          - id: attributes-p1
            type: multiple_choice
            question: Which of the following is the best set of attributes for a Product entity in an e-commerce system?
            options:
              - product_info (containing name, price, and description in one field)
              - sku, name, price, description, category, created_at
              - product, details, misc_data
              - name, order_id, customer_email
            correct: 1
            explanation: >-
              Good attributes are atomic (one fact each), descriptive, and belong to the entity. Option B has clear, atomic attributes that all describe a Product. Option A violates atomicity by
              combining values. Option C is too vague. Option D mixes in attributes from other entities (order_id, customer_email).
          - id: attributes-p2
            type: true_false
            question: An attribute called 'full_address' that stores '123 Main St, Springfield, IL 62704' follows good data modeling practice.
            correct: 'false'
            explanation: >-
              This violates the atomicity principle. A good data model would break this into separate attributes: street, city, state, and zip_code. Atomic attributes make it possible to query,
              filter, and sort by individual components (e.g., find all customers in Illinois).
          - id: attributes-p5
            type: scenario
            question: >-
              A teammate designs a Customer table with a field called 'contact_info' that stores 'jane@co.com | 555-1234 | San Francisco'. What feedback would you give?
            options:
              - This is efficient because it saves columns
              - The field violates atomicity — it should be split into email, phone, and city
              - Contact info is not an attribute at all
              - This is fine as long as the application parses it correctly
            correct: 1
            explanation: >-
              Bundling multiple facts into one field makes filtering, sorting, and validating each fact impossible at the database level. Split it into email, phone, and city so each attribute holds
              one fact. If you thought application parsing is good enough, consider what happens when someone queries 'find all customers in San Francisco' — a bundled field makes that painful.
      - id: attribute-boundaries
        instruction: >-
          After you list candidate attributes, ask two follow-up questions. First: does this field really belong to this entity? Second: is this still an attribute, or has it become its own entity or
          relationship? Repeated structured data often signals a missing relationship. If Order and Invoice both store customer_name, that fact probably belongs on Customer instead. Attribute design is
          really boundary design: one fact, owned by one entity, in the place where it can stay accurate over time.
        workedExample: >-
          Imagine a catalog where every Product row stores color_name, color_hex, and pantone_code. That works until the business wants one shared color catalog used across many products. At that
          point, Color is no longer just a label on Product. It has its own reusable structure, so Product should reference Color instead of duplicating those fields everywhere.
        instructionContent:
          - type: link
            url: https://www.postgresql.org/docs/current/tutorial-fk.html
            title: PostgreSQL foreign key tutorial
            description: Helpful once a learner sees that repeated attributes usually point to a missing reference entity.
        problems:
          - id: attributes-p3
            type: multiple_choice
            question: If you find the attribute 'customer_name' appearing on both the Order entity and the Invoice entity, what does this likely indicate?
            options:
              - This is good practice — data should be duplicated for safety
              - A missing relationship — both entities should reference the Customer entity instead
              - The Order and Invoice entities should be combined into one
              - customer_name should be removed from both entities
            correct: 1
            explanation: >-
              When the same attribute appears on multiple entities, it usually means there is a missing relationship. Both Order and Invoice should reference a Customer entity via a foreign key,
              rather than duplicating the customer's name.
          - id: attributes-p4
            type: scenario
            question: >-
              A merch store keeps color_name, color_hex, and pantone_code directly on every Product row. The team now wants one reusable color catalog shared across many products. What is the best next
              move?
            options:
              - Keep the color fields on Product and add more color columns as needed
              - Create a Color entity and reference it from Product
              - Combine the three fields into one text blob so the row stays shorter
              - Remove color entirely because attributes should never repeat
            correct: 1
            explanation: >-
              Once color has its own reusable structure, it has crossed the line from "simple attribute" into "reference entity." A Color entity keeps the shared facts in one place and lets Product
              point to them cleanly.
          - id: attributes-p6
            type: true_false
            question: If the same structured data (like color_name, color_hex) appears on multiple entities, it is always best to leave those fields duplicated on each entity.
            correct: 'false'
            explanation: >-
              Repeated structured data across entities usually signals a missing reference entity. When the same cluster of fields appears in multiple places, extract them into their own entity and
              reference it via foreign key. This avoids duplication and keeps updates consistent.
    section: data-modeling-basics
  - id: keys-and-identity
    name: Keys — Uniquely Identifying Things
    difficulty: 3
    estimatedMinutes: 18
    tags:
      - foundational
      - data-modeling
    prerequisites:
      - entities
      - attributes
    encompassing: []
    knowledgePoints:
      - id: primary-keys
        instruction: >-
          Every entity needs a primary key: the attribute, or combination of attributes, that uniquely identifies one instance. Customer 42 is different from Customer 43 because their keys are
          different. The first job of a primary key is identity inside the entity itself. A good primary key is unique, stable over time, and never null. If any of those fail, the entity becomes hard
          to trust because duplicates, broken references, or missing records start to appear.
        instructionContent:
          - type: callout
            title: Three tests for a primary key
            body: >-
              Ask three questions: can two rows share it, can it change later, and can it ever be missing? If the answer is yes to any of those, it is a weak primary key candidate.
          - type: link
            url: https://www.postgresql.org/docs/current/ddl-constraints.html#DDL-CONSTRAINTS-PRIMARY-KEYS
            title: PostgreSQL primary key reference
            description: A concrete reference for how databases enforce the uniqueness and non-null guarantees discussed here.
        workedExample: >-
          Imagine an Order table keyed by order_id. If order_id is unique, present on every row, and never reused, then each order stays distinguishable even when many orders have the same amount,
          date, or customer. That is what makes order_id a real identity field instead of just another attribute.
        problems:
          - id: keys-p1
            type: multiple_choice
            question: What is the primary purpose of a primary key in data modeling?
            options:
              - To store the most important attribute of an entity
              - To uniquely identify each instance of an entity
              - To encrypt sensitive data in the entity
              - To define the data type of each attribute
            correct: 1
            explanation: >-
              A primary key uniquely identifies each instance of an entity. It ensures no two records are the same and allows other entities to reference it. It is not about importance, encryption, or
              data types.
          - id: keys-p4
            type: multiple_choice
            question: Which combination best describes a strong primary key?
            options:
              - Easy to memorize, human-readable, and optional
              - Unique, stable over time, and never null
              - Long text, frequently updated, and visible to users
              - Derived from several changing business rules
            correct: 1
            explanation: >-
              If you were drawn to readability, you focused on convenience instead of identity quality. A strong primary key must stay unique, stable, and present even when business labels change.
          - id: keys-p7
            type: scenario
            question: >-
              A developer proposes using 'order_date' as the primary key for an Orders table because each order has a different date. On a busy day the system creates two orders at the exact same
              timestamp. What problem does this cause?
            options:
              - No problem — timestamps are always unique
              - The primary key constraint fails because two rows share the same value
              - The database automatically adds a suffix to make them unique
              - The second order overwrites the first
            correct: 1
            explanation: >-
              Timestamps are not guaranteed unique, especially under high throughput. A primary key must be unique for every row. If you assumed timestamps are always distinct, the mental model fix
              is to separate 'usually unique' from 'guaranteed unique.' Use a surrogate key instead.
      - id: foreign-keys-need-stable-targets
        instruction: >-
          Once an entity has a trustworthy primary key, other entities can point at it with foreign keys. That is how a model expresses connections such as "this Order belongs to Customer 42." This
          only works if the referenced key stays stable. If the target key changes, every relationship that points to it becomes harder to maintain. That is why key choice is not just a local table
          decision. It shapes whether the rest of the model can connect safely.
        instructionContent:
          - type: callout
            title: Identity spreads outward
            body: >-
              A weak key does not stay a local problem. The moment another table references it, that weakness becomes a relationship problem too.
          - type: link
            url: https://www.postgresql.org/docs/current/tutorial-fk.html
            title: PostgreSQL foreign key tutorial
            description: Useful reference for how foreign keys depend on stable primary keys.
        workedExample: >-
          Suppose Orders stores customer_id to show which customer placed each order. If customer_id is a stable surrogate key, every order can keep pointing to the right customer even if the
          customer's email or company name changes later.
        problems:
          - id: keys-p5
            type: scenario
            question: An Order row stores customer_id = 42. What role is customer_id playing inside the Order entity?
            options:
              - It is the Order's primary key
              - It is a foreign key pointing to the Customer entity
              - It is an optional display label
              - It is a session identifier
            correct: 1
            explanation: >-
              Inside Order, customer_id points to a Customer record, so it is a foreign key. If you chose "primary key," you mixed up "identifies this row" with "references another row."
          - id: keys-p6
            type: multiple_choice
            question: Why does key stability matter beyond the table where the key lives?
            options:
              - Stable keys make column names shorter
              - Other entities may reference that key, so changing it can break relationships
              - Stable keys automatically improve query speed
              - Only unstable keys can be indexed
            correct: 1
            explanation: >-
              Other entities depend on that key as a reference target. If you missed this, the misconception is treating key design as a local table concern instead of the backbone of relationships.
          - id: keys-p8
            type: true_false
            question: A foreign key can safely point to a primary key that is occasionally updated, as long as the updates are small.
            correct: 'false'
            explanation: >-
              Any change to a referenced primary key risks breaking every foreign key that points to it. Size of change does not matter — even a small edit creates a mismatch. Stability means no
              changes, not small changes.
      - id: choosing-key-types
        instruction: >-
          Once you know an entity needs a key, the next decision is what kind. Surrogate keys are system-generated IDs such as integers or UUIDs. Natural keys come from the business domain, like email
          or SKU. Composite keys combine multiple fields. Surrogate keys are usually the safest default because they stay stable even when business data changes. Natural and composite keys can still be
          useful, but only when their uniqueness and stability are truly dependable.
        workedExample: >-
          Suppose a User table uses email as its primary key. That feels convenient until someone changes their email address, or two employees share a team inbox. A surrogate user_id avoids that
          instability, while email can remain a normal attribute with its own unique constraint if the business needs it.
        instructionContent:
          - type: callout
            title: Safe default
            body: >-
              If the business field might change, let it be an attribute with a uniqueness rule and keep a surrogate ID as the true primary key.
        problems:
          - id: keys-p2
            type: multiple_choice
            question: A system-generated ID with no business meaning (like an auto-incrementing integer) is called what kind of key?
            options:
              - natural key
              - surrogate key
              - composite key
              - foreign key
            correct: 1
            explanation: >-
              A surrogate key is a system-generated identifier with no inherent business meaning. It is preferred over natural keys (like email or SSN) because surrogate keys are guaranteed to be
              stable and unique.
          - id: keys-p3
            type: true_false
            question: Using an email address as a primary key is always a good choice because every user has a unique email.
            correct: 'false'
            explanation: >-
              Email addresses can change and they are not guaranteed to map cleanly to one durable identity. If you answered true, the likely mistake is confusing "often unique right now" with
              "safe primary key for the life of the record." Surrogate keys are safer because they stay stable even when business data changes.
          - id: keys-p9
            type: scenario
            question: >-
              A Product table uses SKU as its primary key. The business decides to change the SKU format from '5-digit number' to 'prefix-5-digit' for all existing products. What risk does this create?
            options:
              - No risk — SKUs are just labels
              - Every table with a foreign key referencing Product.sku must also be updated, which is error-prone at scale
              - The database automatically cascades the change
              - Only new products are affected
            correct: 1
            explanation: >-
              Changing a natural key that is referenced as a foreign key in other tables requires coordinated updates everywhere. This is exactly why surrogate keys are the safer default — they never
              need to change when business labels evolve. Cascade rules can help but add complexity and risk.
    section: data-modeling-basics
  - id: relationships
    name: Relationships — How Entities Connect
    difficulty: 3
    estimatedMinutes: 12
    tags:
      - foundational
      - data-modeling
    prerequisites:
      - entities
      - keys-and-identity
    encompassing: []
    knowledgePoints:
      - id: what-are-relationships
        instruction: >-
          A **relationship** describes how two entities interact or connect. In the sentence "Customers place Orders," the verb "places" is the relationship between the Customer entity and the Order entity.


          Relationships are the verbs and prepositions in your system description. They have a direction (Customer places Order, not the reverse) and a name that describes the interaction.


          **Implementation:** relationships are implemented through foreign keys — an attribute on one entity that references the primary key of another. For example, the Order entity would have a customer_id attribute that points to the Customer entity's primary key.


          Without relationships, your entities would be isolated silos of data with no way to answer questions like "which customer placed this order?" or "what orders does this customer have?"
        instructionContent:
          - type: callout
            title: Read the arrow carefully
            body: >-
              The foreign key usually lives on the side that has many records. In Customer -> Order, the relationship is implemented by customer_id on Order.
          - type: link
            url: https://www.lucidchart.com/pages/er-diagrams
            title: Relationship and foreign-key visual guide
            description: Helpful when a learner needs to see one-to-many and many-to-many relationships drawn out.
        problems:
          - id: relationships-p1
            type: multiple_choice
            question: In data modeling, how are relationships between entities typically implemented?
            options:
              - By storing all related data in a single large table
              - By using foreign keys — an attribute on one entity that references the primary key of another
              - By duplicating data across multiple entities
              - By creating a separate configuration file
            correct: 1
            explanation: >-
              Relationships are implemented through foreign keys. A foreign key is an attribute on one entity (like customer_id on Order) that references the primary key of another entity (Customer).
              This creates a link between the two without duplicating data.
          - id: relationships-p2
            type: scenario
            question: >-
              You are designing a blog platform. Posts are written by Authors, and each Post can have many Comments. A junior developer suggests storing the author's name and email directly on every
              Post record instead of using a foreign key to an Author entity. What is the main problem with this approach?
            options:
              - It makes the Post table too wide
              - It creates data duplication — if the author changes their email, you must update every Post
              - It violates naming conventions
              - It makes the database slower to read
            correct: 1
            explanation: >-
              Duplicating author data on every Post creates an update anomaly — if the author changes their email, you must find and update every Post record. Using a foreign key (author_id on Post
              referencing the Author entity) means the email is stored once and changes propagate automatically.
          - id: relationships-p3
            type: true_false
            question: Without relationships (foreign keys), you could still answer the question 'which customer placed this order?' using only the Order table.
            correct: 'false'
            explanation: >-
              Without a foreign key connecting Order to Customer, the Order table has no reference to the Customer entity. You could not determine which customer placed which order. Relationships are
              what make cross-entity questions answerable.
      - id: optional-vs-mandatory
        instruction: >-
          Relationships can be **optional** or **mandatory**.


          A **mandatory** relationship means every instance of one entity must be connected to the other. An Order must have a Customer — it makes no sense to have an order with no buyer.


          An **optional** relationship means the connection may or may not exist. A Customer may have zero orders (they signed up but never purchased).


          These participation rules reflect real business logic and prevent invalid data.


          **In database terms:** mandatory relationships translate to NOT NULL foreign keys — the foreign key column cannot be empty. Optional relationships allow NULL foreign keys.


          Getting this right matters for data quality. If your model says "every order must have a customer" but the database allows null customer_id, you will eventually get orphaned orders that break reports and analytics.
        problems:
          - id: optional-mandatory-p1
            type: multiple_choice
            question: In a system where every Invoice must belong to a Customer, but a Customer may have zero invoices, which statement is correct?
            options:
              - Both sides of the relationship are mandatory
              - The Invoice-to-Customer side is mandatory; the Customer-to-Invoice side is optional
              - Both sides of the relationship are optional
              - The Customer-to-Invoice side is mandatory; the Invoice-to-Customer side is optional
            correct: 1
            explanation: >-
              Every Invoice must have a Customer (mandatory from Invoice side — the foreign key customer_id cannot be null). But a Customer can exist without any Invoices (optional from Customer
              side). This asymmetry is very common in real data models.
          - id: optional-mandatory-p2
            type: true_false
            question: If a relationship is optional on one side, it must also be optional on the other side.
            correct: 'false'
            explanation: Relationships can have different participation on each side. An Order must have a Customer (mandatory), but a Customer may have zero Orders (optional). The two sides are independent.
          - id: optional-mandatory-p3
            type: scenario
            question: >-
              A User entity has a profile_photo_id foreign key pointing to a Photo entity. Some users have not uploaded a photo. Should this foreign key be NOT NULL or nullable?
            options:
              - NOT NULL — every user must have a photo
              - Nullable — the relationship is optional because not every user has a photo
              - Remove the foreign key and store the photo data directly on User
              - Use a default placeholder photo_id that all users without photos share
            correct: 1
            explanation: >-
              Since some users have no photo, the relationship is optional and the foreign key should be nullable. Making it NOT NULL would prevent creating users who have not uploaded a photo yet.
              The placeholder option works but masks the optionality with a workaround rather than modeling it cleanly.
    section: data-modeling-design
  - id: cardinality
    name: Cardinality — How Many of Each?
    difficulty: 4
    estimatedMinutes: 18
    tags:
      - foundational
      - data-modeling
    prerequisites:
      - relationships
    encompassing: []
    knowledgePoints:
      - id: cardinality-types
        instruction: >-
          Cardinality answers the question "how many of A can connect to how many of B?" There are three patterns to recognize. One-to-one means each side matches one instance on the other side.
          One-to-many means one record on the left can connect to many on the right, but each right-side record points back to only one left-side record. Many-to-many means both sides can have many
          matches. Cardinality is the bridge between business rules and table design.
        instructionContent:
          - type: callout
            title: Read both directions
            body: >-
              Always say the relationship out loud both ways. "One customer has many orders" and "each order belongs to one customer" is how you confirm you are truly looking at one-to-many.
        problems:
          - id: cardinality-p1
            type: multiple_choice
            question: A single Author can write many Books, but each Book has exactly one Author. What is the cardinality of this relationship?
            options:
              - One-to-one
              - One-to-many
              - Many-to-many
              - Many-to-one
            correct: 1
            explanation: One Author to many Books is a one-to-many (1:N) relationship. The foreign key (author_id) goes on the Book entity — the 'many' side.
          - id: cardinality-p2
            type: matching
            question: Match each real-world scenario to its cardinality type.
            options:
              - Person and Social Security Number|One-to-one
              - Department and Employees|One-to-many
              - Students and Courses|Many-to-many
              - Country and Capital City|One-to-one
            correct: 0,1,2,3
            explanation: >-
              A Person has one SSN and vice versa (1:1). A Department has many Employees, each Employee in one Department (1:N). Students take many Courses and Courses have many Students (M:N). A
              Country has one Capital and each Capital belongs to one Country (1:1).
          - id: cardinality-p5
            type: true_false
            question: In a one-to-many relationship, records on the 'many' side can each point to a different record on the 'one' side.
            correct: 'true'
            explanation: >-
              In one-to-many, each record on the 'many' side points to exactly one record on the 'one' side — but different 'many' records can point to different 'one' records. For example, different
              Orders can belong to different Customers. If you answered false, you may have confused this with one-to-one.
      - id: implementing-cardinality
        instruction: >-
          Once you know the cardinality, you can decide the implementation pattern. One-to-many is usually implemented with a foreign key on the many side. One-to-one often uses a foreign key plus a
          unique constraint, or it may signal that two entities should really be one. Many-to-many cannot be represented by a single foreign key, so it becomes a join table. The key move is to derive
          the storage pattern from the business rule instead of memorizing table shapes.
        instructionContent:
          - type: link
            url: https://www.postgresql.org/docs/current/tutorial-fk.html
            title: PostgreSQL foreign key tutorial
            description: Use this when the learner wants to see how one-to-many relationships become actual foreign-key columns.
        problems:
          - id: cardinality-p3
            type: scenario
            question: >-
              You are modeling a music streaming service. Users can create many Playlists, and each Playlist belongs to one User. However, each Playlist can contain many Songs, and each Song can
              appear in many Playlists. Which relationship is many-to-many?
            options:
              - User to Playlist
              - Playlist to Song
              - User to Song
              - Both User to Playlist and Playlist to Song
            correct: 1
            explanation: >-
              Playlist to Song is many-to-many: a Playlist contains many Songs, and a Song can appear in many Playlists. User to Playlist is one-to-many: one User creates many Playlists, but each
              Playlist has one creator.
          - id: cardinality-p4
            type: multiple_choice
            question: In a one-to-many relationship, where does the foreign key go?
            options:
              - On the 'one' side
              - On the 'many' side
              - On both sides
              - In a separate table
            correct: 1
            explanation: The foreign key always goes on the 'many' side. In Customer (one) to Orders (many), the Order table gets a customer_id foreign key. Each Order points to its one Customer.
          - id: cardinality-p6
            type: scenario
            question: >-
              You discover that a one-to-one relationship between Employee and ParkingPass is implemented with a foreign key on ParkingPass but no unique constraint. What could go wrong?
            options:
              - Nothing — the foreign key is sufficient
              - Without a unique constraint, one employee could accidentally get multiple parking passes, violating the one-to-one rule
              - The database will enforce one-to-one automatically
              - ParkingPass should not have a foreign key at all
            correct: 1
            explanation: >-
              A foreign key alone enforces referential integrity, not uniqueness. For one-to-one, you also need a unique constraint on the foreign key column so that no two ParkingPass rows point
              to the same Employee. Without it, the relationship silently degrades to one-to-many.
    section: data-modeling-design
  - id: associative-entities
    name: Associative Entities — Join Tables
    difficulty: 4
    estimatedMinutes: 14
    tags:
      - foundational
      - data-modeling
    prerequisites:
      - cardinality
    encompassing: []
    knowledgePoints:
      - id: resolving-many-to-many
        instruction: >-
          Many-to-many relationships cannot be implemented with one foreign-key column. You need a third entity, usually called a join table or associative entity, that turns one many-to-many into two
          one-to-many relationships. Students and Courses become Enrollment. Orders and Products become OrderLineItem. The join table is not a workaround; it is the real entity that represents each
          pairing.
        instructionContent:
          - type: callout
            title: Think in pairings
            body: >-
              A join-table row represents one specific pairing: this student in this course, this product in this order, this user in this role.
        problems:
          - id: assoc-p1
            type: multiple_choice
            question: Why can't a many-to-many relationship be implemented with a simple foreign key?
            options:
              - Foreign keys only support numeric data types
              - A single foreign key column can only point to one record, but many-to-many requires pointing to multiple records on both sides
              - Most databases do not support foreign keys
              - Many-to-many relationships are not allowed in data modeling
            correct: 1
            explanation: >-
              A foreign key column holds one value pointing to one record. In a many-to-many, each Student relates to multiple Courses and vice versa — a single column cannot represent this. A join
              table with rows for each pairing solves the problem.
          - id: assoc-p2
            type: multiple_choice
            question: An associative entity that resolves a many-to-many relationship between Order and Product is commonly called what?
            options:
              - OrderStatus
              - OrderLineItem
              - CustomerProfile
              - ProductCatalog
            correct: 1
            explanation: OrderLineItem (or line_item) is the classic join table between Order and Product. Each row represents one product in one order, with its own attributes like quantity and unit_price.
          - id: assoc-p5
            type: true_false
            question: A join table (associative entity) is just a workaround for a database limitation and does not represent a real concept in the data model.
            correct: 'false'
            explanation: >-
              A join table is a real entity that represents each specific pairing. Enrollment is a real thing (this student in this course), not just a technical workaround. It can have its own
              attributes like enrollment_date and grade. If you answered true, revisit the idea that the pairing itself is a first-class concept.
      - id: relationship-level-attributes
        instruction: >-
          The most important mental model is this: some facts belong to the relationship itself, not to either side of the relationship. Grade belongs to an Enrollment. Quantity belongs to an
          OrderLineItem. Assigned_at belongs to a RoleAssignment. If you find yourself wondering where a fact goes, ask: "does this describe the left entity, the right entity, or this specific
          pairing?"
        workedExample: >-
          In a hospital, Doctor and Patient are separate entities. But diagnosis_date and treatment_notes do not belong permanently to either Doctor or Patient. They describe one encounter between
          them, so they belong on a Visit entity that links the two.
        instructionContent:
          - type: link
            url: https://www.postgresql.org/docs/current/tutorial-fk.html
            title: PostgreSQL foreign key tutorial
            description: Once the learner accepts the join table as a real entity, this is the next step for seeing how the references are stored.
        problems:
          - id: assoc-p3
            type: scenario
            question: >-
              A hospital system has Doctors and Patients with a many-to-many relationship (a doctor treats many patients, a patient sees many doctors). You need to track the date of each visit and the
              diagnosis. Where should these attributes live?
            options:
              - On the Doctor entity
              - On the Patient entity
              - On an associative entity (e.g., Visit) between Doctor and Patient
              - In a separate configuration table
            correct: 2
            explanation: >-
              Visit date and diagnosis describe the specific interaction between a Doctor and a Patient — they belong on the associative entity (Visit). They are not properties of the Doctor or
              Patient alone, but of the relationship between them.
          - id: assoc-p4
            type: scenario
            question: >-
              Users can have many Roles, and Roles can be granted to many Users. You also need to store assigned_by and assigned_at. Where should those two fields live?
            options:
              - On User, because the grant affects the user
              - On Role, because the grant describes the role
              - On a RoleAssignment join table between User and Role
              - In a separate audit table only
            correct: 2
            explanation: >-
              assigned_by and assigned_at describe one specific grant of one role to one user. That makes them attributes of the relationship row, not permanent attributes of User or Role alone.
          - id: assoc-p6
            type: multiple_choice
            question: >-
              An e-commerce system has Orders and Products linked through OrderLineItem. The attribute 'quantity' describes how many of a specific product are in a specific order. Where does 'quantity'
              belong?
            options:
              - On the Order entity
              - On the Product entity
              - On the OrderLineItem (the join table)
              - In a separate configuration table
            correct: 2
            explanation: >-
              Quantity describes one specific pairing of one product in one order — it is a relationship-level attribute. It does not belong on Order (which may have many products) or on Product
              (which appears in many orders). It belongs on the join table that represents that specific pairing.
    section: data-modeling-design
  - id: data-modeling-process
    name: The Data Modeling Design Process
    difficulty: 3
    estimatedMinutes: 15
    tags:
      - foundational
      - data-modeling
    prerequisites:
      - associative-entities
    encompassing: []
    knowledgePoints:
      - id: five-step-workflow
        instruction: >-
          Data modeling works best as a fixed sequence. First identify entities. Then list attributes. Then define relationships. Then decide the cardinality of those relationships. Finally, resolve
          many-to-many relationships into join tables. The value of the workflow is not paperwork. It prevents you from jumping into tables too early and hiding structural mistakes inside SQL.
        instructionContent:
          - type: callout
            title: Sequence matters
            body: >-
              If you skip straight to table creation, you usually discover entity, relationship, and cardinality mistakes after code has already made them expensive.
        problems:
          - id: process-p1
            type: ordering
            question: Place these data modeling steps in the correct order.
            options:
              - Determine cardinality for each relationship
              - Identify entities
              - Resolve many-to-many into join tables
              - List attributes for each entity
              - Define relationships between entities
            correct: 1,3,4,0,2
            explanation: >-
              The five steps in order: (1) Identify entities, (2) List attributes, (3) Define relationships, (4) Determine cardinality, (5) Resolve many-to-many. You must know your entities before
              their attributes, and relationships before their cardinality.
          - id: process-p3
            type: multiple_choice
            question: What is the main benefit of designing a data model before writing code or SQL?
            options:
              - It guarantees the system will never need changes
              - It produces cleaner queries, fewer bugs, and a system that is easier to evolve
              - It eliminates the need for a database entirely
              - It makes the system run faster at the hardware level
            correct: 1
            explanation: >-
              Upfront data modeling produces a well-structured foundation. This leads to cleaner queries, fewer bugs, and a system that is easier to evolve as new features arrive.
          - id: process-p5
            type: true_false
            question: It is fine to write SQL CREATE TABLE statements before identifying entities and their relationships, as long as you refactor later.
            correct: 'false'
            explanation: >-
              Jumping to tables before identifying entities, attributes, and relationships hides structural mistakes inside SQL that become expensive to fix. The five-step workflow exists to prevent
              rework. If you answered true, the misconception is treating modeling as optional paperwork rather than a design step that prevents downstream bugs.
      - id: applying-the-workflow
        instruction: >-
          The five-step process becomes useful only when you can run it on a real system description. The goal is to move from vague product prose to concrete modeling choices. At each step, ask a
          narrower question than the last: what things exist, what facts matter, how do they connect, how many of each connect, and which many-to-many pairings need their own entity?
        workedExample: >-
          Model a simple library system. Step 1 — Entities: Book, Member, Loan. Step 2 — Attributes: Book (isbn, title, author, published_year), Member (member_id, name, email, joined_date), Loan
          (loan_id, borrowed_date, due_date, returned_date). Step 3 — Relationships: Members borrow Books via Loans. Step 4 — Cardinality: One Member has many Loans. One Book has many Loans over
          time. Step 5 — Loan is the associative entity resolving the many-to-many between Member and Book.
        problems:
          - id: process-p2
            type: scenario
            question: >-
              A startup asks you to model their system: 'Users create Projects. Each Project has many Tasks. Users can be assigned to Tasks, and each Task can have multiple Users assigned.' You have
              identified User, Project, and Task as entities. What is the next modeling decision you need to make?
            options:
              - Choose a database vendor
              - Write SQL CREATE TABLE statements
              - Recognize that User-to-Task is many-to-many and create an associative entity (e.g., TaskAssignment)
              - Delete the Task entity since it is redundant with Project
            correct: 2
            explanation: >-
              User-to-Task is many-to-many (one User has many Tasks, one Task has many Users). You need an associative entity like TaskAssignment with user_id, task_id, and potentially attributes like
              assigned_date and role. This is step 5 of the data modeling process.
          - id: process-p4
            type: scenario
            question: >-
              You are modeling a subscription product. You have identified Customer and Plan. The business rule says one Customer can change Plans over time, and the team wants to keep started_at and
              cancelled_at for each change. What is the next strong modeling move?
            options:
              - Put started_at and cancelled_at directly on Customer
              - Create a Subscription entity linking Customer and Plan
              - Delete Plan because the dates matter more than the plan itself
              - Skip the model and let the application code track history
            correct: 1
            explanation: >-
              Once the relationship itself has history and dates, it deserves its own entity. Subscription captures the pairing between Customer and Plan over time, instead of forcing that history into
              Customer.
          - id: process-p6
            type: multiple_choice
            question: >-
              In the five-step modeling workflow, at which step do you decide that Student-to-Course needs a join table?
            options:
              - Step 1 — Identify entities
              - Step 3 — Define relationships
              - Step 4 — Determine cardinality
              - Step 5 — Resolve many-to-many into join tables
            correct: 3
            explanation: >-
              The decision to create a join table happens at step 5, after you have already identified entities, listed attributes, defined relationships, and determined cardinality. You must know
              the relationship is many-to-many (step 4) before resolving it (step 5).
    section: data-modeling-design
  - id: what-is-a-pipeline
    name: What Is a Data Pipeline?
    difficulty: 2
    estimatedMinutes: 14
    tags:
      - foundational
      - pipelines
    prerequisites:
      - data-modeling-process
    encompassing: []
    knowledgePoints:
      - id: pipeline-definition-and-flow
        instruction: >-
          A data pipeline is a system that moves data from where it is produced to where it is needed, and often transforms it on the way. The usual stages are source, ingestion, storage,
          transformation, and serving. Different tools may collapse or rename those stages, but the core idea stays the same: get data in, preserve it safely, shape it, and deliver it to someone who
          can use it.
        instructionContent:
          - type: image
            url: https://posthog.com/images/products/data-pipeline/data-pipeline.png
            alt: Data pipeline product overview showing flow between systems
            caption: A concrete pipeline view helps learners map the abstract stages to a real product interface.
            width: 960
        problems:
          - id: pipeline-p1
            type: multiple_choice
            question: What is a data pipeline?
            options:
              - A type of database optimized for storing large files
              - A system that moves and transforms data from sources to destinations
              - A programming language for writing SQL queries
              - A physical cable connecting two servers
            correct: 1
            explanation: >-
              A data pipeline is a system that moves data from where it is produced (sources) to where it is needed (destinations), transforming it along the way. It is a logical system, not a
              physical object or a language.
          - id: pipeline-p2
            type: ordering
            question: Place these data pipeline stages in the typical order.
            options:
              - Transform
              - Ingest
              - Serve/Analyze
              - Store
            correct: 1,3,0,2
            explanation: >-
              The typical flow is: Ingest (collect from sources), Store (land somewhere durable), Transform (clean and process), Serve/Analyze (deliver to consumers). Data must be collected before
              stored, stored before transformed, and transformed before served.
          - id: pipeline-p5
            type: true_false
            question: A data pipeline always includes all five stages (source, ingestion, storage, transformation, and serving) in every implementation.
            correct: 'false'
            explanation: >-
              Different tools may collapse, rename, or skip stages. A simple pipeline might go straight from ingestion to serving without a separate transformation step. The five stages are a mental
              model, not a mandatory checklist for every pipeline.
      - id: pipeline-failure-points
        instruction: >-
          Once you know the stages, you can use them as a debugging map. Missing data often means the failure happened upstream. Stale data often means ingestion or transformation is delayed. Wrong
          numbers often mean data arrived but the transformation or serving layer applied the wrong logic. A TAM does not need to memorize every vendor's internals to help. They need to ask which stage
          first stopped behaving as expected.
        instructionContent:
          - type: callout
            title: TAM lens
            body: >-
              When a customer says data is missing or stale, ask which stage failed first: source, ingestion, storage, transformation, or delivery.
        problems:
          - id: pipeline-p3
            type: true_false
            question: A data pipeline only moves data — it never modifies or transforms data along the way.
            correct: 'false'
            explanation: Pipelines both move AND transform data. Transformation is a core stage — cleaning, filtering, aggregating, joining, and reshaping data as it flows from source to destination.
          - id: pipeline-p4
            type: scenario
            question: >-
              Events are arriving at the platform, but the dashboard that depends on a daily aggregation has not updated since this morning. Which stage is the best first place to investigate?
            options:
              - The source system only
              - The transformation or serving step that builds the aggregate
              - The user's browser cache
              - The entity-relationship model
            correct: 1
            explanation: >-
              If raw events are arriving but the derived dashboard is stale, the likely failure is downstream in transformation or serving, not in the original event source.
          - id: pipeline-p6
            type: multiple_choice
            question: >-
              A customer reports that their data appears in the warehouse but the numbers in their dashboard look wrong. Which pipeline stage should a TAM investigate first?
            options:
              - The source system
              - The ingestion step
              - The transformation or serving layer
              - The network connection between systems
            correct: 2
            explanation: >-
              If data arrived in the warehouse but the numbers are wrong, the issue is likely in transformation (bad logic) or serving (wrong query or aggregation). The source and ingestion steps
              worked because the data did land. Start downstream and work backward.
    section: pipeline-basics
  - id: sources-and-ingestion
    name: Sources & Ingestion Patterns
    difficulty: 3
    estimatedMinutes: 15
    tags:
      - foundational
      - pipelines
    prerequisites:
      - what-is-a-pipeline
    encompassing: []
    knowledgePoints:
      - id: where-data-comes-from
        instruction: >-
          **Data sources** are any system that produces data your pipeline needs to consume. Common sources include:


          **Application databases** (PostgreSQL, MySQL) — the operational databases your app writes to. **Event streams** (user clicks, pageviews, API calls) — real-time actions. **Third-party APIs** (Stripe for payments, Salesforce for CRM data). **Flat files** (CSVs, JSON exports). **Server logs** (access logs, error logs).


          Sources differ in how they produce data. **Batch sources** produce data in chunks at intervals — a nightly database export, a weekly CSV from a vendor. **Streaming sources** produce data continuously in real-time — user clickstreams, IoT sensor readings, application event logs.


          Batch is simpler to build and operate but introduces latency (data can be hours or days old). Streaming is faster (near real-time) but harder to build, debug, and operate. Most real-world pipelines use a mix of both.
        instructionContent:
          - type: callout
            title: Classification shortcut
            body: >-
              First ask what system emits the data. Then ask whether it arrives continuously or on a schedule. That gives you both the source type and the operating pattern.
        problems:
          - id: sources-p1
            type: multiple_choice
            question: Which of the following is an example of a streaming data source?
            options:
              - A nightly CSV export from a vendor
              - A weekly database backup
              - Real-time user clickstream events from a web application
              - A monthly financial report
            correct: 2
            explanation: >-
              User clickstream events are produced continuously in real-time as users interact with the application — this is a streaming source. The other options are all batch sources (periodic
              exports at fixed intervals).
          - id: sources-p2
            type: matching
            question: Match each data source to its category.
            options:
              - User clickstream events|Streaming
              - Nightly database export|Batch
              - IoT sensor readings|Streaming
              - Weekly CSV from a vendor|Batch
            correct: 0,1,2,3
            explanation: Clickstreams and IoT sensors produce data continuously (streaming). Nightly exports and weekly CSVs are produced at intervals (batch).
          - id: sources-p3
            type: true_false
            question: Batch data sources always produce lower-quality data than streaming sources.
            correct: 'false'
            explanation: >-
              Data quality depends on the source system and pipeline design, not on whether it is batch or streaming. A well-designed nightly export can be higher quality than a poorly instrumented
              real-time stream. The batch vs streaming distinction is about latency and operational complexity, not data quality.
      - id: ingestion-approaches
        instruction: >-
          **Ingestion** is the process of collecting data from sources into your pipeline. There are three main patterns.


          **Pull-based ingestion:** the pipeline periodically requests data from the source. Example: a scheduled job that queries an API every hour. The pipeline controls the timing.


          **Push-based ingestion:** the source sends data to the pipeline as it is produced. Example: a web application sends events to an analytics endpoint, or a webhook fires when a payment succeeds. The source controls the timing.


          **Change Data Capture (CDC):** a specialized technique that watches a database's transaction log (WAL in PostgreSQL, binlog in MySQL) and captures every INSERT, UPDATE, and DELETE as it happens. CDC gives you streaming-like freshness from a batch source without querying the database directly — it reads the log instead.


          Most product analytics tools (including PostHog) use push-based ingestion: your application sends events to their API.
        workedExample: >-
          Stripe sending a webhook when a payment succeeds is push-based ingestion. A cron job polling Salesforce every hour is pull-based ingestion. A connector reading PostgreSQL WAL records is CDC.
          Same goal, different control point.
        problems:
          - id: ingestion-p1
            type: multiple_choice
            question: In push-based ingestion, who initiates the data transfer?
            options:
              - The pipeline requests data on a schedule
              - The source sends data as it is produced
              - A third-party orchestrator triggers both sides
              - The database log is read directly
            correct: 1
            explanation: In push-based ingestion, the source sends data to the pipeline. A web app posting events to an analytics API is a classic example. The source controls the timing, not the pipeline.
          - id: ingestion-p2
            type: scenario
            question: >-
              Your company uses a third-party CRM (like Salesforce) that does not support webhooks. You need updated deal data in your warehouse every few hours. Which ingestion pattern is most
              appropriate?
            options:
              - Push-based — have Salesforce send data to your pipeline
              - Pull-based — schedule your pipeline to query the Salesforce API periodically
              - Change Data Capture — read Salesforce's database logs
              - Manual — have someone export a CSV daily
            correct: 1
            explanation: >-
              Without webhook support, you cannot use push-based ingestion. You do not have access to Salesforce's database logs for CDC. Pull-based is the right choice: schedule your pipeline to call
              the Salesforce API every few hours to fetch updated records.
          - id: ingestion-p3
            type: true_false
            question: Change Data Capture (CDC) works by periodically querying a database for new rows.
            correct: 'false'
            explanation: >-
              CDC does NOT query the database. It reads the database's transaction log (WAL/binlog) to capture every INSERT, UPDATE, and DELETE as it happens. This avoids putting query load on the
              production database and provides near real-time data.
    section: pipeline-basics
  - id: storage-layers
    name: Storage Layers — Where Data Lives
    difficulty: 3
    estimatedMinutes: 16
    tags:
      - foundational
      - pipelines
    prerequisites:
      - sources-and-ingestion
    encompassing: []
    knowledgePoints:
      - id: raw-lake-warehouse
        instruction: >-
          Data usually moves through layers as it becomes more useful. Raw storage or a landing zone is the first stop after ingestion. It keeps the original payload untouched so you can replay or
          reprocess later. A data lake is cheap, flexible storage for large volumes of raw or semi-structured data. A data warehouse is optimized for analytical queries on structured tables. The same
          data may move through all three layers, but each layer exists for a different reason.
        instructionContent:
          - type: callout
            title: Same data, different jobs
            body: >-
              Raw storage protects recoverability, lakes protect cheap flexible retention, and warehouses protect query speed.
        problems:
          - id: storage-p1
            type: multiple_choice
            question: What is the primary advantage of keeping a raw storage layer in your pipeline?
            options:
              - Raw storage is the fastest to query
              - It preserves original data so you can reprocess if something goes wrong downstream
              - It eliminates the need for a data warehouse
              - Raw storage automatically cleans and transforms data
            correct: 1
            explanation: >-
              Raw storage is your safety net. By preserving the original data untouched, you can always go back and reprocess it if a transformation bug corrupts downstream data. Raw storage is not
              fast to query — that is the warehouse's job.
          - id: storage-p2
            type: matching
            question: Match each storage layer to its primary characteristic.
            options:
              - Raw storage|Preserves original data exactly as received
              - Data lake|Cheap, flexible storage for semi-structured data
              - Data warehouse|Optimized for fast analytical queries
              - Landing zone|First place data lands after ingestion
            correct: 0,1,2,3
            explanation: >-
              Raw storage and landing zone both describe the initial ingestion target (preserving original data). Data lakes prioritize cheap, flexible storage. Data warehouses prioritize fast
              analytical queries with structured schemas.
          - id: storage-p5
            type: multiple_choice
            question: Which storage layer is optimized for fast analytical queries on structured, schema-defined tables?
            options:
              - Raw storage / landing zone
              - Data lake
              - Data warehouse
              - Application database (OLTP)
            correct: 2
            explanation: >-
              Data warehouses are built for analytical query speed on structured data. Raw storage preserves originals, lakes store cheap flexible data, and OLTP databases optimize for transactional
              writes, not analytical reads.
      - id: choosing-storage-layers
        instruction: >-
          Choosing the right layer depends on the job. Use raw storage when recoverability matters. Use a lake when you need cheap retention of varied file types. Use a warehouse when people need to
          ask analytical questions quickly. The mistake is expecting one layer to optimize for every outcome at once. Cheap flexible storage is not automatically fast, and fast structured analytics is
          not automatically the best place to keep every original payload forever.
        problems:
          - id: storage-p3
            type: true_false
            question: A data warehouse is optimized for cheap storage of unstructured data like images and videos.
            correct: 'false'
            explanation: >-
              A data warehouse is optimized for fast analytical queries on structured data (tables with defined schemas). Cheap storage of unstructured data is the role of a data lake (like S3).
              Warehouses trade storage cost for query speed.
          - id: storage-p4
            type: scenario
            question: >-
              A transformation bug corrupted yesterday's aggregate tables. The team needs the original event payloads so they can rebuild the data correctly. Which storage layer is most important here?
            options:
              - The BI dashboard cache
              - The raw landing zone
              - The semantic layer only
              - The metrics definition document
            correct: 1
            explanation: >-
              The raw landing zone preserves the original data exactly as received. That is what lets the team rerun the downstream transformations after a bug.
          - id: storage-p6
            type: scenario
            question: >-
              A team asks: 'Can we just put everything in our data warehouse and skip the raw layer and lake?' What is the strongest argument against this?
            options:
              - Warehouses cannot store JSON data
              - If a transformation bug corrupts warehouse data, you have no original copy to reprocess from
              - Warehouses are always more expensive than lakes
              - This approach violates database licensing rules
            correct: 1
            explanation: >-
              Without a raw layer, you lose recoverability. If downstream transformation logic is wrong, you cannot replay the original data. The raw layer is your safety net, not redundant storage.
    section: pipeline-basics
  - id: transformation-etl-elt
    name: Transformation — ETL vs ELT
    difficulty: 4
    estimatedMinutes: 15
    tags:
      - foundational
      - pipelines
    prerequisites:
      - storage-layers
    encompassing: []
    knowledgePoints:
      - id: what-transformation-does
        instruction: >-
          **Transformation** is the stage where raw data becomes usable data. It is where you clean, reshape, enrich, and aggregate. Common operations include:


          **Cleaning** — removing duplicates, fixing null values, correcting data types. **Filtering** — dropping irrelevant records. **Joining** — combining data from multiple sources, such as enriching events with user attributes. **Aggregating** — summing, counting, averaging to turn raw events into metrics. **Normalizing** — standardizing formats like dates, currencies, or country codes.


          For example, raw event data might look like individual "user_clicked_button" records with timestamps. After transformation, you might have an aggregated table of "daily_clicks_per_user" that is much easier to query.


          Transformation is where **business logic** lives. The rules about what counts as an "active user" or how "revenue" is calculated are encoded in transformation steps.
        instructionContent:
          - type: image
            url: https://posthog.com/images/products/data-warehouse/screenshot-data-warehouse.png
            alt: PostHog data warehouse interface for querying transformed data
            caption: Warehouses expose the outputs of transformation work in a form analysts and TAMs can inspect directly.
            width: 960
          - type: callout
            title: Important distinction
            body: >-
              Instrumentation creates raw facts. Transformation turns those facts into business definitions like active users, MRR, or qualified accounts.
        problems:
          - id: transform-p1
            type: multiple_choice
            question: Which of the following is NOT a common transformation operation?
            options:
              - Removing duplicate records
              - Aggregating raw events into daily summaries
              - Collecting data from a third-party API
              - Joining event data with user profile data
            correct: 2
            explanation: >-
              Collecting data from an API is ingestion, not transformation. Transformation operates on data already in the pipeline — deduplication, aggregation, and joining are all transformation
              operations.
          - id: transform-p2
            type: multiple_choice
            question: The transformation stage is where what kind of logic is encoded — rules like what counts as an active user or how revenue is calculated?
            options:
              - business logic
              - presentation logic
              - authentication logic
              - transport logic
            correct: 0
            explanation: >-
              Business logic lives in the transformation layer. Definitions like 'active user = logged in within last 30 days' or 'MRR = sum of all active subscription amounts' are transformation
              rules that turn raw data into meaningful metrics.
          - id: transform-p3
            type: scenario
            question: >-
              Two teams at the same company disagree on the definition of 'active user.' The marketing team counts anyone who logged in, while the product team counts anyone who performed a core action.
              Where should this definition be codified?
            options:
              - In the application code
              - In the transformation layer as a documented business rule
              - In the BI dashboard configuration
              - In the source database schema
            correct: 1
            explanation: >-
              Business definitions like 'active user' belong in the transformation layer where raw data becomes metrics. This is where business logic lives. Codifying it there ensures all downstream
              consumers use the same definition instead of each team computing their own version.
      - id: etl-vs-elt
        instruction: >-
          There are two major approaches to when transformation happens.


          **ETL (Extract, Transform, Load):** data is extracted from sources, transformed in a separate processing system, and then loaded into the destination warehouse. This was the traditional approach when storage was expensive — you only stored the clean, transformed data.


          **ELT (Extract, Load, Transform):** data is extracted from sources, loaded raw into the destination, and then transformed inside the warehouse using SQL or the warehouse's own compute engine. This is the modern approach, enabled by cheap cloud storage (S3, GCS).


          The advantage of ELT is **flexibility:** if your business logic changes, you can re-transform from the raw data without re-ingesting. You also preserve the original data for auditing.


          Most modern analytics systems, including PostHog, use an ELT-like pattern: events are ingested raw, stored in ClickHouse, and then queried and transformed at read time using HogQL.
        problems:
          - id: etl-elt-p1
            type: multiple_choice
            question: What is the key difference between ETL and ELT?
            options:
              - ETL uses SQL; ELT uses Python
              - ETL transforms data before loading it into the warehouse; ELT loads raw data first and transforms inside the warehouse
              - ETL is for batch data; ELT is for streaming data
              - ETL is open source; ELT is proprietary
            correct: 1
            explanation: >-
              The difference is when transformation happens. ETL transforms before loading (data enters the warehouse already clean). ELT loads raw data first and transforms inside the warehouse. ELT
              is the modern approach enabled by cheap storage.
          - id: etl-elt-p2
            type: true_false
            question: ELT became practical because cloud storage costs dropped, making it affordable to store raw data and transform later.
            correct: 'true'
            explanation: >-
              Cheap cloud storage (S3, GCS, Azure Blob) is the key enabler of ELT. When storage was expensive, you had to transform before loading to minimize what you stored (ETL). Now you can afford
              to keep everything raw and transform on demand.
          - id: etl-elt-p3
            type: scenario
            question: Your company realizes their definition of 'active user' was wrong for the past 6 months. Under which approach can you fix the historical data without re-ingesting from the source?
            options:
              - ETL — because the transformed data is already clean
              - ELT — because the raw data is preserved in the warehouse and you can re-transform it
              - Neither — you must always re-ingest from the source
              - Both — there is no difference for this scenario
            correct: 1
            explanation: >-
              ELT preserves the raw data in the warehouse. When business logic changes, you can re-run transformations on the existing raw data. With ETL, raw data is discarded after transformation,
              so you would need to re-ingest from the source (if it is even still available).
    section: pipeline-architecture
  - id: orchestration-and-serving
    name: Orchestration & Serving Data
    difficulty: 3
    estimatedMinutes: 10
    tags:
      - foundational
      - pipelines
    prerequisites:
      - transformation-etl-elt
    encompassing: []
    knowledgePoints:
      - id: workflow-orchestration
        instruction: >-
          Pipelines have multiple steps that must run in a specific order with specific dependencies. **Orchestration** is the coordination of these steps.


          An orchestrator schedules and manages execution: extract data from source A, then transform it, then load it, then refresh the dashboard. If the extract step fails, the transform step should not run.


          Tasks are organized as a **DAG — a Directed Acyclic Graph**. "Directed" means edges have a direction (step A must complete before step B). "Acyclic" means there are no loops (step B cannot depend on step C which depends on step B).


          The orchestrator handles four jobs: **scheduling** (run this pipeline every hour), **dependency management** (only run step B after step A succeeds), **retries** (if a step fails, retry it), and **alerting** (notify the team if a pipeline fails).


          Common orchestration tools include Apache Airflow, Dagster, Prefect, and dbt for transformation-specific orchestration.
        instructionContent:
          - type: callout
            title: Orchestration is control flow
            body: >-
              The orchestrator is not the data itself. It is the system that decides what runs next, what retries, and what should stop when an upstream step fails.
        problems:
          - id: orch-p1
            type: multiple_choice
            question: What does DAG stand for in the context of pipeline orchestration?
            options:
              - Data Aggregation Gateway
              - Directed Acyclic Graph
              - Distributed Analytics Grid
              - Dynamic Allocation Group
            correct: 1
            explanation: >-
              DAG stands for Directed Acyclic Graph. 'Directed' means steps have a defined order. 'Acyclic' means there are no circular dependencies. Pipeline tasks form a DAG where each step depends
              on previous steps completing.
          - id: orch-p2
            type: true_false
            question: In a pipeline DAG, it is acceptable for step B to depend on step C, and step C to depend on step B.
            correct: 'false'
            explanation: A DAG is acyclic — no circular dependencies are allowed. If B depends on C and C depends on B, neither can ever start. This is a cycle, which the orchestrator would reject.
          - id: orch-p3
            type: scenario
            question: >-
              A pipeline has three steps: Extract from API, Transform data, Load into warehouse. The Extract step fails due to an API timeout. What should a well-configured orchestrator do?
            options:
              - Run Transform and Load anyway with whatever data is available
              - Skip all remaining steps, retry Extract according to its retry policy, and alert the team if retries are exhausted
              - Delete the partially extracted data and start over tomorrow
              - Ignore the failure and mark the run as successful
            correct: 1
            explanation: >-
              A good orchestrator respects dependencies: if Extract fails, Transform should not run because it has no input. The orchestrator retries the failed step and alerts the team if retries
              are exhausted. Running downstream steps on incomplete data produces silently wrong results.
      - id: serving-data
        instruction: >-
          Once data is processed, it must be delivered to the people and systems that need it. This is the **serving layer**.


          **Common consumers:** BI dashboards (Looker, Metabase, Grafana) for business metrics and KPIs. Data scientists and ML engineers who need clean datasets for model training. Product analytics tools for understanding user behavior. Internal applications for reporting, billing, or customer-facing features.


          **Common serving patterns:** direct warehouse access (users query the warehouse with SQL), semantic or metrics layers (a shared definition of metrics that dashboards and tools can reference), APIs (REST or GraphQL endpoints that serve processed data to applications), and cached materialized views (pre-computed query results for frequently accessed data).


          The choice of serving layer depends on the consumer. Analysts want SQL access. Product managers want dashboards. Applications want APIs.
        workedExample: >-
          One warehouse can serve three audiences at once: analysts query it directly in SQL, executives see KPIs through a BI dashboard, and the product surface calls an API backed by curated
          warehouse tables. The serving pattern changes with the consumer, not with the raw data itself.
        problems:
          - id: serving-p1
            type: multiple_choice
            question: Which serving pattern is most appropriate for a product manager who needs a weekly KPI dashboard?
            options:
              - Direct SQL access to the data warehouse
              - A BI dashboard tool (like Looker or Metabase) connected to the warehouse
              - A raw data dump to their email
              - An API endpoint returning JSON
            correct: 1
            explanation: >-
              BI dashboards are designed for non-technical consumers who need visual, regularly updated KPI views. Direct SQL access suits analysts. APIs suit applications. Raw data dumps are not
              user-friendly.
          - id: serving-p2
            type: matching
            question: Match each data consumer to their ideal serving pattern.
            options:
              - Data analyst|Direct SQL access to the warehouse
              - Product manager|BI dashboard
              - Mobile app|REST API endpoint
              - ML engineer|Clean dataset export or warehouse access
            correct: 0,1,2,3
            explanation: Analysts want SQL flexibility. PMs want visual dashboards. Apps need programmatic API access. ML engineers need structured datasets for training.
          - id: serving-p3
            type: true_false
            question: The best serving pattern is always direct SQL access to the warehouse because it is the most flexible.
            correct: 'false'
            explanation: >-
              The best serving pattern depends on the consumer. Analysts benefit from SQL access, but product managers need dashboards, and applications need APIs. Flexibility for one consumer does
              not mean it is the best choice for all consumers.
    section: pipeline-architecture
  - id: pipeline-tradeoffs
    name: Pipeline Tradeoffs — Latency, Cost, Complexity
    difficulty: 4
    estimatedMinutes: 15
    tags:
      - foundational
      - pipelines
    prerequisites:
      - orchestration-and-serving
    encompassing: []
    knowledgePoints:
      - id: three-tensions
        instruction: >-
          Every pipeline design pulls on three tensions at once: latency, cost, and complexity. Lower latency usually means more infrastructure and more operational burden. Simpler batch systems are
          cheaper and easier to debug, but the data is less fresh. The right question is not "can we make this real time?" It is "what freshness does this use case actually need?"
        problems:
          - id: tradeoffs-p1
            type: multiple_choice
            question: Which of the following correctly describes the tradeoff between batch and streaming pipelines?
            options:
              - Batch is always better because it is faster
              - Streaming is always better because it is cheaper
              - Streaming offers lower latency but higher cost and complexity compared to batch
              - There is no meaningful difference between batch and streaming
            correct: 2
            explanation: >-
              Streaming delivers data faster (lower latency) but costs more to build and operate (higher cost and complexity). Batch is simpler and cheaper but data is less fresh. The right choice
              depends on your requirements.
          - id: tradeoffs-p3
            type: true_false
            question: For most analytics use cases, real-time data freshness (sub-second latency) is required.
            correct: 'false'
            explanation: >-
              Most analytics questions are fine with minutes-to-hours of latency. Real-time should be chosen for a demonstrated need, not as a default badge of sophistication.
          - id: tradeoffs-p5
            type: scenario
            question: >-
              A team wants to build a real-time streaming pipeline for a weekly executive summary report. What is the main concern with this approach?
            options:
              - Streaming pipelines cannot produce summary reports
              - The added cost and complexity of streaming is not justified when the data only needs to be fresh once a week
              - Weekly reports require a data lake, not a stream
              - Real-time pipelines do not support aggregation
            correct: 1
            explanation: >-
              The right question is 'what freshness does this use case actually need?' A weekly report needs weekly freshness, not sub-second latency. Building a streaming pipeline for this use
              case adds unnecessary cost and complexity. Batch is the better fit.
      - id: operational-safety
        instruction: >-
          Once a pipeline is in production, two safety requirements matter constantly. Idempotency means the pipeline can be rerun without producing duplicate or conflicting results. Monitoring means
          you notice failures, delays, null spikes, schema changes, and suspicious row counts before customers do. These are not optional polish items. They are what make a pipeline survivable in the
          real world.
        instructionContent:
          - type: callout
            title: Production rule
            body: >-
              A pipeline that cannot be rerun safely and cannot alert on bad output will eventually fail in a way that is expensive to untangle.
        problems:
          - id: tradeoffs-p2
            type: scenario
            question: >-
              Your pipeline occasionally fails halfway through processing. When restarted, it creates duplicate rows in the warehouse. A colleague suggests making the pipeline idempotent. What does
              this mean?
            options:
              - The pipeline should run faster to avoid failures
              - The pipeline should be safe to rerun without creating duplicate data
              - The pipeline should skip failed records and continue
              - The pipeline should send an alert when it fails
            correct: 1
            explanation: >-
              Idempotency means the pipeline produces the same result whether it runs once or multiple times. If restarted after a failure, it should not create duplicates. Techniques include upserts
              (INSERT ... ON CONFLICT UPDATE) and deduplication checks.
          - id: tradeoffs-p4
            type: scenario
            question: >-
              A daily pipeline still runs, but today's row count is 90% lower than normal because an upstream schema change dropped a key field. Which capability would have caught this fastest?
            options:
              - Lower latency infrastructure
              - Monitoring on row counts and schema expectations
              - A different primary key design
              - Moving the data to a lake instead of a warehouse
            correct: 1
            explanation: >-
              This is exactly what monitoring is for. Healthy production pipelines watch both failures and suspicious outputs so teams can catch silent bad data before users trust it.
          - id: tradeoffs-p6
            type: true_false
            question: An idempotent pipeline produces different results when rerun multiple times on the same input data.
            correct: 'false'
            explanation: >-
              Idempotent means the pipeline produces the same result whether it runs once or many times on the same input. If rerunning creates duplicates or different outputs, the pipeline is not
              idempotent, which makes recovery from failures risky.
    section: pipeline-architecture
  - id: ph-events
    name: PostHog Events — The Atomic Unit
    difficulty: 3
    estimatedMinutes: 18
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/new-to-posthog/understand-posthog
    prerequisites:
      - what-is-a-pipeline
    encompassing:
      - concept: entities
        weight: 0.35
    knowledgePoints:
      - id: what-is-a-posthog-event
        instruction: >-
          An **event** is the atomic unit of data in PostHog: one record of something that happened at a specific moment. Every event answers four questions:


          **What happened:** the event name. **When did it happen:** the timestamp. **Who or which device did it:** the distinct_id. **What extra context came with it:** the properties object.


          If one of those pieces is wrong or missing, PostHog can still ingest the record, but the downstream analysis gets weaker because the fact is harder to group, filter, or attribute correctly.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/new-to-posthog/understand-posthog
            title: PostHog data model overview
            description: Use this visual overview to anchor the idea that events sit at the center of the PostHog model.
          - type: image
            url: https://posthog.com/images/products/product-analytics/screenshot-product-analytics.png
            alt: PostHog product analytics interface built on event data
            caption: The UI is downstream of the event model. Every chart here starts from captured events.
            width: 960
        workedExample: >-
          A user visits your pricing page. PostHog's JS SDK automatically captures a '$pageview' event. The event looks like this internally: event name = '$pageview', timestamp =
          '2025-01-15T14:32:00Z', distinct_id = '018d4f2a-random-uuid', properties = { '$current_url': '/pricing', '$browser': 'Chrome', '$os': 'Mac OS X', '$device_type':
          'Desktop', '$referrer': 'google', '$referring_domain': 'google.com' }. Every one of these properties was set automatically by the SDK — the developer did not write any code
          beyond initializing PostHog.
        workedExampleContent:
          - type: callout
            title: Coaching angle
            body: >-
              When a customer says 'PostHog missed the user,' inspect the event first. Event name, timestamp, distinct_id, and properties usually reveal the real issue.
        problems:
          - id: ph-events-p1
            type: multiple_choice
            question: What are the four required components of every PostHog event?
            options:
              - Name, description, category, and priority
              - Event name, timestamp, distinct_id, and properties
              - Source, destination, payload, and status code
              - User ID, session ID, page URL, and browser
            correct: 1
            explanation: >-
              The mistake to avoid is swapping in examples like browser, URL, or session ID for the real event shape. Those may appear as properties, but the core event record is name, timestamp,
              distinct_id, and properties.
          - id: ph-events-p4
            type: multiple_choice
            question: In PostHog's data model, which entity is the central building block that all other entities relate to?
            options:
              - Person
              - Session
              - Event
              - Action
            correct: 2
            explanation: >-
              If you picked Person or Session, you are treating a derived layer as the raw fact. Event is the base record. Persons, sessions, actions, and groups are all built on top of event data.
          - id: ph-events-p5
            type: scenario
            question: >-
              A customer reports that some events in PostHog are missing the distinct_id field. They captured the events using a custom script that sends raw JSON to the capture API. What is the most
              likely cause of the problem?
            options:
              - PostHog silently drops events without distinct_id
              - The capture API requires distinct_id but the script is not including it in the payload
              - distinct_id is optional and only needed for identified events
              - The events are stored but hidden in the UI
            correct: 1
            explanation: >-
              Every PostHog event needs a distinct_id to answer 'who or which device did this.' The capture API expects it in the payload. If the custom script omits it, the event either fails
              validation or gets assigned a default that makes downstream analysis unreliable. Always check the four required components: event name, timestamp, distinct_id, and properties.
      - id: immutable-facts-and-default-events
        instruction: >-
          Events are **immutable facts** in PostHog. Once captured, they are records of what the system believed happened at that moment, so you do not edit them later the way you would update a person or company profile.


          PostHog also ships with **default events**, usually prefixed with `$`, such as `$pageview`, `$pageleave`, `$autocapture`, `$identify`, and `$set`.


          The useful distinction: default events tell you what the SDK already records for you, while immutability tells you how to react when the instrumentation was wrong.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/capture-events
            title: PostHog event capture docs
            description: Official reference for default events, SDK capture behavior, and event instrumentation patterns.
        problems:
          - id: ph-events-p2
            type: true_false
            question: PostHog events can be updated after they are captured to correct mistakes.
            correct: 'false'
            explanation: >-
              The common misconception is treating events like mutable profile rows. When event tracking is wrong, the fix is to correct the instrumentation going forward or adjust analysis logic, not
              to rewrite yesterday's event payloads.
          - id: ph-events-p3
            type: multiple_choice
            question: Events with names prefixed by which symbol are PostHog defaults, automatically captured by the SDKs?
            options:
              - "$"
              - "#"
              - "@"
              - "_"
            correct: 0
            explanation: >-
              The `$` prefix marks PostHog-defined default events. If you chose another symbol, you likely remembered a naming style rather than the actual SDK convention. Custom business events
              normally do not use the `$` prefix.
          - id: ph-events-p6
            type: scenario
            question: >-
              A customer realizes they misspelled a custom event name as 'singup_completed' instead of 'signup_completed' for the past two weeks. They ask you to fix the historical events. What do you
              tell them?
            options:
              - You can bulk-edit event names in the PostHog UI
              - Events are immutable — fix the instrumentation going forward and use an action to group both spellings for analysis
              - Delete the misspelled events and re-ingest them with the correct name
              - PostHog automatically corrects common typos
            correct: 1
            explanation: >-
              PostHog events are immutable facts. Once captured, they cannot be edited. The practical fix is to correct the instrumentation code so future events have the right name, then create
              an action that matches both spellings so historical analysis is not disrupted.
      - id: custom-vs-autocapture
        instruction: >-
          PostHog gives you two capture patterns. Autocapture records UI interactions automatically, which is useful for fast discovery and exploratory analysis. Custom events are emitted explicitly in
          your code and describe business actions in stable terms such as `signup_completed` or `subscription_upgraded`. The key judgment is knowing when to promote a behavior from convenient
          autocapture into intentional instrumentation. If the metric matters to the business, tie it to the business fact rather than to the text, selector, or layout of a button.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/capture-events
            title: PostHog capture events docs
            description: SDK examples and guidance for when to rely on autocapture versus when to ship custom events.
        problems:
          - id: ph-autocapture-p1
            type: multiple_choice
            question: What is the main risk of relying solely on autocapture for critical business metrics?
            options:
              - Autocapture does not work in web browsers
              - Autocapture events break when UI text or element structure changes
              - Autocapture is too expensive to use
              - Autocapture only works on mobile apps
            correct: 1
            explanation: >-
              Autocapture identifies elements by their text, CSS classes, and position. When a button changes from 'Sign Up' to 'Get Started,' the autocapture event properties change too, breaking any
              analysis that relied on the old text. Custom events avoid this because you control the event name.
          - id: ph-autocapture-p2
            type: scenario
            question: >-
              A customer wants to track how many users complete their checkout flow. They currently rely on autocapture to detect clicks on the 'Place Order' button. Their frontend team is about to
              redesign the checkout page. What do you recommend?
            options:
              - Keep using autocapture — it will adapt to the new design automatically
              - Add a custom event like posthog.capture('order_completed') that fires on successful checkout, independent of UI elements
              - Disable autocapture entirely to save costs
              - Ask the frontend team not to change the button text
            correct: 1
            explanation: >-
              A custom event like 'order_completed' is tied to the business action (a successful checkout), not the UI element (a button with specific text). It will survive any redesign. Autocapture
              is fragile for critical metrics because it depends on element properties that change with UI updates.
          - id: ph-autocapture-p3
            type: true_false
            question: Autocapture and custom events are mutually exclusive — you must choose one or the other.
            correct: 'false'
            explanation: >-
              You can (and should) use both. Autocapture gives you broad coverage for exploration and discovery. Custom events give you reliable, stable tracking for critical business actions. They
              complement each other.
    section: posthog-data-model
  - id: ph-event-properties
    name: Event Properties — Metadata on Events
    difficulty: 3
    estimatedMinutes: 12
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/product-analytics/capture-events
    prerequisites:
      - ph-events
    encompassing: []
    knowledgePoints:
      - id: default-vs-custom-properties
        instruction: >-
          Every PostHog event carries **properties** — a JSON object of key-value pairs that provide context about the event. Properties come in two flavors.


          **Default properties** are set automatically by the SDK with no code from you. These include: `$browser` (Chrome, Firefox, Safari), `$os` (Mac OS X, Windows, iOS), `$current_url` (the page URL when the event fired), `$referrer` (the referring page), `$device_type` (Desktop, Mobile, Tablet), `$screen_height` and `$screen_width`, `$timestamp`, and `$lib` (which SDK sent it).


          **Custom properties** are ones you define when capturing events, for example passing plan, amount, and currency alongside a purchase event. Custom properties let you attach business context that the SDK cannot infer.


          Properties are the backbone of analysis — you use them to filter events ("show me purchases where plan = pro"), break down metrics ("pageviews by browser"), and segment users. Without properties, events would be bare "something happened" records with no useful context.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/capture-events
            title: Event capture docs
            description: Official reference for default properties and custom capture payloads.
        problems:
          - id: ph-props-p1
            type: multiple_choice
            question: Which of the following is a default property automatically set by the PostHog JS SDK?
            options:
              - plan
              - amount
              - $browser
              - signup_source
            correct: 2
            explanation: >-
              $browser is automatically set by the SDK based on the user's browser. 'plan', 'amount', and 'signup_source' are custom properties that a developer would need to explicitly include when
              capturing events.
          - id: ph-props-p2
            type: multiple_choice
            question: To filter insights by the page where an event occurred, which default property should you use?
            options:
              - $pathname
              - $current_url
              - $host
              - $pageview_id
            correct: 1
            explanation: $current_url is the default property that captures the full URL of the page when the event was fired. It is automatically set by the JS SDK on every event.
          - id: ph-props-p3
            type: true_false
            question: Custom event properties must be defined in the PostHog UI before they can be used in code.
            correct: 'false'
            explanation: >-
              Custom properties are schemaless — you can send any key-value pair in your capture call and PostHog will accept it. No pre-registration or UI configuration is needed. Properties appear
              in the UI automatically after the first event containing them is captured.
      - id: event-vs-person-properties
        instruction: >-
          PostHog has two types of properties that are often confused: **event properties** and **person properties**.


          **Event properties** are attached to a specific event and describe the context of that action at that moment. They are per-event — each event carries its own snapshot. Example: `$current_url`, `button_text`, `cart_value`. If a user visits page A, the event has $current_url = /page-a. If they visit page B, that event has $current_url = /page-b.


          **Person properties** are stored on the person profile and describe the user across all their events. They persist and apply globally. Example: `email`, `plan`, `company_name`. A user on the "pro" plan has that property on their profile regardless of which event you are looking at.


          **The rule of thumb:** "Is this fact about the user generally, across all events?" Use a person property. "Is this fact about this specific action, right now?" Use an event property.


          Event properties do not retroactively change — each event is an immutable snapshot. Person properties are mutable — when you change someone's plan from "free" to "pro," the person property updates immediately.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/person-properties
            title: Person properties docs
            description: Use this when a learner needs the official rule set for persistent user attributes.
        workedExample: >-
          A user clicks "Upgrade" on `/pricing` while still on the free plan. The page URL belongs on the event because it describes that click. The plan belongs on the person because it describes the
          user across many events. Mixing them up either loses history or stores duplicate user facts on every event.
        problems:
          - id: ph-evperson-p1
            type: multiple_choice
            question: A user's subscription plan (free, pro, enterprise) should be stored as which type of property?
            options:
              - Event property — it describes what happened
              - Person property — it describes the user across all events
              - Session property — it describes the visit
              - Group property — it describes the company
            correct: 1
            explanation: >-
              A subscription plan describes the user generally, not a specific action. It should be a person property so it persists on the user's profile. If stored as an event property, you would
              need to attach it to every single event.
          - id: ph-evperson-p2
            type: scenario
            question: >-
              A customer tracks the page URL where a button was clicked. They store this as a person property ($set: { last_clicked_page: '/pricing' }). Every time the user clicks a different button
              on a different page, the person property updates. When they build a funnel analysis, they see unexpected results because the person property reflects the latest click, not the click at
              each funnel step. What went wrong?
            options:
              - They should have used a group property instead
              - Page URL at click time is per-event context and should be an event property, not a person property
              - They need to use $set_once instead of $set
              - Funnel analysis does not support properties
            correct: 1
            explanation: >-
              Page URL at click time is event-specific context — it varies per event. Storing it as a person property overwrites on every click, losing the history. It should be an event property so
              each event preserves the URL at the time of that specific click.
          - id: ph-evperson-p3
            type: matching
            question: Classify each property as event property or person property.
            options:
              - $current_url (page URL at event time)|Event property
              - email (user's email address)|Person property
              - cart_value (value of items in cart at checkout)|Event property
              - plan (user's subscription tier)|Person property
            correct: 0,1,2,3
            explanation: $current_url and cart_value are snapshots of context at event time (event properties). Email and plan describe the user generally and persist across events (person properties).
    section: posthog-data-model
  - id: ph-persons
    name: Persons & Person Profiles
    difficulty: 4
    estimatedMinutes: 18
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/data/persons
    prerequisites:
      - ph-events
      - keys-and-identity
      - relationships
    encompassing:
      - concept: keys-and-identity
        weight: 0.7
      - concept: relationships
        weight: 0.45
    knowledgePoints:
      - id: what-is-a-person
        instruction: >-
          A person in PostHog represents one user identity whose events, sessions, and properties can be tied together in one profile. In graph terms, Person is a one-to-many parent of Events: one
          person can have many events, but events can also exist without a person profile when the user is still anonymous. That distinction matters because new learners often assume every event must
          belong to a person. In PostHog, that is not true.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/data/persons
            title: Persons docs
            description: Official explanation of when person profiles exist and how they relate to identified events.
        problems:
          - id: ph-persons-p1
            type: multiple_choice
            question: Which of the following actions does NOT create a person profile in PostHog?
            options:
              - Calling posthog.identify()
              - Setting person properties with $set
              - Capturing an event with posthog.capture() without any identification
              - Calling posthog.group()
            correct: 2
            explanation: >-
              A plain posthog.capture() call without identification only creates an event with a distinct_id. It does not create a person profile (when using identified_only mode). identify(), $set,
              and group() all trigger person profile creation.
          - id: ph-persons-p2
            type: true_false
            question: Every event in PostHog must have an associated person profile.
            correct: 'false'
            explanation: >-
              Events can exist without a person profile. Anonymous events have a distinct_id but no person record. This is especially true in 'identified_only' mode where person profiles are only
              created when explicit identification occurs.
          - id: ph-persons-p3
            type: multiple_choice
            question: Which PostHog features require a person profile to function?
            options:
              - Viewing raw event data
              - Feature flags, experiments, and cohort targeting
              - Counting total pageviews
              - Viewing the project settings page
            correct: 1
            explanation: >-
              Feature flags need to know who the user is to decide which flag variant to serve. Experiments need person profiles for consistent bucketing. Cohorts group users by properties. All of
              these require person profiles. Raw event counting works without them.
      - id: what-person-profiles-enable
        instruction: >-
          Person profiles matter because several higher-level PostHog capabilities depend on stable user identity. Person properties power segmentation. Feature flags and experiments need a known user
          identity for consistent evaluation and bucketing. Cohorts use person state to build reusable groups. Without person profiles, you can still count events, but you lose person-level targeting,
          longitudinal user context, and many debugging workflows.
        problems:
          - id: ph-persons-p3a
            type: multiple_choice
            question: Which activity still works even if a project has event data but no usable person profiles?
            options:
              - Cohort targeting for feature flags
              - Consistent experiment bucketing per user
              - Counting total pageviews by day
              - Inspecting one user's merged identity history
            correct: 2
            explanation: >-
              Aggregate event counting still works because it does not require stable person identity. The other choices all depend on knowing which events belong to which user over time.
          - id: ph-persons-p4
            type: scenario
            question: >-
              A customer can count pageviews and signups, but they cannot target a feature to users on the `pro` plan or inspect one user's full journey. What missing layer should you look for first?
            options:
              - Session properties only
              - Person profiles with stable identity and person properties
              - Actions built from autocapture
              - Batch exports to a warehouse
            correct: 1
            explanation: >-
              Aggregate events alone are not enough for person-level tooling. Feature targeting and user-level debugging need person profiles plus person properties such as `plan`.
          - id: ph-persons-p5
            type: true_false
            question: Person properties in PostHog can be used to segment users in insights (e.g., 'show me pageviews broken down by plan tier') even without feature flags or experiments.
            correct: 'true'
            explanation: >-
              Person properties power segmentation in insights, not just feature flags. You can break down any event by person properties like plan, role, or signup_source. If you answered false,
              you may have thought person properties are only for targeting features — they are also the backbone of user-level analysis.
      - id: viewing-person-profiles
        instruction: >-
          In the PostHog UI, the person profile is the operational debugging surface. It brings together the user's distinct_ids, person properties, event history, session recordings, feature flag
          evaluations, and group memberships. When a customer asks 'what did user X do?' or 'why is user X seeing this feature?', the person profile is usually the fastest way to inspect the full
          identity state in one place.
        instructionContent:
          - type: callout
            title: Debugging shortcut
            body: >-
              If the question mentions one specific user, start at the person profile before diving into insights. It is the best place to catch duplicate IDs, stale person properties, or unexpected
              flag evaluations.
        workedExample: >-
          A TAM investigates why one customer claims a beta feature never appeared. The person profile shows the user's distinct_ids, recent events, current person properties, and feature flag
          evaluations in one place. That is usually faster than jumping between raw event tables and flag settings separately.
        problems:
          - id: ph-viewing-p1
            type: multiple_choice
            question: Where in the PostHog UI can you see all distinct_ids associated with a person, their properties, event history, and feature flag evaluations?
            options:
              - The Events tab
              - The Person profile page (under People/Persons)
              - The Dashboard settings
              - The Project settings page
            correct: 1
            explanation: >-
              The Person profile page is the central view for an individual user. It shows all distinct_ids, person properties, event history, session recordings, and feature flag evaluations in one
              place.
          - id: ph-viewing-p2
            type: true_false
            question: If two person profiles in PostHog represent the same real human, they can be manually merged in the UI.
            correct: 'true'
            explanation: PostHog supports manual merging of person profiles. This is useful for fixing identification mistakes where the same user accidentally created two separate profiles.
          - id: ph-viewing-p3
            type: scenario
            question: >-
              A customer says 'User X should be seeing the beta feature, but they report it is not showing up.' As a TAM, what is the fastest first debugging step in PostHog?
            options:
              - Re-deploy the feature flag configuration
              - Open User X's person profile to inspect their distinct_ids, person properties, and feature flag evaluations
              - Ask the customer to clear their browser cache
              - Check the ClickHouse query logs
            correct: 1
            explanation: >-
              The person profile is the debugging surface that brings together identity, properties, and flag evaluations in one place. It is the fastest way to see why a specific user is or is not
              seeing a feature. Start there before diving into infrastructure or asking the customer to troubleshoot.
    section: posthog-data-model
  - id: ph-person-properties
    name: Person Properties — $set and $set_once
    difficulty: 4
    estimatedMinutes: 18
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/product-analytics/person-properties
    prerequisites:
      - ph-persons
    encompassing: []
    knowledgePoints:
      - id: setting-person-properties
        instruction: >-
          Person properties live on the person profile rather than on one event. They are meant to describe the user over time. The two main write modes are `$set` and `$set_once`. `$set` overwrites
          the current value. `$set_once` writes only if the property does not already exist. That means changing facts like plan or subscription_status usually use `$set`, while first-touch facts like
          signup_source usually use `$set_once`.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/person-properties
            title: Person properties docs
            description: Official reference for the write patterns and SDK helpers mentioned in this lesson.
        problems:
          - id: ph-personprops-p1
            type: multiple_choice
            question: What is the difference between $set and $set_once in PostHog?
            options:
              - $set is for strings and $set_once is for numbers
              - $set always overwrites the value; $set_once only sets it if no value exists yet
              - $set works on events and $set_once works on persons
              - $set is synchronous and $set_once is asynchronous
            correct: 1
            explanation: >-
              $set always overwrites the current value, regardless of what was there before. $set_once only writes the value if the property does not already exist on the person profile.
          - id: ph-personprops-p3
            type: true_false
            question: If you call $set_once with a property that already has a value on the person profile, PostHog will overwrite it with the new value.
            correct: 'false'
            explanation: >-
              $set_once explicitly does NOT overwrite existing values. If the property already has a value, $set_once silently does nothing.
          - id: ph-personprops-p5
            type: scenario
            question: >-
              A customer calls $set_once({ signup_source: 'google_ads' }) for a user, then later calls $set_once({ signup_source: 'organic' }) for the same user after they visit again through a
              different channel. What value does signup_source have on the person profile?
            options:
              - The value is 'organic' because the latest call wins
              - The value is 'google_ads' because $set_once preserves the first value and ignores subsequent writes
              - Both values are stored as an array
              - The property is deleted because of the conflict
            correct: 1
            explanation: >-
              $set_once writes only if the property does not already exist. Since signup_source was already set to 'google_ads', the second call with 'organic' is silently ignored. This is exactly
              the intended behavior for first-touch attribution data.
      - id: choosing-person-property-updates
        instruction: >-
          The real skill is deciding which facts should stay historically fixed and which should reflect the latest truth. Attribution, original referrer, or first signup date are first-touch facts.
          Plan tier, lifecycle stage, or last_seen_at are current-state facts. If you use `$set` where you needed `$set_once`, you erase history. If you use `$set_once` where you needed `$set`, the
          profile gets stuck with stale data.
        workedExample: >-
          A user signs up through Google Ads. Your code sets plan with `$set` and signup_source with `$set_once`. Months later they upgrade and arrive through a different campaign. Plan should update
          to reflect the user's current state, but signup_source should stay tied to the original acquisition channel.
        problems:
          - id: ph-personprops-p2
            type: scenario
            question: >-
              A customer wants to track each user's original marketing channel (the first channel that brought them) and their current subscription plan. The marketing channel should never change once
              set, but the plan updates on upgrade/downgrade. Which approach is correct?
            options:
              - Use $set for both properties
              - Use $set_once for both properties
              - Use $set_once for marketing channel and $set for plan
              - Use event properties for both instead of person properties
            correct: 2
            explanation: >-
              $set_once for marketing channel preserves the original acquisition source. $set for plan ensures it always reflects the current subscription tier.
          - id: ph-personprops-p4
            type: multiple_choice
            question: To set person properties that should never change after their initial value (like signup_source), which operator should you use?
            options:
              - $set
              - $append
              - $set_once
              - $identify
            correct: 2
            explanation: >-
              Use `$set_once` when the first value should win. If you chose `$set`, you would keep overwriting the history you were trying to preserve.
          - id: ph-personprops-p6
            type: multiple_choice
            question: A customer wants to track both a user's current plan and their original signup date. Which combination of operators is correct?
            options:
              - $set for both plan and signup_date
              - $set_once for both plan and signup_date
              - $set for plan (changes on upgrade) and $set_once for signup_date (never changes)
              - $set_once for plan and $set for signup_date
            correct: 2
            explanation: >-
              Plan changes when users upgrade or downgrade, so it needs $set to reflect the current state. Signup date is a historical fact that should never be overwritten, so it needs $set_once.
              The pattern is: current-state facts use $set, first-touch facts use $set_once.
    section: posthog-data-model
  - id: ph-distinct-id
    name: distinct_id — Linking Events to Persons
    difficulty: 5
    estimatedMinutes: 18
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/data/persons
    prerequisites:
      - ph-persons
      - keys-and-identity
    encompassing:
      - concept: keys-and-identity
        weight: 0.8
    knowledgePoints:
      - id: what-is-distinct-id
        instruction: >-
          The `distinct_id` is the identity key on every PostHog event. It answers the question 'who or which device did this?' and acts like the foreign key from Event to Person. If two events have
          different distinct_ids and nothing links them, PostHog treats them as different identities. That is why distinct_id mistakes create duplicate users so quickly.
        instructionContent:
          - type: callout
            title: Identity question
            body: >-
              When you inspect an event and ask "who is this?", `distinct_id` is the first field doing that work.
          - type: link
            url: https://posthog.com/docs/data/persons
            title: PostHog identity and persons docs
            description: Reference for how distinct_ids, persons, and identification flows relate.
        problems:
          - id: ph-did-p3
            type: true_false
            question: The distinct_id on PostHog events serves as a foreign key linking each event to a person.
            correct: 'true'
            explanation: >-
              If you answered false, the likely confusion is treating `distinct_id` as just another property. It is the identity key on the event. Other properties add context, but `distinct_id`
              determines which user or device the event belongs to.
          - id: ph-did-p4
            type: scenario
            question: >-
              A customer sees two otherwise similar signup events, but one has `distinct_id = anon-123` and the other has `distinct_id = user_42`. No identify or alias link exists between them. How
              will PostHog interpret those events?
            options:
              - As the same person because the event names match
              - As two separate identities until something links the IDs
              - As invalid events that will be rejected
              - As one person if they came from the same IP address
            correct: 1
            explanation: >-
              The event name does not define identity. `distinct_id` does. If the IDs differ and no linkage exists, PostHog keeps them separate. The thing to inspect is the identifier flow, not the
              event label.
          - id: ph-did-p5
            type: multiple_choice
            question: If two PostHog events share the same distinct_id, what can you conclude?
            options:
              - They happened at the same time
              - They were captured by the same SDK
              - PostHog attributes both events to the same identity
              - They have identical properties
            correct: 2
            explanation: >-
              The distinct_id is the identity key. Events with the same distinct_id are attributed to the same user or device. They can have different timestamps, different SDKs, and completely
              different properties. The only thing distinct_id guarantees is identity linkage.
      - id: frontend-vs-backend-distinct-id
        instruction: >-
          Frontend and backend SDKs behave differently. Frontend SDKs generate and persist an anonymous distinct_id automatically on first use, which lets PostHog track pre-login behavior. Backend SDKs
          do not do that. On the server, you must pass a distinct_id yourself on every capture call. That difference is easy to miss, and it explains many 'why did my backend event create a new user?'
          support threads.
        workedExample: >-
          On the web, a visitor lands on `/pricing` and the JS SDK creates `anon-abc`. Later, after login, the app identifies them as `user_42`. On the backend, an API event for that same user must
          also use `user_42`, because the backend will not infer it automatically.
        problems:
          - id: ph-did-p1
            type: multiple_choice
            question: What happens when a frontend PostHog SDK initializes for the first time on a user's device?
            options:
              - It waits for the user to log in before generating an ID
              - It generates a random UUID as the distinct_id and persists it locally
              - It uses the user's IP address as the distinct_id
              - It sends events without any distinct_id
            correct: 1
            explanation: >-
              The frontend SDK creates the anonymous identity for you. If you chose 'waits for login', you are thinking in backend terms, where the application usually has to provide the known user ID.
          - id: ph-did-p2
            type: multiple_choice
            question: Backend PostHog SDKs do not auto-generate a distinct_id. What must you do on every capture call?
            options:
              - Provide a distinct_id
              - Call identify() first
              - Enable autocapture
              - Attach a $session_id
            correct: 0
            explanation: >-
              The server has no browser state to fall back on. If you omit `distinct_id`, PostHog cannot attach the event to the intended user, so the recovery step is to pass the same canonical ID
              your other systems use.
          - id: ph-did-p6
            type: scenario
            question: >-
              A customer's backend Python SDK sends a 'payment_processed' event but does not include a distinct_id in the capture call. What is the most likely outcome?
            options:
              - PostHog auto-generates an anonymous distinct_id like the frontend SDK does
              - The event is rejected or attributed incorrectly because backend SDKs require an explicit distinct_id
              - PostHog infers the user from the IP address
              - The event is stored without any identity and cannot be queried
            correct: 1
            explanation: >-
              Backend SDKs do not auto-generate distinct_ids. If you omit it, the SDK may raise an error or the event may be attributed to a meaningless default. The fix is to always pass the
              known user ID explicitly on every backend capture call.
      - id: multiple-distinct-ids
        instruction: >-
          A single person in PostHog can have **multiple distinct_ids**. This is not a bug — it is by design and essential for linking anonymous and identified behavior.


          **The most common scenario:** a user visits your site and the SDK generates a random distinct_id (say "abc-random-uuid"). They browse several pages. Then they log in, and you call posthog.identify("user_42"). Now this person has two distinct_ids: "abc-random-uuid" and "user_42". All events from both IDs belong to the same person.


          **Other scenarios that create multiple distinct_ids:** a user visits from a second device (generates another random ID), then logs in on that device too — both random IDs plus the known ID are now linked. Or you use posthog.alias to explicitly link two IDs.


          In data modeling terms, this is a **one-to-many relationship:** one Person has many distinct_ids. The person profile page in PostHog shows all distinct_ids associated with a person, which is useful for debugging identification issues.
        workedExample: >-
          Pre-login web browsing might create `anon-web-123`, the mobile app might create `anon-mobile-456`, and login might attach both to `user_42`. One person, several identifiers, one combined
          history.
        problems:
          - id: ph-multi-did-p1
            type: multiple_choice
            question: Why can a single person in PostHog have multiple distinct_ids?
            options:
              - This is a bug in PostHog's identification system
              - Because users generate anonymous IDs before logging in, and identification links the anonymous and known IDs together
              - Because PostHog randomly reassigns distinct_ids every session
              - Because each event must have a unique distinct_id
            correct: 1
            explanation: >-
              Multiple distinct_ids per person is by design. The anonymous ID from before login and the known ID from after login both belong to the same person. PostHog links them via identify() so
              the full user journey is captured.
          - id: ph-multi-did-p2
            type: scenario
            question: >-
              A user browses your site on their laptop (distinct_id: laptop-uuid) and their phone (distinct_id: phone-uuid). They log in on the laptop and you call identify('user_42'). Later they log
              in on the phone and you call identify('user_42') again. How many distinct_ids does this person have?
            options:
              - 1 — only user_42
              - 2 — laptop-uuid and phone-uuid
              - 3 — laptop-uuid, phone-uuid, and user_42
              - 4 — two per device
            correct: 2
            explanation: >-
              The person has three distinct_ids: laptop-uuid (from laptop's first visit), phone-uuid (from phone's first visit), and user_42 (the known ID from both identify calls). All three are
              linked to one person profile.
          - id: ph-multi-did-p3
            type: true_false
            question: In PostHog, the relationship between a Person and their distinct_ids is one-to-one.
            correct: 'false'
            explanation: 'It is one-to-many: one Person can have many distinct_ids. This happens through anonymous browsing on multiple devices, identify() calls, and alias() calls that link IDs together.'
    section: posthog-data-model
  - id: ph-sessions
    name: Sessions — Grouping Events by Visit
    difficulty: 3
    estimatedMinutes: 12
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/data/sessions
    prerequisites:
      - ph-events
      - ph-distinct-id
    encompassing: []
    knowledgePoints:
      - id: how-sessions-work
        instruction: >-
          A **session** in PostHog represents a single visit — a contiguous period of user activity. The JS web SDK and mobile SDKs automatically generate a `$session_id` and attach it to every event. Events with the same `$session_id` belong to the same session.


          **Two rules control session boundaries:** a new session starts after **30 minutes of inactivity** (no events for 30 minutes means the old session ends and the next event starts a new one), and sessions have a **maximum duration of 24 hours** (even with continuous activity, a new session starts after 24 hours).


          **Server-side SDKs** do NOT automatically generate or attach `$session_id` — you must set it manually if you want server events to belong to a session. This means server-side events are typically not associated with sessions unless you explicitly pass the session ID from your frontend.


          Session Replay and Web Analytics both depend on `$session_id` to group events into recordings and visits. Without it, these features cannot function.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/data/sessions
            title: Sessions docs
            description: Official reference for session boundaries and session-scoped properties.
        problems:
          - id: ph-sessions-p1
            type: multiple_choice
            question: What triggers the start of a new session in PostHog?
            options:
              - Every pageview starts a new session
              - 30 minutes of inactivity or 24 hours of continuous activity
              - The user closes and reopens their browser
              - The user navigates to a different domain
            correct: 1
            explanation: >-
              PostHog starts a new session after 30 minutes of inactivity (no events) or after 24 hours of continuous activity. Browser close/open does not necessarily end a session if it happens
              within the 30-minute window.
          - id: ph-sessions-p2
            type: multiple_choice
            question: What is the maximum duration of a single PostHog session, even with continuous activity?
            options:
              - 8 hours
              - 12 hours
              - 24 hours
              - 48 hours
            correct: 2
            explanation: Even with continuous user activity, PostHog caps a session at 24 hours. After that, the next event starts a new session. This prevents infinitely long sessions from skewing analytics.
          - id: ph-sessions-p3
            type: true_false
            question: Server-side PostHog SDKs automatically attach a $session_id to every captured event.
            correct: 'false'
            explanation: >-
              Server-side SDKs do NOT auto-generate or attach $session_id. You must manually pass it if you want server events associated with a session. Only the JS web SDK and mobile SDKs handle
              this automatically.
      - id: session-properties
        instruction: >-
          PostHog computes **session-level properties** automatically from the events within a session. These are distinct from event properties and person properties — they describe the visit as a whole.


          **Key session properties:** `$session_duration` (total time from first to last event), `$entry_current_url` (the URL of the first pageview), `$exit_pathname` (the path of the last pageview), `$pageview_count` (how many pageviews in the session), `$autocapture_count` (how many autocapture events), and `$is_bounce` (whether the session had only one pageview).


          These properties are **computed by PostHog** — you do not set them yourself.


          You can use session properties to filter insights (for example, "show me sessions with duration greater than 5 minutes") and to filter session recordings (for example, "show me bounce sessions on the pricing page"). Session properties are useful for understanding visit quality and user engagement at the session level.
        workedExample: >-
          If a visitor lands on `/pricing`, views three pages, and leaves after six minutes, PostHog can compute entry URL, pageview count, bounce status, and total session duration from that bundle
          of events without you setting those fields manually.
        problems:
          - id: ph-sessprops-p1
            type: multiple_choice
            question: Which of the following is a session property computed by PostHog?
            options:
              - $browser (the user's browser)
              - $session_duration (total time of the visit)
              - plan (the user's subscription tier)
              - $current_url (the page URL at event time)
            correct: 1
            explanation: >-
              $session_duration is a session property computed from the events within a session. $browser is an event property (set per event). 'plan' is a person property. $current_url is an event
              property that varies per event.
          - id: ph-sessprops-p2
            type: true_false
            question: Session properties like $session_duration and $is_bounce must be manually set by the developer.
            correct: 'false'
            explanation: >-
              Session properties are computed automatically by PostHog from the events within a session. You do not set them — PostHog calculates duration, bounce status, pageview counts, entry/exit
              URLs, and other session-level metrics.
          - id: ph-sessprops-p3
            type: scenario
            question: >-
              A customer wants to find session recordings of users who bounced on the pricing page. Which combination of session properties would help filter for this?
            options:
              - $session_duration > 30 minutes and $pageview_count > 10
              - $is_bounce = true and $entry_current_url contains '/pricing'
              - $browser = 'Chrome' and $os = 'Mac OS X'
              - $autocapture_count = 0 and $exit_pathname = '/home'
            correct: 1
            explanation: >-
              $is_bounce identifies single-pageview sessions, and $entry_current_url tells you where the session started. Together they filter for users who landed on /pricing and left without
              viewing another page. These are session properties computed automatically by PostHog.
    section: posthog-data-model
  - id: ph-actions
    name: Actions — Grouping Events for Analysis
    difficulty: 3
    estimatedMinutes: 14
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/data/actions
    prerequisites:
      - ph-events
      - ph-event-properties
    encompassing: []
    knowledgePoints:
      - id: what-are-actions
        instruction: >-
          An action in PostHog is a saved grouping of one or more events that you want to treat as one analytical unit. Instead of rebuilding the same filters in every insight, you define the match
          once in the UI and reuse it. Actions do not create new raw event data. They sit on top of existing events as reusable saved filters, and they apply retroactively to historical matches.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/data/actions#what-is-an-action
            title: Actions docs
            description: Official reference for how actions are defined and where they fit in analysis.
        problems:
          - id: ph-actions-p1
            type: multiple_choice
            question: What is an action in PostHog?
            options:
              - A custom event captured in your product code
              - A saved grouping of events that can be used as a single unit in analysis
              - A webhook that triggers when a specific event occurs
              - A person property that tracks user behavior
            correct: 1
            explanation: >-
              An action is a saved grouping of events defined in PostHog's UI. It lets you combine multiple related events into one analytical unit. Actions are not custom events and are not defined
              in code.
          - id: ph-actions-p2
            type: true_false
            question: Actions in PostHog only apply to events captured after the action is created.
            correct: 'false'
            explanation: >-
              Actions apply retroactively. When you create a new action, it immediately matches all historical events that fit the criteria because actions are saved filters, not rewritten event data.
          - id: ph-actions-p5
            type: multiple_choice
            question: When you create a new action in PostHog, does it generate new event data or work with existing events?
            options:
              - It generates new synthetic events going forward
              - It works with existing events retroactively — actions are saved filters, not new data
              - It only matches events captured after the action is created
              - It creates a copy of matching events in a separate table
            correct: 1
            explanation: >-
              Actions are saved filters that sit on top of existing events. They do not create new data. When you define an action, it immediately matches all historical events that fit the
              criteria. This is why actions apply retroactively.
      - id: actions-vs-custom-events
        instruction: >-
          Actions are best when you already have events and want a reusable analysis layer on top of them, especially for grouping several autocapture patterns without redeploying code. But actions are
          not a substitute for good instrumentation. If a metric is mission-critical and tied to a real business event, a custom event is usually the stronger foundation because it survives UI changes
          better than selector-based matching.
        problems:
          - id: ph-actions-p3
            type: scenario
            question: >-
              A customer has three 'Sign Up' buttons on their site — one in the navbar, one in the hero section, and one in the footer. Each generates a slightly different autocapture event. They want
              to track total signup button clicks as a single metric. What do you recommend?
            options:
              - Rewrite the frontend to use the same CSS class on all three buttons
              - Create an action in PostHog that matches all three autocapture events
              - Use a custom event for each button and add them manually in every insight
              - Ignore two of the buttons and only track one
            correct: 1
            explanation: >-
              An action can group multiple autocapture events into one unit. The customer defines the action once in PostHog's UI, and then uses it anywhere they would use an event — in trends,
              funnels, paths, and other analyses.
          - id: ph-actions-p4
            type: scenario
            question: >-
              A team relies on a "subscription_started" KPI for revenue reporting. Today they approximate it with an action built from checkout-button selectors. What is the stronger long-term
              recommendation?
            options:
              - Keep the action only, because actions are always more reliable than custom events
              - Instrument a custom "subscription_started" event in code and use actions only as a convenience layer when needed
              - Replace the action with a person property
              - Stop tracking the KPI in PostHog
            correct: 1
            explanation: >-
              Actions are useful for grouping existing events, especially UI interactions. But a revenue-critical business event should usually be instrumented explicitly as a custom event so the metric
              survives UI changes and selector drift.
          - id: ph-actions-p6
            type: true_false
            question: For a mission-critical business metric like revenue, relying solely on an action built from autocapture selectors is a strong long-term strategy.
            correct: 'false'
            explanation: >-
              Autocapture-based actions depend on UI element properties (text, selectors, position) that change with redesigns. For mission-critical metrics, a custom event fired explicitly in
              code is the stronger foundation because it survives UI changes. Actions are great as a convenience layer, not as the sole source of truth for revenue.
    section: posthog-data-model
  - id: ph-event-capture
    name: Event Capture — SDKs, API, and Autocapture
    difficulty: 3
    estimatedMinutes: 15
    tags:
      - posthog
      - ingestion
    sourceRef: https://posthog.com/docs/product-analytics/capture-events
    prerequisites:
      - ph-events
      - ph-event-properties
    encompassing: []
    knowledgePoints:
      - id: how-events-enter-posthog
        instruction: >-
          Events reach PostHog through three surfaces: client-side SDKs, server-side SDKs, and the raw HTTP API. Client SDKs run in the browser or app, auto-generate anonymous IDs, and can observe UI
          behavior like pageviews or autocapture. Server SDKs run on your backend, require an explicit distinct_id, and are better for backend actions such as API calls or jobs. The HTTP API is the
          lowest-level option when you need to send capture requests without an official SDK.
        instructionContent:
          - type: image
            url: https://posthog.com/images/products/product-os/event-pipelines.png
            alt: Event pipeline illustration showing data flowing from sources through PostHog
            caption: This visual helps learners connect the capture surface to the metadata and capabilities each path can provide.
            width: 960
          - type: link
            url: https://posthog.com/docs/product-analytics/capture-events
            title: Capturing events docs
            description: Official reference for SDK behavior and capture examples.
        problems:
          - id: ph-capture-p1
            type: multiple_choice
            question: Which type of PostHog SDK supports autocapture and session recording?
            options:
              - Server-side SDKs (Node.js, Python, Go)
              - Client-side SDKs (JS web, React Native, iOS, Android)
              - Both client-side and server-side SDKs equally
              - Neither — autocapture requires a separate tool
            correct: 1
            explanation: >-
              Only client-side SDKs support autocapture and session recording because they run in the user's browser or app and can observe UI interactions directly.
          - id: ph-capture-p2
            type: matching
            question: Match each SDK type to its characteristic.
            options:
              - Client-side SDK|Auto-generates distinct_id, supports autocapture
              - Server-side SDK|Requires explicit distinct_id, no autocapture
              - HTTP API|Direct POST to /capture endpoint without SDK
              - JS web SDK|Supports session recording and the toolbar
            correct: 0,1,2,3
            explanation: >-
              Client-side SDKs handle identity and autocapture automatically. Server-side SDKs need manual distinct_id and lack UI features. The HTTP API is the raw endpoint.
          - id: ph-capture-p5
            type: true_false
            question: Server-side PostHog SDKs can observe UI interactions like button clicks and page scrolls just like client-side SDKs.
            correct: 'false'
            explanation: >-
              Server-side SDKs run on your backend with no access to the browser or app UI. They cannot observe clicks, scrolls, or other UI interactions. Only client-side SDKs running in the
              user's browser or app can do autocapture and session recording.
      - id: choosing-a-capture-surface
        instruction: >-
          All three capture surfaces use a push model: your systems send events to PostHog. The important design choice is which surface owns the event. Use a client SDK when the event depends on UI
          context like page URL or session behavior. Use a server SDK when the event is a backend fact such as a webhook, billing job, or API outcome. Use the HTTP API when you need raw transport
          without an official SDK or when building a custom integration layer.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/how-posthog-works
            title: PostHog architecture overview
            description: Reference when a learner wants to see capture API, ingestion, and storage in one picture.
        problems:
          - id: ph-capture-p3
            type: true_false
            question: PostHog uses a pull-based ingestion model, periodically fetching data from your application.
            correct: 'false'
            explanation: PostHog uses push-based ingestion. Your application sends events to PostHog's capture endpoint via SDKs or the HTTP API.
          - id: ph-capture-p4
            type: scenario
            question: >-
              A backend worker written in an unsupported language needs to send billing events into PostHog with an explicit user ID. Which capture path is the best fit?
            options:
              - The JS web SDK
              - A session replay integration
              - The raw HTTP capture API
              - Autocapture only
            correct: 2
            explanation: >-
              If there is no official SDK, the raw HTTP capture API is the fallback surface. It still lets the worker push events into PostHog with an explicit distinct_id.
          - id: ph-capture-p6
            type: scenario
            question: >-
              A customer needs to track when a webhook from Stripe confirms a successful payment. The event happens entirely on the server with no UI involved. Which capture surface should they use?
            options:
              - The JS web SDK with autocapture
              - A server-side SDK (e.g., Node.js, Python) with an explicit distinct_id
              - Session recording
              - The PostHog toolbar
            correct: 1
            explanation: >-
              Backend events like webhook confirmations have no UI context. A server-side SDK is the right choice because it runs on the backend and lets you explicitly set the distinct_id to the
              customer who made the payment.
    section: posthog-ingestion
  - id: ph-ingestion-pipeline
    name: The Ingestion Pipeline — Kafka to ClickHouse
    difficulty: 5
    estimatedMinutes: 18
    tags:
      - posthog
      - ingestion
    sourceRef: https://posthog.com/docs/how-posthog-works/ingestion-pipeline
    prerequisites:
      - ph-event-capture
      - storage-layers
    encompassing: []
    knowledgePoints:
      - id: why-not-straight-to-db
        instruction: >-
          PostHog does not write events directly into ClickHouse (its analytics database). Instead, events land in **Apache Kafka** first — a distributed message queue designed for high-throughput, durable message streaming.


          Why the indirection? Three reasons:


          **Resilience:** if ClickHouse is temporarily slow, overloaded, or undergoing maintenance, events queue up safely in Kafka rather than being lost or causing backpressure on the capture API.


          **Throughput:** Kafka can absorb massive bursts of events and smooth them out for ClickHouse to consume at a steady rate.


          **Decoupling:** the capture API and ClickHouse do not need to know about each other — Kafka sits between them as a buffer.


          This is the same pattern described in pipeline fundamentals: a message queue between ingestion and storage makes the pipeline more resilient and scalable. The capture API's only job is to validate the event and write it to Kafka. Everything else — person processing, property enrichment, storage — happens downstream.
        instructionContent:
          - type: callout
            title: Mental model
            body: >-
              Capture API -> Kafka buffer -> downstream consumers -> ClickHouse. Kafka buys resilience by absorbing bursts and outages between ingestion and storage.
          - type: link
            url: https://posthog.com/docs/how-posthog-works/ingestion-pipeline
            title: Ingestion pipeline diagram
            description: Use this when explaining why Kafka exists and what happens after the capture endpoint accepts an event.
        problems:
          - id: ph-pipeline-p1
            type: multiple_choice
            question: Why does PostHog write events to Kafka before ClickHouse instead of directly to ClickHouse?
            options:
              - ClickHouse cannot accept data from external sources
              - Kafka provides a buffer so events are not lost if ClickHouse is temporarily slow or down
              - Kafka transforms events into the correct format for ClickHouse
              - It is a legacy design that PostHog plans to remove
            correct: 1
            explanation: >-
              Kafka acts as a durable buffer between ingestion and storage. If ClickHouse is slow or undergoing maintenance, events queue in Kafka safely. Without this buffer, events could be lost
              during ClickHouse downtime.
          - id: ph-pipeline-p2
            type: true_false
            question: PostHog's capture API writes events directly into ClickHouse tables.
            correct: 'false'
            explanation: >-
              The capture API writes events to Kafka, not directly to ClickHouse. Kafka then feeds events into ClickHouse through a table engine and materialized view. This decoupling provides
              resilience and throughput benefits.
          - id: ph-pipeline-p3
            type: scenario
            question: >-
              A PostHog Cloud customer reports that their ClickHouse cluster had a brief maintenance window, but they did not lose any events during that period. What component of the architecture
              prevented data loss?
            options:
              - The client-side SDK cached events in local storage
              - Kafka queued the events durably until ClickHouse was ready to consume them again
              - PostgreSQL stored the events as a backup
              - The capture API retried failed writes automatically
            correct: 1
            explanation: >-
              Kafka is a durable message queue. When ClickHouse is unavailable, events queue in Kafka and are consumed once ClickHouse recovers. This is the primary reason for the Kafka buffer in
              PostHog's architecture.
      - id: the-full-flow
        instruction: >-
          The complete ingestion flow from your app to queryable data:


          **Step 1:** Your app sends an event via SDK or API.


          **Step 2:** PostHog's capture endpoint validates the event and writes it to a Kafka topic.


          **Step 3:** ClickHouse has a Kafka table engine (`kafka_events`) that acts as a consumer, reading events from Kafka and advancing offsets.


          **Step 4:** A materialized view (`events_mv`) reads from `kafka_events` and inserts into the storage tables.


          **Step 5:** Writes go through `writable_events` — a ClickHouse Distributed table that routes each event to the correct shard by hashing distinct_id using sipHash64. This means all events for the same user land on the same shard, making person-level queries efficient.


          **Step 6:** Data lands in `sharded_events` — a ReplicatedReplacingMergeTree table that provides actual durable, replicated storage.


          For reads, queries go through the `events` Distributed table, which fans out to all shards and aggregates results.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/how-posthog-works/clickhouse
            title: ClickHouse tables diagram
            description: Visual walkthrough of the table roles in PostHog's ingestion and storage path.
        problems:
          - id: ph-flow-p1
            type: ordering
            question: Place these PostHog ingestion steps in the correct order.
            options:
              - Materialized view (events_mv) inserts into storage tables
              - App sends event via SDK
              - Data lands in sharded_events (ReplicatedReplacingMergeTree)
              - Capture endpoint writes event to Kafka
              - kafka_events table engine reads from Kafka
            correct: 1,3,4,0,2
            explanation: >-
              The flow is: App sends event, capture endpoint writes to Kafka, kafka_events reads from Kafka, events_mv materialized view inserts into storage, data lands in sharded_events for durable
              storage.
          - id: ph-flow-p2
            type: multiple_choice
            question: How does PostHog decide which ClickHouse shard to store an event on?
            options:
              - Random assignment for load balancing
              - Round-robin across all available shards
              - By hashing the distinct_id using sipHash64
              - Based on the event timestamp
            correct: 2
            explanation: >-
              PostHog shards events by sipHash64(distinct_id). This ensures all events for the same user land on the same shard, making person-level queries (like 'all events for user X') efficient
              because they only need to hit one shard.
          - id: ph-flow-p3
            type: multiple_choice
            question: In PostHog's ClickHouse architecture, which Distributed table handles writes, while reads go through the events Distributed table?
            options:
              - events
              - writable_events
              - sharded_events
              - person_distinct_id_overrides
            correct: 1
            explanation: >-
              writable_events is the Distributed table used for writes — it routes events to the correct shard. The events table is a separate Distributed table used for reads — it fans out queries to
              all shards and aggregates results.
    section: posthog-ingestion
  - id: ph-clickhouse-storage
    name: ClickHouse Storage — Tables and Sharding
    difficulty: 6
    estimatedMinutes: 18
    tags:
      - posthog
      - ingestion
    sourceRef: https://posthog.com/docs/how-posthog-works/clickhouse
    prerequisites:
      - ph-ingestion-pipeline
    encompassing: []
    knowledgePoints:
      - id: table-roles
        instruction: >-
          PostHog's ClickHouse setup uses several tables with different jobs. `kafka_events` consumes from Kafka. `events_mv` is the materialized view that pushes records downstream. `sharded_events`
          is the real durable storage table. `writable_events` and `events` are distributed access layers that sit in front of that storage. The point of learning these names is not memorization for
          its own sake. It is being able to ask which layer is responsible when writes succeed, reads lag, or duplicates appear.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/how-posthog-works/clickhouse
            title: ClickHouse architecture docs
            description: Official diagram and table walkthrough for the storage path described here.
        problems:
          - id: ph-ch-p1
            type: matching
            question: Match each ClickHouse table to its role in PostHog's architecture.
            options:
              - kafka_events|Kafka consumer bridge that reads events from Kafka
              - events_mv|Materialized view that pipes data from Kafka into storage
              - writable_events|Distributed table for writes, routes to correct shard
              - sharded_events|ReplicatedReplacingMergeTree for actual durable storage
            correct: 0,1,2,3
            explanation: kafka_events reads from Kafka. events_mv moves data from the Kafka bridge to storage. writable_events routes writes to the right shard. sharded_events is the actual storage engine.
          - id: ph-ch-p4
            type: multiple_choice
            question: Which ClickHouse table engine does sharded_events use?
            options:
              - MergeTree
              - ReplicatedMergeTree
              - ReplicatedReplacingMergeTree
              - Distributed
            correct: 2
            explanation: >-
              ReplicatedReplacingMergeTree combines replication for durability, replacing behavior for eventual deduplication, and the MergeTree storage engine used for analytical workloads.
          - id: ph-ch-p5
            type: true_false
            question: In PostHog's ClickHouse architecture, kafka_events is where events are durably stored for long-term queries.
            correct: 'false'
            explanation: >-
              kafka_events is a Kafka consumer bridge — it reads events from Kafka and passes them downstream. Durable long-term storage is handled by sharded_events
              (ReplicatedReplacingMergeTree). If you confused the two, the fix is to think of kafka_events as a pipeline stage, not a final destination.
      - id: reads-writes-and-sharding
        instruction: >-
          The second key idea is separation of read and write paths. Writes go through `writable_events`, which chooses a shard by hashing `distinct_id`. Reads go through the `events` distributed
          table, which fans queries out across shards and aggregates the results. That split matters because ingestion and querying have different optimization goals. Sharding by `distinct_id` also
          keeps one user's events together, which helps person-level queries.
        problems:
          - id: ph-ch-p2
            type: multiple_choice
            question: When you run a query in PostHog's insights UI, which ClickHouse table handles the read?
            options:
              - kafka_events
              - writable_events
              - sharded_events directly
              - The events Distributed table
            correct: 3
            explanation: >-
              If you chose `writable_events`, you mixed up the write path with the read path. Insights read through `events`, which fans queries across shards and assembles the result.
          - id: ph-ch-p3
            type: true_false
            question: In PostHog's ClickHouse setup, the same Distributed table is used for both reads and writes.
            correct: 'false'
            explanation: >-
              PostHog uses separate Distributed tables: `writable_events` for writes and `events` for reads. This allows different routing and optimization strategies for ingestion versus querying.
          - id: ph-ch-p6
            type: scenario
            question: >-
              A PostHog engineer mentions that querying all events for a single user is fast because of how data is sharded. Why is this the case?
            options:
              - PostHog caches all user queries in memory
              - Events are sharded by sipHash64(distinct_id), so all events for one user live on the same shard
              - ClickHouse reads all shards in parallel regardless of the query
              - User events are stored in a separate high-speed table
            correct: 1
            explanation: >-
              Sharding by distinct_id ensures all events for the same user land on the same shard. A person-level query only needs to hit one shard instead of scanning all of them. This is a
              deliberate design choice that optimizes the most common PostHog query pattern.
    section: posthog-ingestion
  - id: ph-person-processing
    name: Person Processing — Resolving Events to Profiles
    difficulty: 5
    estimatedMinutes: 17
    tags:
      - posthog
      - ingestion
    sourceRef: https://posthog.com/docs/how-posthog-works/ingestion-pipeline
    prerequisites:
      - ph-ingestion-pipeline
      - ph-persons
      - ph-distinct-id
    encompassing:
      - concept: ph-persons
        weight: 0.55
      - concept: ph-distinct-id
        weight: 0.65
    knowledgePoints:
      - id: how-person-processing-works
        instruction: >-
          Person processing is the ingestion step where PostHog decides whether an event should link to an existing person, create a new one, or trigger a merge. That requires identity lookups,
          possible writes, and sometimes profile reconciliation. Person data lives in PostgreSQL as the source of truth and is replicated into ClickHouse for query performance.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/how-posthog-works/ingestion-pipeline
            title: Ingestion pipeline docs
            description: Official reference for where person processing sits in the full event flow.
        problems:
          - id: ph-pp-p1
            type: multiple_choice
            question: Why is person processing the most expensive part of PostHog's ingestion pipeline?
            options:
              - It requires sending data to external third-party services
              - It involves database lookups, potential writes, and occasionally complex merge operations
              - It encrypts all person data with military-grade encryption
              - It runs machine learning models on every event
            correct: 1
            explanation: >-
              Person processing is expensive because it may need to look up existing identity state, create or update person records, and merge profiles when IDs connect.
          - id: ph-pp-p3
            type: true_false
            question: Person data in PostHog is stored only in ClickHouse.
            correct: 'false'
            explanation: >-
              The misconception here is assuming all analytics state lives only in ClickHouse. Person data is authored in PostgreSQL, then replicated into ClickHouse so queries stay fast.
          - id: ph-pp-p5
            type: multiple_choice
            question: Where does PostHog store person data as the source of truth before replicating it to ClickHouse?
            options:
              - Apache Kafka
              - Redis
              - PostgreSQL
              - Amazon S3
            correct: 2
            explanation: >-
              Person data is authored in PostgreSQL (the source of truth) and then replicated into ClickHouse for fast query performance. If you chose Kafka, that is the event buffer, not the
              person store. The dual-storage design separates identity management (PostgreSQL) from analytical queries (ClickHouse).
      - id: cost-control-and-skip-rules
        instruction: >-
          Because person processing is expensive, PostHog can skip it when the event does not need person-level behavior. In `identified_only` mode, anonymous events with no identify, no `$set`, and
          no group linkage skip person processing entirely. That makes this mode a good fit for high-volume anonymous traffic where the team still wants aggregate analytics but does not need person
          profiles for every visitor.
        problems:
          - id: ph-pp-p2
            type: scenario
            question: >-
              A customer is on PostHog Cloud and notices their bill is higher than expected. They have millions of anonymous pageview events from marketing landing pages where users never log in. What
              configuration change could reduce their costs?
            options:
              - 'Switch to person_profiles: ''always'' to create profiles for every visitor'
              - 'Switch to person_profiles: ''identified_only'' so anonymous events skip person processing'
              - Disable event capture entirely on landing pages
              - Move to self-hosted PostHog
            correct: 1
            explanation: >-
              With `identified_only` mode, anonymous events skip person processing entirely. Since the landing page visitors never log in, their events do not need person profiles.
          - id: ph-pp-p4
            type: multiple_choice
            question: Which event would skip person processing in identified_only mode?
            options:
              - A plain anonymous $pageview with no identify, no $set, and no group linkage
              - An identify() call after login
              - A capture call that includes $set person properties
              - A group() call that links the session to a company
            correct: 0
            explanation: >-
              In `identified_only` mode, plain anonymous events skip person processing. Events that identify, set person properties, or link groups need person-level handling and therefore do not skip it.
          - id: ph-pp-p6
            type: true_false
            question: In identified_only mode, a capture call that includes $set person properties will skip person processing just like a plain anonymous event.
            correct: 'false'
            explanation: >-
              Events with $set, identify, alias, or group linkage trigger person processing even in identified_only mode. Only plain anonymous events with no identification signals skip it. The
              mode is about skipping processing for truly anonymous traffic, not for any event that lacks an identify() call.
    section: posthog-ingestion
  - id: anonymous-vs-identified
    name: Anonymous vs Identified Events
    difficulty: 4
    estimatedMinutes: 16
    tags:
      - posthog
      - identification
    sourceRef: https://posthog.com/docs/data/persons
    prerequisites:
      - ph-person-processing
      - ph-person-properties
    encompassing: []
    knowledgePoints:
      - id: two-modes-of-events
        instruction: >-
          Anonymous events have a distinct_id but no person profile. Identified events are linked to a person profile. Both can be captured and analyzed, but they unlock different capabilities.
          Anonymous events are good for aggregate analytics. Identified events unlock person-scoped features such as feature flags, cohorts, experiments, and richer support workflows.
        instructionContent:
          - type: callout
            title: Shortcut
            body: >-
              Anonymous gets you aggregate analytics. Identified unlocks person-scoped features like feature flags, cohorts, and experiments.
        problems:
          - id: anon-id-p1
            type: multiple_choice
            question: What is the key difference between anonymous and identified events in PostHog?
            options:
              - Anonymous events have no distinct_id; identified events do
              - Anonymous events have a distinct_id but no person profile; identified events are linked to a person profile
              - Anonymous events are not stored; identified events are stored
              - Anonymous events are free; identified events cost extra per event
            correct: 1
            explanation: >-
              Both anonymous and identified events have a distinct_id. The difference is whether a person profile exists behind that identity.
          - id: anon-id-p2
            type: true_false
            question: Anonymous events in PostHog cannot be used for any analysis at all.
            correct: 'false'
            explanation: >-
              Anonymous events are fully queryable for aggregate analysis. They simply do not support person-level features that require a person profile.
          - id: anon-id-p5
            type: matching
            question: Match each PostHog capability to whether it works with anonymous events or requires identified events.
            options:
              - Counting total pageviews per day|Works with anonymous events
              - Feature flag targeting specific users|Requires identified events
              - Aggregate funnel conversion rates|Works with anonymous events
              - Cohort targeting by person properties|Requires identified events
            correct: 0,1,2,3
            explanation: >-
              Aggregate analytics (pageview counts, funnel conversion rates) work with anonymous events because they do not need to know who each user is. Feature flags and cohort targeting require
              person profiles, which means identified events.
      - id: choosing-when-to-identify
        instruction: >-
          Most teams should use a hybrid pattern: capture anonymous browsing before login, then call identify after authentication. That preserves cheap pre-login analytics while still unlocking
          person-level capabilities for known users. The right moment to identify is when you can reliably say which human is behind the session.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/getting-started/identify-users
            title: Identify users guide
            description: Practical checklist for moving from anonymous to identified tracking safely.
        problems:
          - id: anon-id-p3
            type: scenario
            question: A B2B SaaS company wants to use PostHog feature flags to control access to a beta feature for specific users. They currently capture all events anonymously. What must they do first?
            options:
              - Nothing — feature flags work with anonymous events
              - Identify users by calling posthog.identify() after login so person profiles are created
              - Switch to a different analytics tool
              - Create a custom event called 'feature_flag_check'
            correct: 1
            explanation: >-
              Feature flags require person profiles to decide which variant to serve. The company must identify users after login so those profiles exist.
          - id: anon-id-p4
            type: multiple_choice
            question: Which of the following PostHog features works with anonymous events (no person profile)?
            options:
              - Feature flags targeting specific users
              - Experiments with consistent user bucketing
              - Aggregate trend analysis (e.g., total pageviews per day)
              - Cohorts based on person properties
            correct: 2
            explanation: >-
              Aggregate trend analysis works with anonymous events because it does not require knowing who each user is. Feature flags, experiments, and cohorts do.
          - id: anon-id-p6
            type: true_false
            question: The best practice is to identify users as early as possible, even before they authenticate, to capture the most data.
            correct: 'false'
            explanation: >-
              Identifying before authentication risks linking anonymous browsing to the wrong person. The best practice is to call identify() after successful authentication, when you can reliably
              confirm which human is behind the session. Pre-login events are still captured with the anonymous distinct_id and get linked once identify runs.
    section: identification
  - id: identify-call
    name: The Identify Call
    difficulty: 5
    estimatedMinutes: 18
    tags:
      - posthog
      - identification
    sourceRef: https://posthog.com/docs/product-analytics/identify
    prerequisites:
      - anonymous-vs-identified
    encompassing:
      - concept: anonymous-vs-identified
        weight: 0.6
    knowledgePoints:
      - id: how-identify-works
        instruction: >-
          The identify() call is the bridge between anonymous and identified tracking. It links the current anonymous distinct_id to a known ID, creates or reuses the person profile, and applies
          person-property updates from the arguments you pass. After identify runs on the client, subsequent events from that device use the identified distinct_id instead of the anonymous one.
        instructionContent:
          - type: callout
            title: Three things happen at once
            body: >-
              identify links the anonymous browser id to a known id, creates or reuses the person, and updates person properties.
          - type: link
            url: https://posthog.com/docs/product-analytics/identify
            title: Identify docs with SDK examples
            description: Useful for comparing frontend and backend identify behavior side by side.
        workedExample: >-
          User visits your site. The JS SDK generates distinct_id 'abc-random'. They browse several pages. Then they sign up and your code runs posthog.identify('user_42', { email: 'jane@co.com',
          plan: 'free' }). PostHog links the anonymous browsing to user_42, stores both IDs on the same person, and updates the profile properties.
        problems:
          - id: identify-p3
            type: true_false
            question: After calling posthog.identify(), the SDK continues using the original anonymous distinct_id for subsequent events.
            correct: 'false'
            explanation: >-
              After identify(), the SDK switches its internal distinct_id to the one you provided. Subsequent events use the known ID, not the original anonymous one.
          - id: identify-p4
            type: multiple_choice
            question: The second argument to posthog.identify('user_id', { ... }) sets person properties using which semantics?
            options:
              - $set_once
              - $groupset
              - $set
              - It does not set person properties
            correct: 2
            explanation: >-
              Properties passed in the second argument of identify() use `$set` semantics, meaning they overwrite the current value on the person profile.
          - id: identify-p5
            type: multiple_choice
            question: What happens to the anonymous distinct_id after posthog.identify('user_42') is called on the frontend?
            options:
              - The anonymous ID is deleted from the system
              - The anonymous ID is linked to user_42 on the same person profile, and subsequent events use user_42
              - The anonymous ID continues to be used for all future events
              - A new random anonymous ID is generated
            correct: 1
            explanation: >-
              identify() links the anonymous ID and the known ID on the same person profile. After the call, the SDK switches to using the known ID for subsequent events. The anonymous ID is
              preserved as an additional distinct_id on the person, not deleted.
      - id: identify-best-practices
        instruction: >-
          The main risks with identify are timing and identifier quality. Call identify after successful authentication and on each authenticated app load so the client re-establishes the correct
          person context. Use a stable ID that uniquely represents one human being, usually your database user ID. Shared emails or generic account IDs create "frankenstein" profiles by merging
          unrelated people together.
        problems:
          - id: identify-p1
            type: multiple_choice
            question: When should you call posthog.identify() for a user?
            options:
              - Only once ever, on first signup
              - Every time your app loads for an authenticated user and directly after login or signup
              - Only on the very first visit ever
              - Never — PostHog identifies users automatically
            correct: 1
            explanation: >-
              Call identify() every time your app initializes for an authenticated user and directly after login or signup. The SDK deduplicates redundant calls, so this is safe.
          - id: identify-p2
            type: scenario
            question: >-
              A customer calls posthog.identify() with the user's email address as the distinct_id. Two users at the same company share a team email (team@acme.com) and both call identify with it.
              What happens?
            options:
              - PostHog creates two separate person profiles with the same email
              - PostHog merges both users into one person profile, combining all their events — creating a single 'frankenstein' profile
              - PostHog rejects the second identify call
              - Nothing unusual — email is a safe identifier
            correct: 1
            explanation: >-
              If two different anonymous users both identify as the same shared email, PostHog merges them into one person. Use stable unique user IDs instead of shared identifiers.
          - id: identify-p6
            type: true_false
            question: Calling posthog.identify() on every authenticated page load is wasteful and should be avoided.
            correct: 'false'
            explanation: >-
              Calling identify() on every authenticated app load is the recommended practice. The SDK deduplicates redundant calls, so there is no meaningful overhead. This ensures the correct
              person context is always re-established, even if the user returns after their session state was cleared.
    section: identification
  - id: person-merging
    name: Person Merging — Linking Identities
    difficulty: 6
    estimatedMinutes: 15
    tags:
      - posthog
      - identification
    sourceRef: https://posthog.com/docs/data/persons
    prerequisites:
      - identify-call
      - ph-distinct-id
    encompassing:
      - concept: identify-call
        weight: 0.5
      - concept: ph-distinct-id
        weight: 0.45
    knowledgePoints:
      - id: how-merging-works
        instruction: >-
          When you call identify("known-id"), PostHog checks if the current anonymous distinct_id and the known-id already have separate person profiles. If they do, PostHog **merges them into one profile** — combining all events, person properties, and distinct_ids from both profiles.


          **Merge rules:** the most recent value wins for each person property. All distinct_ids from both profiles are linked to the surviving profile. Historical events are re-attributed.


          You can also use **alias("id-a", "id-b")** to explicitly link two IDs without changing the current session's distinct_id. This is useful for connecting IDs across systems, like linking a Stripe customer ID to a PostHog user ID.


          **Reversibility:** merges can be partially reversed using the "Split IDs" feature on person profiles, which splits distinct_ids so future events go to separate profiles. However, historical events are not re-attributed — so it is still critical to use correct, unique identifiers from the start.
        instructionContent:
          - type: callout
            title: Merge effect
            body: >-
              Merging is not just "link these IDs." It can change which profile survives, which properties win, and how history appears on the final person record.
          - type: link
            url: https://posthog.com/docs/data/persons
            title: Persons merge behavior docs
            description: Official reference for merge rules, alias flows, and split-ID recovery behavior.
        problems:
          - id: merge-p1
            type: multiple_choice
            question: When PostHog merges two person profiles, what happens to the events from both profiles?
            options:
              - Events from the older profile are deleted
              - All events from both profiles are combined into the surviving merged profile
              - Events remain in separate profiles but are linked
              - Only the most recent 1000 events are kept
            correct: 1
            explanation: Merging combines all events from both profiles into one. No events are deleted or lost. The merged profile has the complete event history from both original profiles.
          - id: merge-p2
            type: scenario
            question: >-
              User browses anonymously (distinct_id: anon-123, person profile A with 10 events). Then logs in and you call identify('user_42'). User_42 already has a person profile B from a previous
              session with 5 events. What is the final state?
            options:
              - Two separate profiles remain
              - 'One merged profile with 15 events and distinct_ids: anon-123 and user_42'
              - Profile A is deleted and only profile B remains with 5 events
              - A new empty profile is created
            correct: 1
            explanation: PostHog merges profiles A and B into one. The merged profile has all 15 events and both distinct_ids (anon-123 and user_42). No events are lost during merging.
          - id: merge-p3
            type: true_false
            question: Once two person profiles are merged in PostHog, they can be unmerged if the merge was a mistake.
            correct: 'true'
            explanation: >-
              PostHog provides a 'Split IDs' button on person profiles that lets you split previously merged distinct_ids back into separate users. While historical events are not re-attributed, future
              events will go to separate profiles. That said, merges are still risky — use unique, stable identifiers in identify() calls to avoid bad merges in the first place.
      - id: when-merging-goes-wrong
        instruction: >-
          Person merging is powerful but dangerous when misused. Three common mistakes cause bad merges:


          **(1) Identifying with a shared or generic ID:** calling identify("support@company.com") for multiple users merges all of them into one profile. Always use an ID that uniquely identifies one human being — typically a database user ID.


          **(2) Identifying before authentication:** if you call identify() based on a form input before the user actually logs in, you might associate anonymous browsing with the wrong person. Only call identify() after successful authentication.


          **(3) Mismatched IDs across client and server:** if your frontend uses "user_42" but your backend uses "u-42" for the same person, PostHog sees them as different users and creates separate profiles. Use the same canonical ID everywhere.


          **The golden rule:** the distinct_id you pass to identify() must uniquely and permanently identify exactly one human being. When in doubt, use database primary keys.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/getting-started/identify-users
            title: Identify users guide
            description: Best official checklist for avoiding bad merges in production.
        problems:
          - id: merge-wrong-p1
            type: multiple_choice
            question: Which of the following is the safest identifier to use in posthog.identify()?
            options:
              - The user's email address
              - The user's database primary key (e.g., user_42)
              - The user's company name
              - The user's IP address
            correct: 1
            explanation: >-
              Database primary keys are unique per user, stable over time, and not shared. Emails can be shared (team accounts), company names are definitely shared, and IP addresses change and are
              shared across users on the same network.
          - id: merge-wrong-p2
            type: scenario
            question: >-
              A customer's support team all log into PostHog-tracked admin panel using a shared 'admin@company.com' account. They call posthog.identify('admin@company.com') on login. After a month,
              they notice all support agents' actions appear under a single person profile. Why?
            options:
              - PostHog has a bug with email-based identification
              - All agents identified with the same ID, so PostHog merged all their anonymous profiles into one person
              - The admin panel is not compatible with PostHog
              - PostHog only supports one user per email domain
            correct: 1
            explanation: >-
              Every agent's anonymous distinct_id was linked to 'admin@company.com' via identify(). PostHog dutifully merged them all into one person profile. The fix: each agent should identify with
              their own unique ID, not a shared account.
          - id: merge-wrong-p3
            type: multiple_choice
            question: When should you call posthog.identify() in relation to user authentication?
            options:
              - Before the user enters their credentials, to capture login attempts
              - After successful authentication, to ensure you have the correct user ID
              - On every page load, regardless of authentication status
              - Only on the user's very first visit
            correct: 1
            explanation: >-
              Call identify() after successful authentication. Calling it before risks associating anonymous browsing with the wrong user (e.g., if the user types an incorrect email first).
              Authentication confirms the user's identity; identify() should follow, not precede, that confirmation.
    section: identification
  - id: person-modes
    name: Person Modes — identified_only vs Always
    difficulty: 5
    estimatedMinutes: 15
    tags:
      - posthog
      - identification
    sourceRef: https://posthog.com/docs/data/persons
    prerequisites:
      - anonymous-vs-identified
    encompassing: []
    knowledgePoints:
      - id: choosing-a-mode
        instruction: >-
          The `person_profiles` mode controls when person profiles are created. `identified_only` creates them only after explicit identification and is the recommended default for most setups.
          `always` creates a person profile for every distinct_id, including anonymous visitors. The choice is a tradeoff between lower cost and broader anonymous-user capabilities.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/data/persons
            title: Person profiles modes docs
            description: Official reference for `identified_only`, `always`, and the related tradeoffs.
        problems:
          - id: modes-p1
            type: multiple_choice
            question: What is the recommended person_profiles setting for most PostHog implementations?
            options:
              - '''always'' — to capture the most data possible'
              - '''identified_only'' — to reduce costs and only create profiles when needed'
              - '''never'' — to avoid creating any person profiles'
              - '''auto'' — to let PostHog decide automatically'
            correct: 1
            explanation: >-
              `identified_only` is recommended for most use cases because it creates person profiles only when you explicitly identify users.
          - id: modes-p3
            type: scenario
            question: >-
              A high-traffic news website has millions of anonymous visitors per day but only 50,000 registered users. They want to use feature flags for registered users only. Which person_profiles
              mode should they use?
            options:
              - '''always'' — to create profiles for all visitors'
              - '''identified_only'' — to create profiles only for the 50,000 registered users who identify'
              - Disable PostHog on pages without login
              - Use both modes simultaneously
            correct: 1
            explanation: >-
              `identified_only` is ideal here. The anonymous visitors get cheap event tracking without person processing, while identified users still get full person-level features.
          - id: modes-p5
            type: true_false
            question: In 'always' mode, PostHog creates a person profile for every distinct_id, including completely anonymous visitors who never log in.
            correct: 'true'
            explanation: >-
              'always' mode creates a person profile for every distinct_id, regardless of whether the user is identified. This enables person-level features for anonymous users but increases cost.
              If you answered false, you may have been thinking of identified_only mode, which is the opposite behavior.
      - id: mode-gotchas
        instruction: >-
          The biggest gotcha is assuming inline `$set` on a capture call will create a profile in `identified_only` mode. It will not. You still need an identification trigger such as identify, alias,
          group, or the dedicated person-property helper. Use `always` only when you truly need person-level features for anonymous users before login.
        workedExample: >-
          A team sends anonymous `$pageview` events with inline `$set` for `email` and expects feature flags to work before login in `identified_only` mode. They still have no person profile because
          they never triggered identification. The write looked person-shaped, but the identity step never happened.
        problems:
          - id: modes-p2
            type: true_false
            question: In 'identified_only' mode, passing $set properties inside a posthog.capture() call will create a person profile even without calling identify() first.
            correct: 'false'
            explanation: >-
              In `identified_only` mode, inline `$set` on a capture call does NOT create a person profile by itself. You still need an identification trigger.
          - id: modes-p4
            type: scenario
            question: >-
              A consumer app needs to evaluate feature flags for anonymous visitors before signup. Which person_profiles mode is the better fit?
            options:
              - identified_only
              - always
              - neither, because feature flags never work for anonymous users
              - a mix of both in the same project
            correct: 1
            explanation: >-
              If you need person-level capabilities for anonymous visitors before signup, `always` is the better fit because it creates person profiles for every distinct_id.
          - id: modes-p6
            type: scenario
            question: >-
              A team sends anonymous $pageview events with $set: { email: 'test@example.com' } but they are in identified_only mode. They expect the email to appear on a person profile. Why does it not?
            options:
              - $set does not work with email properties
              - In identified_only mode, inline $set on a capture call does not create a person profile without an identification trigger
              - The email format is invalid
              - Person properties only work on mobile SDKs
            correct: 1
            explanation: >-
              This is the biggest gotcha of identified_only mode. Inline $set on a capture call does not trigger person profile creation. The team needs an identification trigger (identify, alias,
              group, or the dedicated person-property helper) to create the profile first.
    section: identification
  - id: identification-pitfalls
    name: Common Identification Pitfalls
    difficulty: 6
    estimatedMinutes: 18
    tags:
      - posthog
      - identification
    sourceRef: https://posthog.com/docs/getting-started/identify-users
    prerequisites:
      - person-merging
      - person-modes
    encompassing: []
    knowledgePoints:
      - id: duplicate-profiles-across-devices
        instruction: >-
          **Duplicate person profiles** — two or more profiles representing the same real human — are the most common identification problem.


          The first version of this problem is **missed identification across devices or platforms**. A user logs in on desktop and gets identified there, but uses the mobile app or another browser without an identify call. That second surface keeps generating anonymous activity under a different distinct_id, so PostHog sees two separate people.


          **The operational rule:** if the same real user can authenticate on multiple surfaces, identify them on every one of those surfaces after authentication.
        instructionContent:
          - type: callout
            title: Same human, different surface
            body: >-
              If one device identifies and another never does, the data model has no reason to treat them as the same person.
        problems:
          - id: pitfall-dup-p1
            type: scenario
            question: >-
              A SaaS customer has both a web app and a mobile app. Users log in on the web app (posthog.identify('user_42') is called), but the mobile app only captures events with the auto-generated
              anonymous distinct_id. What problem will they see in PostHog?
            options:
              - Missing events from the mobile app
              - Duplicate person profiles — one identified from web, one anonymous from mobile, for the same user
              - Events from both platforms merged correctly
              - Error messages in the PostHog UI
            correct: 1
            explanation: >-
              Without identify() on mobile, the mobile events create a separate anonymous profile. The same user now has two profiles: one identified from web and one anonymous from mobile. Fix: call
              identify() on the mobile app after authentication.
          - id: pitfall-dup-p4
            type: true_false
            question: If a user is identified on the web app, PostHog will automatically connect their mobile anonymous events even if the mobile app never calls identify().
            correct: 'false'
            explanation: >-
              PostHog cannot assume the mobile anonymous ID belongs to the same person unless the mobile app also identifies that user. If you answered true, the likely miss was assuming identity
              propagates automatically across platforms.
          - id: pitfall-dup-p5
            type: multiple_choice
            question: What is the operational rule for preventing duplicate profiles across devices?
            options:
              - Only track users on one device at a time
              - Call identify() on every surface (web, mobile, backend) after the user authenticates
              - Use different distinct_ids for each device so PostHog can match them by IP
              - Disable anonymous tracking on all devices except the primary one
            correct: 1
            explanation: >-
              If the same real user can authenticate on multiple surfaces, identify them on every one of those surfaces after authentication. This links all device-specific anonymous IDs to the
              same known identity. PostHog does not infer cross-device identity from IP addresses.
      - id: canonical-ids-across-systems
        instruction: >-
          The second version of duplicate profiles comes from inconsistent IDs across systems. If the web app uses email, the mobile app uses database ID, and the backend uses another string format,
          PostHog receives several unrelated identifiers and cannot safely infer they belong to one person. The fix is to choose one canonical identifier, usually the database primary key, and reuse
          that exact string everywhere. "Close enough" IDs are still different IDs.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/getting-started/identify-users
            title: Identify users guide
            description: Official implementation guide for consistent IDs across SDKs and platforms.
        workedExample: >-
          If the frontend identifies with `user_42`, the backend should also capture with `user_42`, not `usr-42` and not `alice@example.com`. The real job is consistency, not human readability.
        problems:
          - id: pitfall-dup-p2
            type: multiple_choice
            question: What is the best canonical identifier to use across all PostHog SDKs to prevent duplicate profiles?
            options:
              - The user's email address
              - The user's database primary key (e.g., user_id)
              - A random UUID generated per session
              - The user's full name
            correct: 1
            explanation: >-
              Database primary keys are unique, stable, and consistent across all systems. Emails can change or be shared. Session UUIDs change per session. Names are not unique. Use the database
              primary key in every identify() and capture() call.
          - id: pitfall-dup-p3
            type: scenario
            question: 'A customer''s web app calls posthog.identify(''user_42'') and their Node.js backend calls posthog.capture({ distinctId: ''usr-42'', event: ''api_call'' }) for the same user. What happens?'
            options:
              - PostHog automatically recognizes 'user_42' and 'usr-42' are the same person
              - Two separate person profiles are created because the distinct_ids do not match
              - The backend event is rejected
              - PostHog merges them based on IP address
            correct: 1
            explanation: >-
              'user_42' and 'usr-42' are different strings, so PostHog treats them as different users. Two profiles are created. Fix: use the exact same ID string ('user_42') in both the frontend
              identify() call and the backend capture() call.
          - id: pitfall-dup-p6
            type: true_false
            question: Using 'user_42' on the frontend and 'USER_42' on the backend is safe because PostHog treats distinct_ids as case-insensitive.
            correct: 'false'
            explanation: >-
              PostHog treats distinct_ids as exact string matches. 'user_42' and 'USER_42' are different identifiers and will create separate person profiles. Use the exact same canonical string
              everywhere — case, formatting, and all.
      - id: cross-device-gaps
        instruction: >-
          Server-side SDKs do not have a browser session or auto-generated distinct_id. You must always provide a distinct_id explicitly.


          **The common gap:** a user browses anonymously on the web (distinct_id = "abc-random"), then your server captures a backend event with their database ID ("user_42") before the frontend calls identify(). Those events will not link because PostHog has not been told that "abc-random" and "user_42" are the same person.


          **The solution:** always call identify() on the frontend first. Once the frontend SDK knows the user is "user_42," subsequent events from both frontend and backend use the same identity.


          **For fully server-side applications** (no frontend): use the database user ID as distinct_id from the start — there is no anonymous phase.


          **For mobile apps with server-side components:** ensure the mobile app passes its known user ID to the server, and the server uses that same ID in capture() calls.


          **The key principle:** identification flows from the client to the server, not the other way around. The client knows who the user is after login, and the server should use the same identifier.
        workedExample: >-
          If the backend sends `user_created` for `user_42` before the browser identifies its anonymous UUID as `user_42`, you briefly have two identity tracks. The frontend identify call is what
          closes that gap and merges the histories.
        problems:
          - id: pitfall-xdev-p1
            type: scenario
            question: >-
              A user signs up on your website. Your backend immediately sends a 'user_created' event via the Node.js SDK with distinct_id = 'user_42'. One second later, the frontend calls
              posthog.identify('user_42'). Will the pre-signup anonymous browsing events link to 'user_42'?
            options:
              - Yes — the backend event establishes the link
              - Yes — but only after identify() is called on the frontend
              - No — the backend event creates a separate profile for 'user_42' and the frontend anonymous events stay orphaned until identify() runs and merges them
              - No — backend events cannot be linked to frontend events
            correct: 2
            explanation: >-
              The backend event creates a person profile for 'user_42'. When the frontend calls identify('user_42') one second later, PostHog merges the anonymous frontend profile with 'user_42'. The
              events do link — but only because identify() runs on the frontend. If identify() never ran, the anonymous browsing would remain separate.
          - id: pitfall-xdev-p2
            type: true_false
            question: For fully server-side applications with no frontend (e.g., a CLI tool), you should still use random anonymous distinct_ids and call identify() later.
            correct: 'false'
            explanation: >-
              For fully server-side applications, there is no anonymous phase. Use the database user ID as distinct_id from the start in every capture() call. There is no need for random IDs or
              identify() because you always know who the user is on the server.
          - id: pitfall-xdev-p3
            type: multiple_choice
            question: What is the correct order for linking frontend and backend events for the same user?
            options:
              - Backend captures events first, then frontend calls identify()
              - Frontend calls identify() first, then backend uses the same ID in capture calls
              - Both can happen in any order — PostHog handles it automatically
              - Frontend and backend events cannot be linked
            correct: 1
            explanation: >-
              The safest pattern: frontend calls identify() first (linking anonymous browsing to the known ID), then the backend uses the same known ID in all capture() calls. This ensures all events
              — anonymous frontend, identified frontend, and backend — are linked to one person.
    section: identification
  - id: group-types
    name: Group Types — Modeling Organizations
    difficulty: 4
    estimatedMinutes: 15
    tags:
      - posthog
      - groups
    sourceRef: https://posthog.com/docs/product-analytics/group-analytics
    prerequisites:
      - ph-persons
      - ph-event-properties
      - relationships
    encompassing: []
    knowledgePoints:
      - id: what-are-groups
        instruction: >-
          Groups let you associate events with entities beyond individual users, usually companies, teams, projects, or workspaces. In B2B analytics that matters because the important question is
          often "which account used the feature?" rather than "which user clicked?" A group type defines the kind of higher-level entity you want to analyze.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/group-analytics
            title: Group analytics docs
            description: Official reference for how groups work and where they show up in analysis.
        problems:
          - id: groups-p1
            type: multiple_choice
            question: What is the primary purpose of group analytics in PostHog?
            options:
              - To organize PostHog project settings
              - To associate events with entities like companies or teams, enabling B2B analytics
              - To group similar events into actions
              - To create user segments for email marketing
            correct: 1
            explanation: >-
              Group analytics lets you associate events with higher-level entities such as companies or projects so you can analyze behavior at the organization level.
          - id: groups-p2
            type: multiple_choice
            question: How many group types does PostHog allow per project?
            options:
              - '3'
              - '5'
              - '10'
              - Unlimited
            correct: 1
            explanation: >-
              PostHog allows up to 5 group types per project. If you picked a higher number, the likely miss was treating groups like free-form tags instead of a constrained part of the data model.
          - id: groups-p5
            type: scenario
            question: >-
              A B2B customer asks: 'Can I use person properties to store company_name on each user and then aggregate by company?' What is the limitation of this approach compared to group analytics?
            options:
              - There is no limitation — person properties work just as well
              - Person properties require you to duplicate company data on every user and cannot natively count unique companies or filter insights by company-level attributes
              - Person properties are more expensive than group analytics
              - Person properties do not support string values
            correct: 1
            explanation: >-
              Storing company_name as a person property duplicates the data on every user and does not give you a real company entity to aggregate over. Group analytics creates a proper company
              entity with its own properties, enabling questions like 'how many companies used feature X?' without duplication.
      - id: modeling-with-groups
        instruction: >-
          A good group type represents a real entity you want to aggregate over, not just another label. Company, team, or workspace are strong candidates when multiple users belong to the same
          higher-level account. Groups are also a paid capability, so TAMs need to connect the modeling choice to the customer's B2B reporting needs.
        problems:
          - id: groups-p3
            type: true_false
            question: Group analytics is included in all PostHog plans at no additional cost.
            correct: 'false'
            explanation: >-
              If you answered true because the use case feels core to B2B analytics, that is a packaging mistake rather than a modeling one. Group analytics is a paid capability, so plan fit matters.
          - id: groups-p4
            type: scenario
            question: >-
              A B2B SaaS customer wants to answer "how many companies used feature X this month?" even when multiple users from the same account used it. What is the right modeling tool?
            options:
              - Person properties only
              - Group analytics with a company group type
              - Actions only
              - Session properties
            correct: 1
            explanation: >-
              This is the core use case for group analytics. You need a company-level entity so multiple users can roll up to the same account.
          - id: groups-p6
            type: multiple_choice
            question: Which of the following is NOT a good candidate for a PostHog group type?
            options:
              - Company (multiple users belong to one company)
              - Workspace (multiple users share a workspace)
              - Browser (a property of each event, not a multi-user entity)
              - Team (multiple users belong to one team)
            correct: 2
            explanation: >-
              Browser is an event-level property, not a higher-level entity that multiple users belong to. Group types should represent real organizational entities where you want to aggregate
              user behavior. Company, Workspace, and Team are all valid because multiple users share them.
    section: group-analytics
  - id: group-identify
    name: Group Identify & Group Properties
    difficulty: 5
    estimatedMinutes: 15
    tags:
      - posthog
      - groups
    sourceRef: https://posthog.com/docs/product-analytics/group-analytics
    prerequisites:
      - group-types
      - identify-call
    encompassing:
      - concept: group-types
        weight: 0.7
      - concept: identify-call
        weight: 0.45
    knowledgePoints:
      - id: creating-groups-and-properties
        instruction: >-
          Group identify creates or updates the group profile and, in the frontend SDK, also sets the current session's group context. In the JS web SDK, `posthog.group('company', 'acme-inc', {...})`
          associates subsequent events with that company and updates its group properties. Group properties persist on the group profile the same way person properties persist on a person.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/group-analytics
            title: Group analytics docs
            description: Official reference for group creation, group properties, and frontend versus backend group patterns.
        problems:
          - id: grpid-p1
            type: multiple_choice
            question: 'In the JS Web SDK, what does posthog.group(''company'', ''acme-inc'', { plan: ''enterprise'' }) do?'
            options:
              - Creates a new PostHog project called 'acme-inc'
              - Associates subsequent events with company 'acme-inc' and sets group properties
              - Creates a person profile with company name 'acme-inc'
              - Sends an email notification to the acme-inc team
            correct: 1
            explanation: >-
              If you chose a person-profile answer, you collapsed company identity into user identity. `group()` sets group context for the session and updates properties on that group record.
          - id: grpid-p3
            type: true_false
            question: In the JS Web SDK, after calling posthog.group('company', 'acme-inc'), all subsequent events in the session automatically include the company group association.
            correct: 'true'
            explanation: >-
              This is true in the JS web SDK because it remembers group context for the current session. If you answered false, you were probably thinking of backend SDKs, which do not keep that
              state.
          - id: grpid-p5
            type: scenario
            question: >-
              A customer calls posthog.group('company', 'acme-inc') on their frontend but never passes any group properties. What will they see in the People/Groups tab for 'acme-inc'?
            options:
              - A fully populated company profile
              - The group exists in the data model but may appear empty or invisible in the UI without properties
              - An error because groups require at least one property
              - Nothing — the group call is ignored without properties
            correct: 1
            explanation: >-
              Events will link to the group, but the group profile in the UI needs at least one property to be visible and useful. The group exists in the data model, but the People/Groups view
              may not show it or it appears empty. Always set group properties via the third argument or group_identify.
      - id: backend-group-identify-pattern
        instruction: >-
          Backend SDKs do not have persistent session context, so the pattern is split in two. First call group_identify to create or update the group profile. Then attach the `groups` object on each
          capture call that should link the event to that group. This is also where you decide whether a fact belongs on the company profile or on the individual user profile.
        workedExample: >-
          A customer wants every API call tied to a company account. Their backend first sets group properties with group_identify for company `acme-inc`, then includes `groups: { company:
          'acme-inc' }` on each API event. The company plan belongs on the group, not duplicated as a separate person property on every user.
        problems:
          - id: grpid-p2
            type: scenario
            question: A customer uses the Python backend SDK and wants to set company properties and also link events to companies. What is the correct approach?
            options:
              - Call posthog.group() once and all backend events will automatically link
              - 'Call group_identify to set properties, then attach groups: { company: ''acme-inc'' } on every capture() call'
              - Set company name as a person property on each user
              - Use the HTTP API instead of the Python SDK
            correct: 1
            explanation: >-
              Backend SDKs do not keep persistent session state. You must update the group profile separately and attach the group on each capture call.
          - id: grpid-p4
            type: multiple_choice
            question: A customer's subscription plan is shared by every user in the same company account. Where is the best place to store that fact?
            options:
              - As a group property on the company
              - As a separate person property on every user only
              - As an action
              - As a session property
            correct: 0
            explanation: >-
              If the fact is shared by the whole company, put it on the group. Storing it separately on every person duplicates account state and creates drift when one copy changes.
          - id: grpid-p6
            type: true_false
            question: In a backend SDK, calling group_identify once is sufficient to automatically link all future events from that backend to the group.
            correct: 'false'
            explanation: >-
              group_identify only creates or updates the group profile. It does not set session context on the backend because backend SDKs have no persistent session. You must still attach the
              groups object on every capture() call to link events to the group.
    section: group-analytics
  - id: linking-events-to-groups
    name: Linking Events to Groups
    difficulty: 5
    estimatedMinutes: 15
    tags:
      - posthog
      - groups
    sourceRef: https://posthog.com/docs/product-analytics/group-analytics
    prerequisites:
      - group-identify
    encompassing:
      - concept: group-identify
        weight: 0.55
    knowledgePoints:
      - id: frontend-vs-backend-patterns
        instruction: >-
          Frontend and backend SDKs link events to groups differently. In the frontend, calling `group()` once sets group context for the session. In the backend, there is no session context, so you
          must pass the `groups` object on each capture call. The mental model is simple: frontend can remember state for you; backend cannot.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/group-analytics
            title: Group analytics docs
            description: Official reference for frontend and backend group-linking patterns.
        problems:
          - id: link-grp-p1
            type: multiple_choice
            question: In a backend SDK, how do you associate an event with a group?
            options:
              - Call posthog.group() once at application startup
              - Pass a groups object on every capture() call
              - Set a GROUP_ID environment variable
              - Groups are automatically detected from the user's IP address
            correct: 1
            explanation: >-
              Backend SDKs have no persistent session. You must explicitly pass `groups: { company: 'acme-inc' }` on every capture call that should link to the group.
          - id: link-grp-p2
            type: true_false
            question: A single PostHog event can be linked to multiple groups of the same type (e.g., two different companies).
            correct: 'false'
            explanation: >-
              An event can link to only one group instance per type. You can link to multiple types, but not multiple companies on the same event.
          - id: link-grp-p5
            type: scenario
            question: >-
              A customer uses the JS web SDK and calls posthog.group('company', 'acme-inc') during session start. Later in the same session, they capture a 'feature_used' event. Is this event linked
              to acme-inc?
            options:
              - No — each event needs an explicit group attachment
              - Yes — the frontend SDK remembers group context for the session after group() is called
              - Only if they also call identify() in the same session
              - Only if the event name starts with '$'
            correct: 1
            explanation: >-
              The JS web SDK persists group context for the session. After calling group(), all subsequent events in that session automatically include the group association. This is the key
              difference from backend SDKs, which have no persistent session state.
      - id: group-linking-constraints
        instruction: >-
          One event can carry multiple group types at once, such as company and project, but only one instance of each type. That limitation matters in consulting or marketplace use cases where a
          person may relate to multiple companies. The event still needs one clear company owner unless you redesign the model.
        workedExample: >-
          A consultant might belong to both `acme` and `globex`, but a single invoice export event still needs one company owner if you want clean company-level reporting. If both companies matter,
          the model needs a different event design, not two company IDs on one event.
        problems:
          - id: link-grp-p3
            type: scenario
            question: A customer's user belongs to two companies (they are a consultant). The customer wants every event from this user to be attributed to both companies. Is this possible?
            options:
              - Yes — pass both company IDs in the groups object
              - No — an event can only link to one group per type. They need to choose which company each event belongs to
              - Yes — call posthog.group('company', ...) twice
              - Yes — use the alias() function to link both companies
            correct: 1
            explanation: >-
              PostHog only supports one group instance per group type per event. The model needs to choose one company or use a different grouping design.
          - id: link-grp-p4
            type: multiple_choice
            question: Which combination is allowed on a single PostHog event?
            options:
              - Two companies and one project
              - One company and one project
              - Two projects and two companies
              - Unlimited groups of the same type
            correct: 1
            explanation: >-
              A single event can link to multiple group types at once, such as one company and one project, but only one instance of each type.
          - id: link-grp-p6
            type: true_false
            question: A single PostHog event can be linked to one company group and one project group at the same time.
            correct: 'true'
            explanation: >-
              An event can carry multiple group types simultaneously — for example, one company and one project. The constraint is one instance per type, not one group total. This is useful when
              events need to be analyzed at both the company and project level.
    section: group-analytics
  - id: group-gotchas
    name: Group Analytics Gotchas
    difficulty: 5
    estimatedMinutes: 15
    tags:
      - posthog
      - groups
    sourceRef: https://posthog.com/docs/product-analytics/group-analytics
    prerequisites:
      - linking-events-to-groups
    encompassing: []
    knowledgePoints:
      - id: important-limitations
        instruction: >-
          Two group gotchas show up early. First, groups still depend on identified event flow. Anonymous events in `identified_only` mode do not link to groups. Second, a group needs at least one
          property to show up in the UI. If you only attach group keys to events but never set properties, the group exists in the data model but stays effectively invisible in the People/Groups view.
        instructionContent:
          - type: callout
            title: Data-model vs UI gap
            body: >-
              A group can participate in event linkage before it feels "real" in the UI. Visibility usually arrives only after you also set group properties.
        problems:
          - id: gotcha-p1
            type: true_false
            question: Anonymous events (in 'identified_only' mode) can still be linked to groups.
            correct: 'false'
            explanation: >-
              Anonymous events in `identified_only` mode skip person processing, so group linkage never gets established. If you answered true, the likely miss was assuming groups bypass the normal
              identity pipeline.
          - id: gotcha-p2
            type: multiple_choice
            question: A customer created a group type 'company' and linked events to it, but they cannot see any company groups in the People/Groups tab. What is the most likely cause?
            options:
              - Group analytics is not enabled on their plan
              - They linked events to groups but never set any group properties via group_identify or group()
              - The People/Groups tab does not support group analytics
              - They need to wait 24 hours for groups to appear
            correct: 1
            explanation: >-
              A group needs at least one property to appear in the UI. Linking events alone is not enough to make it visible in the People/Groups view.
          - id: gotcha-p5
            type: scenario
            question: >-
              A customer linked events to a 'company' group type and can filter insights by company. But when they go to People > Groups, the company list is empty. What is the most likely cause?
            options:
              - Group analytics is not enabled on their plan
              - They linked events to groups but never called group_identify or set any group properties
              - Groups only appear after 24 hours
              - The People tab does not support groups
            correct: 1
            explanation: >-
              A group needs at least one property to appear in the People/Groups view. Linking events alone creates the group association in the data model but does not populate the group profile.
              The fix is to call group_identify or pass properties in the group() call.
      - id: limits-and-feature-constraints
        instruction: >-
          The second set of gotchas is product limits. Projects support at most 5 group types, so the customer must model carefully. Some product surfaces also do not support groups directly. That
          means a workable group model can still fail if the team assumes every other feature in PostHog understands groups the same way.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/group-analytics
            title: Group analytics limits and support
            description: Keep this handy when validating whether a specific PostHog surface supports groups the way the customer expects.
        problems:
          - id: gotcha-p3
            type: scenario
            question: 'A customer wants to set up 7 different group types: company, team, department, project, workspace, region, and vertical. What constraint will they hit?'
            options:
              - No constraint — PostHog supports unlimited group types
              - PostHog allows a maximum of 5 group types per project
              - Each group type requires a separate PostHog project
              - Group types must be approved by PostHog support
            correct: 1
            explanation: >-
              If you picked unlimited, you were reasoning from the business model instead of the product constraint. PostHog caps projects at 5 group types, so the customer must prioritize the most
              valuable rollups.
          - id: gotcha-p4
            type: true_false
            question: You can target groups directly with PostHog's early access feature management.
            correct: 'false'
            explanation: Early access feature management does not support groups directly, so teams need to verify feature support instead of assuming every group-aware surface works the same way.
          - id: gotcha-p6
            type: multiple_choice
            question: >-
              A customer wants to use groups in PostHog Session Replay to filter recordings by company. Before recommending this, what should you verify first?
            options:
              - That the customer has more than 5 group types configured
              - Whether Session Replay supports group-level filtering, since not all PostHog surfaces support groups equally
              - That the customer is on the free plan
              - That the customer has disabled person profiles
            correct: 1
            explanation: >-
              Not every PostHog product surface supports groups the same way. Before recommending group-based filtering in a specific feature, verify that the feature actually supports it. A
              workable group model can still fail if the team assumes every surface understands groups identically.
    section: group-analytics
  - id: ph-cdp-overview
    name: PostHog CDP — Sources, Transformations, Destinations
    difficulty: 4
    estimatedMinutes: 16
    tags:
      - posthog
      - cdp
    sourceRef: https://posthog.com/docs/cdp
    prerequisites:
      - ph-ingestion-pipeline
      - transformation-etl-elt
    encompassing:
      - concept: ph-ingestion-pipeline
        weight: 0.45
      - concept: transformation-etl-elt
        weight: 0.4
    knowledgePoints:
      - id: three-pieces
        instruction: >-
          PostHog's CDP breaks into three surfaces. Sources bring external data into PostHog's warehouse. Transformations modify events during ingestion. Destinations send data out of PostHog to
          other tools. The important idea is that these surfaces map to different moments in the data flow: import, modify, export.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/cdp
            title: PostHog CDP docs
            description: Best reference when a conversation spans imports, in-flight changes, and downstream delivery.
        problems:
          - id: cdp-p1
            type: matching
            question: Match each PostHog CDP component to its function.
            options:
              - Sources|Import external data into PostHog's data warehouse
              - Transformations|Modify events in-flight during ingestion
              - Destinations|Export PostHog data to other tools
              - Batch exports|Scheduled dumps to data warehouses like BigQuery
            correct: 0,1,2,3
            explanation: Sources bring external data in. Transformations modify events during ingestion. Destinations send data out. Batch exports are one destination type.
          - id: cdp-p2
            type: multiple_choice
            question: A customer wants to remove email addresses from all event properties before they are stored in PostHog. Which CDP component should they use?
            options:
              - Sources
              - Transformations
              - Batch exports
              - Cohorts
            correct: 1
            explanation: >-
              Transformations modify events in-flight during ingestion, which is where PII scrubbing belongs. If you chose Source or Destination, you placed the fix on the wrong side of storage.
          - id: cdp-p5
            type: true_false
            question: PostHog CDP Transformations can modify events after they have already been stored in ClickHouse.
            correct: 'false'
            explanation: >-
              Transformations modify events in-flight during ingestion, before they reach storage. Once events are stored in ClickHouse, they are immutable. If you answered true, the likely
              confusion is between in-flight transformation and post-storage editing.
      - id: choosing-the-cdp-surface
        instruction: >-
          The practical skill is choosing the right surface for the job. If the customer wants extra data available inside PostHog, think Sources. If they need to change incoming events before
          storage, think Transformations. If they need PostHog data to leave for another system, think Destinations.
        workedExample: >-
          A TAM helps a customer bring Stripe billing data into PostHog, strip email addresses from signup events before storage, and then export cleaned usage data to BigQuery every night. That one
          workflow touches all three CDP surfaces in sequence: import, modify, export.
        problems:
          - id: cdp-p3
            type: true_false
            question: PostHog CDP Sources allow you to query external data (like Stripe or Hubspot) alongside PostHog event data.
            correct: 'true'
            explanation: >-
              Sources are the import surface. If you answered false, you likely mixed them up with destinations, which move PostHog data out to other tools.
          - id: cdp-p4
            type: scenario
            question: A customer wants Stripe subscription data available inside PostHog so they can join it with product usage in SQL. Which CDP surface is the best fit?
            options:
              - Source
              - Transformation
              - Realtime destination
              - Cohort
            correct: 0
            explanation: >-
              If the goal is to bring external data into PostHog for analysis, the right surface is a Source. Choosing Transformation or Destination would confuse "bring data in" with "modify data"
              or "send data out."
          - id: cdp-p6
            type: scenario
            question: >-
              A customer workflow requires three things: import Stripe billing data into PostHog, strip PII from incoming events before storage, and send cleaned usage data to BigQuery nightly. How
              many CDP surfaces does this touch?
            options:
              - One — Destinations handles all three
              - Two — Sources and Destinations
              - Three — Sources (import), Transformations (PII stripping), and Destinations (BigQuery export)
              - None — this requires custom code outside PostHog
            correct: 2
            explanation: >-
              Each step maps to a different CDP surface. Sources bring Stripe data in. Transformations strip PII during ingestion. Destinations export cleaned data to BigQuery. This is a real-world
              example of all three surfaces working together in sequence.
    section: posthog-cdp
  - id: ph-destinations-exports
    name: Destinations & Batch Exports
    difficulty: 4
    estimatedMinutes: 15
    tags:
      - posthog
      - cdp
    sourceRef: https://posthog.com/docs/cdp/batch-exports
    prerequisites:
      - ph-cdp-overview
    encompassing:
      - concept: ph-cdp-overview
        weight: 0.55
    knowledgePoints:
      - id: realtime-vs-batch
        instruction: >-
          PostHog destinations come in two broad forms. Realtime destinations push matching events out immediately. Batch exports send data out on a schedule in bulk. Realtime is for triggers and
          alerts. Batch is for warehouses, archives, and downstream modeling at scale.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/cdp/batch-exports
            title: Batch exports docs
            description: Good reference when learners need concrete examples of realtime versus scheduled export patterns.
        problems:
          - id: dest-p1
            type: multiple_choice
            question: When should a customer use a realtime destination instead of a batch export?
            options:
              - When they need to export millions of events to a data warehouse daily
              - When they need immediate notifications or triggers based on specific events
              - When they want to reduce PostHog costs
              - When they need to import data into PostHog
            correct: 1
            explanation: Realtime destinations are for immediate, event-driven actions. Batch exports are for scheduled bulk movement to other systems.
          - id: dest-p2
            type: matching
            question: Match each export type to its best use case.
            options:
              - Realtime destination|Slack alert when a VIP user churns
              - Batch export to BigQuery|Nightly sync of all events for cross-platform analysis
              - Batch export to S3|Archive raw event data for compliance
              - Realtime webhook|Trigger a workflow in another tool when a signup event fires
            correct: 0,1,2,3
            explanation: Realtime destinations handle immediate triggers. Batch exports handle scheduled bulk movement for analytics and archival.
          - id: dest-p5
            type: true_false
            question: Batch exports are the right choice when a customer needs sub-second delivery of every event to an external system.
            correct: 'false'
            explanation: >-
              Batch exports run on a schedule (hourly, daily) and send data in bulk. For sub-second delivery, a realtime destination is the right choice. Batch is for warehouses and archives where
              freshness of minutes to hours is acceptable.
      - id: operating-exports
        instruction: >-
          The second decision is operational: filtering, testing, and monitoring. Realtime flows should send only the events that matter. Batch exports should be tested before scheduling and monitored
          once live. The wrong export type is usually expensive or noisy, but the unmonitored export is worse because it quietly fails.
        workedExample: >-
          A customer wants a Slack alert whenever an enterprise account churns and a nightly Snowflake sync of all events for BI reporting. The correct design uses both destination types together: a
          realtime destination for the alert and a batch export for the nightly warehouse sync.
        problems:
          - id: dest-p3
            type: scenario
            question: A customer needs all their PostHog event data in Snowflake for their data team to run custom SQL analysis. They need data updated daily, not in real-time. What should you recommend?
            options:
              - A realtime destination pushing every event to Snowflake
              - A batch export to Snowflake scheduled to run daily
              - Manually exporting CSV files from the PostHog UI
              - Using PostHog's HogQL instead of Snowflake
            correct: 1
            explanation: >-
              A batch export to Snowflake is the right fit: scheduled, bulk data transfer to a warehouse. Daily updates match the requirement.
          - id: dest-p4
            type: multiple_choice
            question: Which extra step most helps prevent a batch export from failing silently after launch?
            options:
              - Turning every batch export into a realtime destination
              - Monitoring export runs and logs after scheduling it
              - Removing all filters from the export
              - Replacing Snowflake with CSV downloads
            correct: 1
            explanation: >-
              Monitoring is what catches broken credentials, schema drift, and downstream delivery failures before the customer discovers missing data.
          - id: dest-p6
            type: scenario
            question: >-
              A customer wants both a Slack alert when a VIP customer churns and a nightly sync of all events to Snowflake. How many destination types do they need?
            options:
              - One — a single batch export can handle both
              - One — a single realtime destination can handle both
              - Two — a realtime destination for Slack alerts and a batch export for the Snowflake sync
              - None — PostHog does not support both at the same time
            correct: 2
            explanation: >-
              These are two different delivery patterns. The Slack alert needs immediate, event-driven delivery (realtime destination). The Snowflake sync needs scheduled bulk transfer (batch
              export). The right design uses both destination types together.
    section: posthog-cdp
  - id: cohorts
    name: Cohorts — Static and Dynamic User Groups
    difficulty: 4
    estimatedMinutes: 15
    tags:
      - posthog
      - querying
    sourceRef: https://posthog.com/docs/data/cohorts
    prerequisites:
      - ph-person-properties
      - ph-event-properties
    encompassing:
      - concept: ph-person-properties
        weight: 0.45
    knowledgePoints:
      - id: static-vs-dynamic
        instruction: >-
          A cohort is a saved group of persons you can reuse in analysis and targeting. Static cohorts are fixed lists. Dynamic cohorts recalculate based on criteria such as person properties,
          behavior, or lifecycle state. That makes dynamic cohorts great for living segments and static cohorts great for frozen snapshots.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/data/cohorts
            title: Cohorts docs
            description: Official reference for static cohorts, dynamic cohorts, and operational recalc behavior.
        problems:
          - id: cohort-p1
            type: multiple_choice
            question: What is the key difference between static and dynamic cohorts in PostHog?
            options:
              - Static cohorts are faster to query
              - Static cohorts have fixed membership; dynamic cohorts automatically update based on criteria
              - Static cohorts support more filter types
              - Dynamic cohorts are only available on paid plans
            correct: 1
            explanation: >-
              Static cohorts are fixed lists, while dynamic cohorts recalculate membership based on criteria. If you chose another option, the likely mistake was focusing on performance or plan limits
              instead of membership behavior.
          - id: cohort-p4
            type: multiple_choice
            question: How often do dynamic cohorts in PostHog recalculate their membership?
            options:
              - In real-time, on every event
              - Every hour
              - Approximately every 24 hours
              - Only when manually triggered
            correct: 2
            explanation: >-
              Dynamic cohorts update on a schedule, not on every event. If you expected instant membership changes, that is the operational assumption to correct.
          - id: cohort-p5
            type: scenario
            question: >-
              A customer wants to freeze the list of users who were active in January for a one-time promotion. They do not want the list to change as new users become active. Which cohort type
              should they use?
            options:
              - Dynamic cohort — it will automatically keep January users
              - Static cohort — a fixed list that does not change after creation
              - A feature flag instead of a cohort
              - A HogQL query saved as a view
            correct: 1
            explanation: >-
              A static cohort is a frozen snapshot of users. Once created, it does not change. A dynamic cohort would keep recalculating and might include or exclude users as their behavior changes.
              For a one-time promotion tied to a specific historical window, static is the right choice.
      - id: cohorts-for-analysis-vs-rollout
        instruction: >-
          The common trap is assuming every cohort that is valid for analysis is also valid for feature-flag targeting. It is not. Behavioral and lifecycle dynamic cohorts are great for analysis, but
          feature flags only support dynamic cohorts based on person properties. If you need a rollout based on recent behavior, create the behavioral cohort for analysis and then snapshot it into a
          static cohort for targeting.
        workedExample: >-
          A product team wants to analyze users who completed onboarding in the last 7 days and also roll out a feature to that same set. The dynamic behavioral cohort works for analysis. The rollout
          needs a static snapshot because feature flags cannot target dynamic behavioral cohorts directly.
        problems:
          - id: cohort-p2
            type: true_false
            question: You can target a feature flag using a dynamic cohort based on behavioral criteria (e.g., 'performed login in last 7 days').
            correct: 'false'
            explanation: >-
              This is the common trap: a dynamic behavioral cohort works for analysis but not for feature-flag rollout. Flag targeting only supports dynamic cohorts based on person properties.
          - id: cohort-p3
            type: scenario
            question: >-
              A customer wants to roll out a feature flag to all users who completed onboarding in the last 30 days. They create a dynamic cohort with behavioral criteria 'performed
              onboarding_complete in last 30 days.' They try to use it in a feature flag but it does not work. Why?
            options:
              - The cohort has too many members
              - Feature flags cannot target dynamic cohorts with behavioral criteria — only person property criteria
              - The event name 'onboarding_complete' is invalid
              - Feature flags do not support cohort targeting at all
            correct: 1
            explanation: >-
              Feature flags only support dynamic cohorts based on person properties. The workaround is to snapshot the behavioral cohort into a static cohort for targeting.
          - id: cohort-p6
            type: multiple_choice
            question: >-
              A product team creates a dynamic cohort defined as 'users who performed purchase in last 7 days.' They want to use it for both a trends insight and a feature flag rollout. What will
              happen?
            options:
              - Both uses work perfectly
              - The trends insight works, but the feature flag will not accept a behavioral dynamic cohort — only person-property-based dynamic cohorts
              - Neither use works because dynamic cohorts are only for email targeting
              - The feature flag works but the trends insight does not
            correct: 1
            explanation: >-
              Behavioral dynamic cohorts work in analysis (trends, funnels) but feature flags only support dynamic cohorts based on person properties. The workaround for rollout is to snapshot the
              behavioral cohort into a static cohort and target the flag at that.
    section: querying
  - id: hogql-basics
    name: HogQL — SQL in PostHog
    difficulty: 5
    estimatedMinutes: 16
    tags:
      - posthog
      - querying
    sourceRef: https://posthog.com/docs/sql
    prerequisites:
      - ph-events
      - ph-event-properties
      - ph-persons
    encompassing:
      - concept: ph-events
        weight: 0.35
      - concept: ph-event-properties
        weight: 0.45
      - concept: ph-persons
        weight: 0.3
    knowledgePoints:
      - id: sql-expressions-and-insights
        instruction: >-
          HogQL shows up in two forms inside PostHog. SQL expressions are short snippets used inside existing UI builders. SQL insights are full queries with SELECT, FROM, WHERE, GROUP BY, ORDER BY,
          and JOIN. Both are built on PostHog's SQL layer, but they solve different levels of problem.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/sql
            title: HogQL docs
            description: Keep this handy when moving from the insight builder to direct SQL.
        problems:
          - id: hogql-p1
            type: multiple_choice
            question: In PostHog, what are the two ways HogQL can be used?
            options:
              - As a programming language and a database engine
              - As SQL expressions within UI builders and as full SQL insights
              - As a frontend framework and a backend API
              - As a data import tool and a data export tool
            correct: 1
            explanation: HogQL appears as short SQL expressions inside UI builders and as full SQL insights when you need complete query control.
          - id: hogql-p2
            type: true_false
            question: HogQL should be the first tool you reach for when creating PostHog insights.
            correct: 'false'
            explanation: >-
              If you reached for HogQL first, you skipped the simpler tool. Start with the UI builder and drop to HogQL only when the query shape, joins, or custom logic truly require it.
          - id: hogql-p5
            type: scenario
            question: >-
              A customer wants to add a custom column to a PostHog Trends breakdown that concatenates browser and OS into a single label (e.g., 'Chrome / Mac OS X'). They do not need a full SQL query.
              Which HogQL form should they use?
            options:
              - A full SQL insight with SELECT, FROM, and GROUP BY
              - A HogQL expression inside the existing Trends UI builder
              - An action with a custom event name
              - A person property combining browser and OS
            correct: 1
            explanation: >-
              For small, targeted customizations within the existing UI, a HogQL expression is the right tool. You can write concat(properties.$browser, ' / ', properties.$os) directly in the
              breakdown field. A full SQL insight would be overkill for this use case.
      - id: when-to-use-hogql
        instruction: >-
          HogQL earns its complexity when the UI builder runs out of room. If you need custom bucketing logic, joins to persons or warehouse tables, or a query shape the insight builder cannot
          express, HogQL becomes the right tool. The best practice is still the same: begin simple, then drop to SQL only when the extra flexibility is justified.
        workedExample: >-
          A customer wants to group browser values into custom families and join the result to person properties. A standard trend may get part of the way there, but the join and custom bucketing are
          the signal that HogQL is now the better fit.
        problems:
          - id: hogql-p3
            type: multiple_choice
            question: In HogQL, which table do you query to access all captured events in PostHog?
            options:
              - persons
              - events
              - sessions
              - groups
            correct: 1
            explanation: >-
              If you chose `persons` or `sessions`, you mixed up supporting tables with the main event log. `events` is the base table for captured event records.
          - id: hogql-p4
            type: scenario
            question: >-
              A customer needs to join product events to person properties and a warehouse table with billing data, and the insight builder cannot express the full logic. What is the best next step?
            options:
              - Keep forcing the Trends UI to do it
              - Use HogQL in a SQL insight
              - Create an action and hope it is enough
              - Export the data manually as CSV first
            correct: 1
            explanation: >-
              This is the kind of case where HogQL earns its complexity. Once you need joins and custom query structure beyond the UI, a SQL insight is the right tool.
          - id: hogql-p6
            type: true_false
            question: HogQL queries in PostHog can join the events table to external data warehouse tables that have been connected via Sources.
            correct: 'true'
            explanation: >-
              HogQL supports joins to warehouse tables, which is one of its key advantages over the UI builder. Once external data (like Stripe billing) is connected via Sources, you can join
              it to event data in a SQL insight. This is the kind of use case where HogQL earns its complexity.
    section: querying

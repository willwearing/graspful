course:
  id: posthog-tam-onboarding
  name: PostHog TAM Technical Onboarding
  description: >-
    Comprehensive technical onboarding for PostHog Technical Account Managers — from data modeling fundamentals through the PostHog data model, ingestion pipeline, identification, group analytics,
    CDP, and querying.
  estimatedHours: 12
  version: '2026.1'
  sourceDocument: PostHog product documentation (analytics, persons, group analytics, CDP, and HogQL docs), reviewed March 2026
sections:
  - id: data-modeling-basics
    name: Data Modeling Basics
    description: Entities, attributes, and keys — the building blocks of any data model.
    sectionExam:
      enabled: true
      passingScore: 0.75
      timeLimitMinutes: 12
      questionCount: 6
      blueprint:
        - conceptId: entities
          minQuestions: 2
        - conceptId: attributes
          minQuestions: 2
        - conceptId: keys-and-identity
          minQuestions: 2
      instructions: >-
        Work without step-by-step cues. Show that you can distinguish entities, attributes, and keys,
        then apply those ideas to realistic PostHog-flavored examples.
  - id: data-modeling-design
    name: Data Modeling Design
    description: Relationships, cardinality, join tables, and the design process.
  - id: pipeline-basics
    name: Pipeline Basics
    description: What data pipelines are, where data comes from, and where it's stored.
  - id: pipeline-architecture
    name: Pipeline Architecture
    description: Transformation patterns, orchestration, and the tradeoffs that shape pipeline design.
  - id: posthog-data-model
    name: PostHog Data Model
    description: PostHog's specific entities — events, persons, properties, sessions, and actions.
    sectionExam:
      enabled: true
      passingScore: 0.75
      timeLimitMinutes: 14
      questionCount: 7
      blueprint:
        - conceptId: ph-events
          minQuestions: 1
        - conceptId: ph-persons
          minQuestions: 1
        - conceptId: ph-distinct-id
          minQuestions: 1
        - conceptId: ph-sessions
          minQuestions: 1
        - conceptId: ph-actions
          minQuestions: 1
      instructions: >-
        This exam checks whether you can reason about the core PostHog entities and how they connect
        in analysis, ingestion, and product usage.
  - id: posthog-ingestion
    name: PostHog Ingestion Pipeline
    description: How events flow from capture through Kafka to ClickHouse storage.
    sectionExam:
      enabled: true
      passingScore: 0.75
      timeLimitMinutes: 12
      questionCount: 6
      blueprint:
        - conceptId: ph-event-capture
          minQuestions: 2
        - conceptId: ph-ingestion-pipeline
          minQuestions: 2
        - conceptId: ph-clickhouse-storage
          minQuestions: 1
        - conceptId: ph-person-processing
          minQuestions: 1
      instructions: >-
        Show that you can trace what happens to an event after capture and explain where identity and storage fit.
  - id: identification
    name: Identification
    description: Anonymous vs identified events, the identify call, person merging, and common pitfalls.
    sectionExam:
      enabled: true
      passingScore: 0.75
      timeLimitMinutes: 12
      questionCount: 6
      blueprint:
        - conceptId: anonymous-vs-identified
          minQuestions: 2
        - conceptId: identify-call
          minQuestions: 1
        - conceptId: person-merging
          minQuestions: 1
        - conceptId: identification-pitfalls
          minQuestions: 2
      instructions: >-
        Work from behavior and system outcomes, not memorized definitions. The goal is to spot good and bad identification patterns.
  - id: group-analytics
    name: Group Analytics
    description: Modeling organizations and B2B analytics with PostHog groups.
    sectionExam:
      enabled: true
      passingScore: 0.75
      timeLimitMinutes: 10
      questionCount: 5
      blueprint:
        - conceptId: group-types
          minQuestions: 2
        - conceptId: group-identify
          minQuestions: 1
        - conceptId: linking-events-to-groups
          minQuestions: 1
        - conceptId: group-gotchas
          minQuestions: 1
      instructions: >-
        Demonstrate that you can model organizations cleanly and explain how groups change analysis in a B2B setting.

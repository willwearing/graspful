  - id: cap-rate-and-noi
    name: "Cap Rate and NOI Calculations"
    difficulty: 7
    estimatedMinutes: 45
    tags: [s16-commercial, cap-rate, investment-analysis]
    sourceRef: "DOS Syllabus Subject 16: Commercial & Investment Properties"
    prerequisites:
      - net-operating-income
      - income-approach
    encompassing:
      - concept: net-operating-income
        weight: 0.6
      - concept: income-approach
        weight: 0.5
    knowledgePoints:
      - id: cap-rate-formula
        instruction: "content/ny-re/cap-rate-formula.md"
        workedExample: "content/ny-re/cap-rate-formula-ex.md"
        problems:
          - id: cr-p1
            type: multiple_choice
            question: "A property generates $120,000 in NOI and is valued at $1,500,000. What is the capitalization rate?"
            options:
              - "6%"
              - "8%"
              - "10%"
              - "12.5%"
            correct: 1
            explanation: "Cap Rate = NOI / Value = $120,000 / $1,500,000 = 0.08 = 8%. The cap rate represents the expected rate of return on an investment property."
          - id: cr-p2
            type: multiple_choice
            question: "A property has an NOI of $85,000 and comparable properties are selling at a 7% cap rate. What is the estimated value?"
            options:
              - "$595,000"
              - "$1,000,000"
              - "$1,214,286"
              - "$850,000"
            correct: 2
            explanation: "Value = NOI / Cap Rate = $85,000 / 0.07 = $1,214,286 (rounded). When you know the NOI and the market cap rate, you can derive value by dividing NOI by the cap rate."
          - id: cr-p3
            type: fill_blank
            question: "The formula for capitalization rate is Cap Rate = ___ / Property Value."
            correct: "NOI"
            explanation: "Cap Rate = NOI (Net Operating Income) / Property Value. This can be rearranged: Value = NOI / Cap Rate, or NOI = Value x Cap Rate."
      - id: cap-rate-relationships
        instruction: "content/ny-re/cap-rate-relationships.md"
        problems:
          - id: crr-p1
            type: multiple_choice
            question: "All else being equal, if the cap rate for an area decreases from 8% to 6%, what happens to property values?"
            options:
              - "Values decrease by 25%"
              - "Values increase by 33%"
              - "Values remain the same"
              - "Values increase by 25%"
            correct: 1
            explanation: "Lower cap rates mean higher values. At 8% cap, a $100K NOI property = $1,250,000. At 6%, the same NOI yields $100K/0.06 = $1,666,667—a 33% increase. Cap rate and value have an inverse relationship."
          - id: crr-p2
            type: multiple_choice
            question: "An investor wants at least a 9% return. A property generates $72,000 NOI. What is the MAXIMUM price the investor should pay?"
            options:
              - "$648,000"
              - "$720,000"
              - "$800,000"
              - "$900,000"
            correct: 2
            explanation: "Maximum price = NOI / Minimum Cap Rate = $72,000 / 0.09 = $800,000. If the investor pays more, their actual return falls below their 9% target."
      - id: noi-calculation-detail
        instruction: "content/ny-re/noi-calculation-detail.md"
        workedExample: "content/ny-re/noi-calculation-detail-ex.md"
        problems:
          - id: noi-p1
            type: multiple_choice
            question: "Which of the following is subtracted when calculating NOI?"
            options:
              - "Mortgage payments (debt service)"
              - "Operating expenses (taxes, insurance, maintenance)"
              - "Income taxes"
              - "Depreciation"
            correct: 1
            explanation: "NOI = Effective Gross Income - Operating Expenses. Operating expenses include property taxes, insurance, maintenance, management fees, and utilities. Mortgage payments (debt service), income taxes, and depreciation are NOT subtracted when calculating NOI."
          - id: noi-p2
            type: multiple_choice
            question: "A building has potential gross income of $200,000, a 5% vacancy rate, and $80,000 in operating expenses. What is the NOI?"
            options:
              - "$110,000"
              - "$120,000"
              - "$100,000"
              - "$190,000"
            correct: 0
            explanation: "Effective Gross Income = $200,000 - ($200,000 x 0.05) = $200,000 - $10,000 = $190,000. NOI = $190,000 - $80,000 = $110,000."


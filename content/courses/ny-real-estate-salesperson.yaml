  - id: forms-of-co-ownership
    name: "Forms of Co-Ownership"
    difficulty: 5
    estimatedMinutes: 40
    tags: [s03-legal, estates, co-ownership]
    sourceRef: "DOS Syllabus Subject 3: Legal Issues"
    prerequisites:
      - fee-simple-estates
    knowledgePoints:
      - id: tenancy-in-common
        instruction: "content/ny-re/tenancy-in-common.md"
        workedExample: "content/ny-re/tenancy-in-common-ex.md"
        problems:
          - id: tic-p1
            type: multiple_choice
            question: "In a tenancy in common, what happens to a deceased owner's interest?"
            options:
              - "It automatically passes to the surviving co-owners by right of survivorship"
              - "It passes to the deceased owner's heirs or devisees through probate"
              - "It reverts to the state through escheat"
              - "It is divided equally among all remaining tenants"
            correct: 1
            explanation: "Tenancy in common does NOT include a right of survivorship. A deceased tenant's interest passes through their estate (to heirs via intestacy or devisees via will)."
          - id: tic-p2
            type: multiple_choice
            question: "Which statement is TRUE about tenancy in common?"
            options:
              - "All owners must hold equal shares"
              - "Owners may hold unequal shares"
              - "Owners cannot sell their individual interest"
              - "It requires the four unities of time, title, interest, and possession"
            correct: 1
            explanation: "Tenants in common may hold unequal shares (e.g., one holds 60%, another 40%). The only shared unity is possession—each tenant has the right to use the entire property."
      - id: joint-tenancy
        instruction: "content/ny-re/joint-tenancy.md"
        workedExample: "content/ny-re/joint-tenancy-ex.md"
        problems:
          - id: jt-p1
            type: multiple_choice
            question: "What are the four unities required to create a joint tenancy?"
            options:
              - "Time, Title, Interest, and Possession"
              - "Consent, Consideration, Capacity, and Legality"
              - "Offer, Acceptance, Consideration, and Mutual Assent"
              - "Ownership, Lien, Deed, and Conveyance"
            correct: 0
            explanation: "Joint tenancy requires the four unities: Time (acquired at the same time), Title (same deed), Interest (equal shares), and Possession (equal right to possess the whole). If any unity is broken, the joint tenancy converts to a tenancy in common."
          - id: jt-p2
            type: fill_blank
            question: "The key feature that distinguishes joint tenancy from tenancy in common is the right of ___."
            correct: "survivorship"
            explanation: "The right of survivorship means that when one joint tenant dies, their interest automatically passes to the surviving joint tenant(s) outside of probate."
      - id: tenancy-by-entirety
        instruction: "content/ny-re/tenancy-by-entirety.md"
        problems:
          - id: tbe-p1
            type: multiple_choice
            question: "Tenancy by the entirety is available only to:"
            options:
              - "Business partners"
              - "Married couples"
              - "Blood relatives"
              - "Any two individuals"
            correct: 1
            explanation: "Tenancy by the entirety is a special form of joint ownership available only to married couples (and in NY, also to domestic partners in some contexts). Neither spouse can convey or encumber their interest without the other's consent."
      - id: community-property-vs-ny
        instruction: "content/ny-re/community-property-vs-ny.md"
        problems:
          - id: cp-p1
            type: multiple_choice
            question: "Does New York follow community property rules?"
            options:
              - "Yes, all marital property is community property"
              - "No, New York is an equitable distribution state"
              - "Yes, but only for real property"
              - "No, New York follows common-law dower/curtesy"
            correct: 1
            explanation: "New York is an equitable distribution state, not a community property state. Upon divorce, marital property is divided equitably (fairly, not necessarily equally) by the court."


  - id: fiduciary-duties
    name: "Fiduciary Duties of an Agent"
    difficulty: 5
    estimatedMinutes: 45
    tags: [s02-agency, fiduciary]
    sourceRef: "DOS Syllabus Subject 2: Law of Agency"
    prerequisites:
      - licensing-categories
    knowledgePoints:
      - id: fiduciary-oldcar
        instruction: "content/ny-re/fiduciary-oldcar.md"
        workedExample: "content/ny-re/fiduciary-oldcar-ex.md"
        problems:
          - id: fid-p1
            type: multiple_choice
            question: "Which acronym summarizes the six fiduciary duties an agent owes a principal?"
            options:
              - "OLDCAR — Obedience, Loyalty, Disclosure, Confidentiality, Accountability, Reasonable care"
              - "BRRETA — Buyer Representation, Responsibility, Ethics, Trust, Accountability"
              - "CLUE — Confidentiality, Loyalty, Undivided attention, Equity"
              - "FIDAR — Fiduciary, Integrity, Diligence, Accountability, Representation"
            correct: 0
            explanation: "OLDCAR stands for Obedience, Loyalty, Disclosure, Confidentiality, Accountability, and Reasonable care/skill. These are the six fiduciary duties an agent owes to a principal."
          - id: fid-p2
            type: multiple_choice
            question: "A seller tells their listing agent that they will accept $20,000 less than the asking price. The agent shares this with a prospective buyer. Which fiduciary duty was violated?"
            options:
              - "Obedience"
              - "Loyalty"
              - "Confidentiality"
              - "Accountability"
            correct: 2
            explanation: "The agent violated the duty of Confidentiality by disclosing the seller's bottom-line price to the buyer. An agent must never reveal information that could weaken the principal's negotiating position."
          - id: fid-p3
            type: multiple_choice
            question: "A buyer's agent learns through the MLS that a property has a cracked foundation. They do not mention it to the buyer. Which duty is violated?"
            options:
              - "Confidentiality"
              - "Disclosure"
              - "Obedience"
              - "Accountability"
            correct: 1
            explanation: "The agent violated the duty of Disclosure. Agents must disclose all material facts that could affect the principal's decision, including known property defects."
          - id: fid-p4
            type: fill_blank
            question: "The fiduciary duty of ___ requires an agent to follow all lawful instructions of their principal."
            correct: "Obedience"
            explanation: "Obedience means the agent must carry out the principal's lawful instructions. An agent may refuse only if the instruction is illegal or unethical."
      - id: fiduciary-vs-customer
        instruction: "content/ny-re/fiduciary-vs-customer.md"
        problems:
          - id: fvc-p1
            type: multiple_choice
            question: "What level of service does an agent owe to a customer (non-client)?"
            options:
              - "Full fiduciary duties identical to those owed to a client"
              - "Honesty, fair dealing, and disclosure of material facts"
              - "No duties whatsoever"
              - "Only the duty of confidentiality"
            correct: 1
            explanation: "An agent owes a customer (non-client) honesty, fair dealing, and disclosure of material facts—but not the full OLDCAR fiduciary duties reserved for clients."


  - id: exam-strategy
    name: "NEC Exam Strategy — Comprehensive Review"
    difficulty: 8
    estimatedMinutes: 30
    tags: [exam-strategy, capstone]
    sourceRef: "NEC 2023 (all articles)"
    prerequisites:
      - dwelling-load-calculations
      - commercial-load-calc
      - conductor-ampacity-correction
      - grounding-electrode-system
    encompassing:
      - concept: nec-overview
        weight: 0.3
      - concept: article-100-definitions
        weight: 0.4
      - concept: conductor-sizing
        weight: 0.6
      - concept: branch-circuits
        weight: 0.5
      - concept: overcurrent-protection
        weight: 0.6
      - concept: grounding-fundamentals
        weight: 0.5
      - concept: dwelling-load-calculations
        weight: 0.7
      - concept: gfci-protection
        weight: 0.4
      - concept: box-fill-calculations
        weight: 0.5
      - concept: conduit-fill
        weight: 0.5
    knowledgePoints:
      - id: exam-tips
        instruction: "NEC electrician exams typically consist of open-book questions where speed is critical. Know where to find information fast. Memorize Table 310.16 ampacities for common wire sizes -- this saves 30+ seconds per question. Know the article numbers by heart: 90 (intro), 100 (definitions), 110 (general), 210 (branch circuits), 215 (feeders), 220 (load calcs), 230 (services), 240 (overcurrent), 250 (grounding), 300 (wiring methods), 310 (conductors), 314 (boxes), 334 (NM cable), 430 (motors), 680 (pools). Practice calculation questions: voltage drop, box fill, conduit fill, load calculations, and motor circuit sizing. These appear on every exam. Mark the key tables in your codebook with tabs: Table 310.16, Table 250.66, Table 250.122, Table 220.42, Table 220.55, Chapter 9 Tables 1, 4, 5."
        workedExample: "Example comprehensive problem: A 2,000 sq ft dwelling has a 12 kW range, 5 kW dryer, 4.5 kW water heater, 5-ton AC (24A at 240V), and 10 kW heat strip. Calculate the service size. General lighting: 2000 x 3 = 6,000 VA. Small appliance: 3,000 VA. Laundry: 1,500 VA. Total = 10,500 VA. Demand: 3,000 at 100% = 3,000 + 7,500 at 35% = 2,625 = 5,625 VA. Range: 8,000 VA. Dryer: 5,000 VA. Water heater: 4,500 VA. AC: 24A x 240V = 5,760 VA. Heat: 10,000 VA. Use larger of AC/Heat: 10,000 VA. Total: 5,625 + 8,000 + 5,000 + 4,500 + 10,000 = 33,125 VA. Amps: 33,125 / 240 = 138A. Minimum 150A service."
        problems:
          - id: exam-p1
            type: multiple_choice
            question: "Which NEC table is used most frequently on electrician exams for conductor ampacity?"
            options:
              - "Table 220.42"
              - "Table 250.66"
              - "Table 310.16"
              - "Table 430.248"
            correct: 2
            explanation: "Table 310.16 (Allowable Ampacities of Insulated Conductors) is the most frequently referenced table on electrician exams. It provides ampacities for conductors at 60, 75, and 90 degree C temperature ratings."
          - id: exam-p2
            type: multiple_choice
            question: "For a dwelling unit load calculation, the demand factor for the general lighting load above 3,000 VA is:"
            options:
              - "25%"
              - "35%"
              - "50%"
              - "75%"
            correct: 1
            explanation: "Per Table 220.42, for dwelling units, the general lighting demand factor is 100% for the first 3,000 VA and 35% for the portion from 3,001 to 120,000 VA."
          - id: exam-p3
            type: matching
            question: "Match each NEC table with what it provides."
            options:
              - "Table 310.16|Conductor ampacities at 60/75/90 degrees C"
              - "Table 250.122|Equipment grounding conductor sizing"
              - "Table 250.66|Grounding electrode conductor sizing"
              - "Table 220.55|Household range demand factors"
            correct: "0,1,2,3"
            explanation: "Knowing which table to look up is critical for exam speed. Table 310.16 = ampacity, 250.122 = EGC sizing, 250.66 = GEC sizing, 220.55 = range demand."
          - id: exam-p4
            type: ordering
            question: "Place these steps of a dwelling load calculation in the correct order."
            options:
              - "Apply Table 220.42 demand factors to general lighting total"
              - "Add range (Table 220.55), dryer, water heater, and larger of AC/heat"
              - "Calculate general lighting (sq ft x 3 VA), small appliance (3,000 VA), laundry (1,500 VA)"
              - "Divide total VA by 240V to get service amperes"
            correct: "2,0,1,3"
            explanation: "Step 1: Calculate raw loads. Step 2: Apply demand factors from Table 220.42. Step 3: Add major appliances and equipment. Step 4: Divide by voltage to get amperage for service sizing."

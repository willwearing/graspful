  - id: commercial-load-calc
    name: "Article 220 Part IV — Commercial Load Calculations"
    difficulty: 7
    estimatedMinutes: 30
    tags: [load-calculations, commercial, article-220]
    sourceRef: "NEC 2023 Article 220, Parts I-IV"
    prerequisites:
      - dwelling-load-calculations
    knowledgePoints:
      - id: commercial-lighting
        instruction: "Commercial lighting loads use Table 220.12 with different unit loads by occupancy: office buildings = 3.5 VA/sq ft, retail stores = 1.5 VA/sq ft, restaurants = 2 VA/sq ft, warehouses = 0.5 VA/sq ft, schools = 3 VA/sq ft, hospitals = 2 VA/sq ft. Table 220.42 demand factors for lighting: for hospitals, hotels, and motels, the first 50,000 VA at 40% and remainder at 20%. For all others (not dwellings), the first 12,500 VA at 100% and remainder at 50%. Receptacle loads in commercial buildings: per 220.44, the first 10 kVA at 100% and the remainder at 50%. Show-window lighting is calculated at 200 VA per linear foot (220.43(A))."
        problems:
          - id: comm-load-p1
            type: multiple_choice
            question: "Per Table 220.12, what is the unit load for general lighting in an office building?"
            options:
              - "1.5 VA per square foot"
              - "2 VA per square foot"
              - "3 VA per square foot"
              - "3.5 VA per square foot"
            correct: 3
            explanation: "Per Table 220.12, the unit load for general lighting in office buildings is 3.5 VA per square foot."
          - id: comm-load-p2
            type: multiple_choice
            question: "Per 220.44, what demand factor applies to the first 10 kVA of receptacle load in a commercial building?"
            options:
              - "50%"
              - "75%"
              - "80%"
              - "100%"
            correct: 3
            explanation: "Per 220.44, for multioutlet receptacle loads in other than dwelling units, the first 10 kVA is calculated at 100% demand factor, with the remainder at 50%."
          - id: comm-load-p3
            type: fill_blank
            question: "Per 220.43(A), show-window lighting is calculated at ___ VA per linear foot."
            correct: "200"
            explanation: "Per 220.43(A), show-window lighting loads must be calculated at a minimum of 200 VA per linear foot of show window."
          - id: comm-load-p4
            type: matching
            question: "Match each commercial occupancy with its lighting unit load per Table 220.12."
            options:
              - "Office building|3.5 VA/sq ft"
              - "Retail store|1.5 VA/sq ft"
              - "Warehouse|0.5 VA/sq ft"
              - "Restaurant|2 VA/sq ft"
            correct: "0,1,2,3"
            explanation: "Table 220.12 assigns different unit loads based on occupancy type. Offices are highest at 3.5, restaurants at 2, retail at 1.5, and warehouses lowest at 0.5 VA per square foot."

  - id: demand-factors
    name: "Article 220 Tables — Demand Factors"
    difficulty: 6
    estimatedMinutes: 20
    tags: [demand-factors, load-calculations, article-220]
    sourceRef: "NEC 2023 Article 220"
    prerequisites:
      - commercial-load-calc
    knowledgePoints:
      - id: demand-factor-tables
        instruction: "Key demand factor tables: Table 220.42 (Lighting) -- dwelling: first 3,000 VA at 100%, remainder at 35%. Table 220.54 (Dryers) -- dwelling: minimum 5,000 VA or nameplate, whichever is larger; demand factors for multiple dryers. Table 220.55 (Ranges) -- single range up to 12 kW = 8 kW demand; for multiple ranges, Column A gives demand percentage of nameplate. Table 220.56 (Kitchen Equipment, non-dwelling) -- 3 units at 90%, 4 at 80%, 5 at 70%, 6+ at 65%. Table 220.84 (Optional calculation for multifamily dwellings) allows significant load reduction for buildings with 3+ units: first 3 VA/sq ft at 100% for lighting, plus nameplate for appliances, then total gets demand factor based on number of units."
        problems:
          - id: demand-p1
            type: multiple_choice
            question: "Per Table 220.56, the demand factor for 6 or more pieces of commercial kitchen equipment is:"
            options:
              - "50%"
              - "65%"
              - "75%"
              - "80%"
            correct: 1
            explanation: "Per Table 220.56, for 6 or more pieces of commercial kitchen equipment, the demand factor is 65% of the nameplate rating."
          - id: demand-p2
            type: multiple_choice
            question: "Per Table 220.56, the demand factor for 3 pieces of commercial kitchen equipment is:"
            options:
              - "75%"
              - "80%"
              - "90%"
              - "100%"
            correct: 2
            explanation: "Per Table 220.56, for 3 pieces of commercial kitchen equipment, the demand factor is 90%."
          - id: demand-p3
            type: multiple_choice
            question: "Per Table 220.42, for commercial buildings (other than dwellings/hotels), the lighting demand factor for loads above 12,500 VA is:"
            options:
              - "35%"
              - "40%"
              - "50%"
              - "75%"
            correct: 2
            explanation: "Per Table 220.42, for all occupancies except dwelling units and hotels/motels, the first 12,500 VA is at 100% demand, and the remainder over 12,500 VA is at 50%."
          - id: demand-p4
            type: fill_blank
            question: "Per Table 220.55, the maximum demand for a single household range rated not more than 12 kW is ___ kW."
            correct: "8"
            explanation: "Per Table 220.55 Column C, a single household electric range rated not more than 12 kW has a maximum demand of 8 kW."

  - id: voltage-drop
    name: "Voltage Drop Calculations"
    difficulty: 6
    estimatedMinutes: 25
    tags: [voltage-drop, calculations, chapter-9]
    sourceRef: "NEC 2023 Informational Notes 210.19(A)(1), 215.2(A)(4)"
    prerequisites:
      - conductor-sizing
      - feeders
    knowledgePoints:
      - id: vd-calculations
        instruction: "While not a mandatory code requirement, the NEC recommends (Informational Notes to 210.19(A)(1) and 215.2(A)(4)) that voltage drop not exceed 3% for branch circuits and 5% total for feeder plus branch circuit combined. The voltage drop formula for single-phase circuits: VD = (2 x K x I x D) / CM, where K = resistivity constant (12.9 for copper, 21.2 for aluminum), I = current in amps, D = one-way distance in feet, CM = circular mil area of conductor. For three-phase: VD = (1.732 x K x I x D) / CM. Alternatively, use Chapter 9, Table 9 for conductor resistance per 1000 feet and calculate: VD = I x R x L (with appropriate multiplier for single-phase or three-phase)."
        workedExample: "Example: What is the voltage drop for a 120V, 20A, single-phase circuit using 12 AWG copper (6530 CM) with a 100-foot one-way run? VD = (2 x 12.9 x 20 x 100) / 6530 = 51,600 / 6530 = 7.9V. Percent VD = 7.9/120 = 6.6%. This exceeds the recommended 3%, so upsizing to 10 AWG (10380 CM) gives: VD = 51,600 / 10380 = 4.97V = 4.1%. Still above 3%. Use 8 AWG (16510 CM): VD = 51,600 / 16510 = 3.13V = 2.6%. This meets the 3% recommendation."
        problems:
          - id: vd-p1
            type: multiple_choice
            question: "The NEC recommends that total voltage drop for a feeder and branch circuit combined should not exceed:"
            options:
              - "2%"
              - "3%"
              - "5%"
              - "10%"
            correct: 2
            explanation: "Per the Informational Notes to 210.19(A)(1) and 215.2(A)(4), the NEC recommends no more than 3% voltage drop for the branch circuit and no more than 5% total for the feeder plus branch circuit combined."
          - id: vd-p2
            type: multiple_choice
            question: "In the voltage drop formula VD = (2 x K x I x D) / CM, what does K represent for copper conductors?"
            options:
              - "10.8"
              - "12.9"
              - "17.0"
              - "21.2"
            correct: 1
            explanation: "K is the resistivity constant. For copper conductors, K = 12.9 ohms per mil-foot. For aluminum, K = 21.2."
          - id: vd-p3
            type: fill_blank
            question: "The NEC recommends that voltage drop for a branch circuit alone should not exceed ___% per the Informational Note to 210.19(A)(1)."
            correct: "3"
            explanation: "Per the Informational Note to 210.19(A)(1), branch circuit voltage drop should not exceed 3%, and the total of feeder plus branch circuit should not exceed 5%."
          - id: vd-p4
            type: true_false
            question: "The NEC voltage drop recommendations of 3% branch circuit and 5% total are mandatory code requirements."
            correct: "false"
            explanation: "Voltage drop recommendations are contained in Informational Notes to 210.19(A)(1) and 215.2(A)(4). Informational Notes are not enforceable code requirements -- they are recommendations for a reasonably efficient installation."

  - id: panelboard-requirements
    name: "Article 408 — Panelboards and Switchboards"
    difficulty: 4
    estimatedMinutes: 20
    tags: [panelboards, article-408]
    sourceRef: "NEC 2023 Article 408"
    prerequisites:
      - overcurrent-protection
      - service-entrance
    knowledgePoints:
      - id: panelboard-rules
        instruction: "Article 408 covers switchboards, switchgear, and panelboards. A panelboard must have a rating not less than the minimum feeder capacity required for the calculated load (408.36). All panelboards must have overcurrent protection with a rating not more than the panelboard rating (408.36(A)). Panelboards in dwelling units must have overcurrent protection not more than 200A per individual panelboard (408.36(B) exception). The number of overcurrent devices on a panelboard is limited by the panelboard listing. Phase arrangement must be such that the load is balanced between phases (408.40). In a 3-phase panel, breaker numbering follows: odd numbers on the left (1, 3, 5...) and even on the right (2, 4, 6...). Phases rotate: A-B-C down the left side."
        problems:
          - id: panel-p1
            type: multiple_choice
            question: "Per 408.36, a panelboard must have overcurrent protection rated at:"
            options:
              - "Not more than the panelboard rating"
              - "125% of the largest circuit in the panel"
              - "At least twice the main breaker rating"
              - "Not more than 400 amperes"
            correct: 0
            explanation: "Per 408.36(A), a panelboard must be protected by an overcurrent protective device having a rating not greater than that of the panelboard."
          - id: panel-p2
            type: multiple_choice
            question: "In a 3-phase panel, which phase is on positions 1, 3, and 5?"
            options:
              - "Phase A"
              - "Phase B"
              - "Phase C"
              - "It varies by manufacturer"
            correct: 0
            explanation: "In a standard 3-phase panel, Phase A occupies the first position on each side (positions 1, 3, 5 on the left), Phase B occupies positions 2, 4, 6, and Phase C occupies positions 3, 5, 7 (rotating A-B-C pattern)."
          - id: panel-p3
            type: fill_blank
            question: "Per 408.40, panelboard loads must be balanced between ___."
            correct: "phases"
            explanation: "Per 408.40, the phase arrangement on 3-phase buses must be such that the load is balanced between phases as closely as practicable."
          - id: panel-p4
            type: true_false
            question: "A panelboard's overcurrent protection can exceed the panelboard's rating."
            correct: "false"
            explanation: "Per 408.36(A), a panelboard must be protected by an overcurrent protective device having a rating not greater than that of the panelboard."

  - id: disconnect-requirements
    name: "Article 404/430 — Disconnect Rules"
    difficulty: 4
    estimatedMinutes: 15
    tags: [disconnects, article-404, article-430]
    sourceRef: "NEC 2023 Articles 404, 430"
    prerequisites:
      - switches-controls
      - motors-article-430
    knowledgePoints:
      - id: disconnect-rules
        instruction: "Every building or structure must have a means of disconnecting all ungrounded conductors from the service equipment (230.70). Disconnects must be installed at a readily accessible location nearest the point of entrance of the service conductors (230.70(A)). For motor circuits, a disconnecting means must be located in sight from the motor location and the controller (430.102). 'In sight' means visible and not more than 50 feet away (Article 100 definition). The motor disconnect must be rated at least 115% of the motor nameplate full-load current (430.110(A)). A disconnect is also required for all permanently connected appliances (422.31-422.34)."
        problems:
          - id: disc-p1
            type: multiple_choice
            question: "Per Article 100, 'in sight from' means visible and not more than what distance?"
            options:
              - "25 feet"
              - "35 feet"
              - "50 feet"
              - "75 feet"
            correct: 2
            explanation: "Per Article 100, 'In Sight From' (within sight from, within sight) means that the item is visible and not more than 50 feet (15 m) distant from the other."
          - id: disc-p2
            type: multiple_choice
            question: "A motor disconnect must be rated at least what percentage of the motor nameplate full-load current?"
            options:
              - "100%"
              - "110%"
              - "115%"
              - "125%"
            correct: 2
            explanation: "Per 430.110(A), the motor disconnecting means must have an ampere rating of not less than 115% of the full-load current rating of the motor."
          - id: disc-p3
            type: fill_blank
            question: "Per Article 100, 'in sight from' means visible and not more than ___ feet distant."
            correct: "50"
            explanation: "Per Article 100, 'In Sight From' means the equipment is visible and not more than 50 feet (15 m) distant from the other equipment."
          - id: disc-p4
            type: true_false
            question: "A disconnect is required for all permanently connected appliances per Articles 422.31-422.34."
            correct: "true"
            explanation: "Per 422.31-422.34, each permanently connected appliance must have a means of disconnection. The specific requirements depend on the appliance rating and whether it is in sight from the appliance."

  - id: luminaire-installation
    name: "Article 410 — Luminaires (Lighting Fixtures)"
    difficulty: 3
    estimatedMinutes: 15
    tags: [luminaires, article-410]
    sourceRef: "NEC 2023 Article 410"
    prerequisites:
      - branch-circuits
    knowledgePoints:
      - id: luminaire-rules
        instruction: "Article 410 covers luminaire (lighting fixture) installation. Luminaires in clothes closets must be surface-mounted or recessed incandescent or LED, completely enclosed, and must maintain clearances: 12 inches from the nearest point of storage for surface-mounted or recessed (410.16(C)). Pendant luminaires and open or partially enclosed incandescent luminaires are NOT permitted in clothes closets. In bathrooms, luminaires must be identified for damp/wet locations as applicable (410.10(D)). Recessed luminaires must have clearance from combustible materials of at least 1/2 inch (410.116(A)) and thermal protection (410.115(C)). Track lighting is covered in 410.151-160, with a limit of one track-lighting system per branch circuit."
        problems:
          - id: lum-p1
            type: multiple_choice
            question: "What is the minimum clearance from storage for a surface-mounted luminaire in a clothes closet?"
            options:
              - "6 inches"
              - "12 inches"
              - "18 inches"
              - "24 inches"
            correct: 1
            explanation: "Per 410.16(C)(3), surface-mounted fluorescent or LED luminaires in clothes closets must maintain a clearance of at least 12 inches from the nearest point of a storage space."
          - id: lum-p2
            type: true_false
            question: "Pendant luminaires are permitted in clothes closets."
            correct: "false"
            explanation: "Per 410.16(B), pendant luminaires and open or partially enclosed incandescent luminaires are not permitted in clothes closets."
          - id: lum-p3
            type: fill_blank
            question: "Per 410.116(A), recessed luminaires must maintain a clearance from combustible materials of at least ___ inch."
            correct: "1/2"
            explanation: "Per 410.116(A), recessed luminaires installed in combustible materials must have a clearance of at least 1/2 inch from the combustible material."
          - id: lum-p4
            type: multiple_choice
            question: "In a bathroom, luminaires must be identified for which type of location?"
            options:
              - "Dry location only"
              - "Damp or wet location as applicable"
              - "Hazardous location"
              - "No special identification required"
            correct: 1
            explanation: "Per 410.10(D), luminaires in bathrooms must be identified for damp locations, or wet locations if subject to shower spray or similar wetting."

  - id: outdoor-wiring
    name: "Article 225 — Outside Branch Circuits and Feeders"
    difficulty: 4
    estimatedMinutes: 15
    tags: [outdoor, article-225]
    sourceRef: "NEC 2023 Article 225"
    prerequisites:
      - feeders
      - wiring-methods-overview
    knowledgePoints:
      - id: outdoor-rules
        instruction: "Article 225 covers outside branch circuits and feeders. Overhead conductor clearances per 225.18: above finished grade (sidewalks, platforms) not less than 10 feet; above residential driveways not less than 12 feet; above commercial driveways, parking areas, and agricultural areas not less than 18 feet. Above rooftop: not less than 8 feet from the roof surface (225.19(A)), with a reduction to 3 feet if the voltage is 300V or less and the roof slope is 4/12 or greater. Each building or structure served by outside branch circuits or feeders must have a disconnecting means (225.31) installed at a readily accessible location, nearest the point of entrance, on the exterior or interior of the building (225.32)."
        problems:
          - id: outdoor-p1
            type: multiple_choice
            question: "Per 225.18, what is the minimum clearance for overhead conductors above a residential driveway?"
            options:
              - "8 feet"
              - "10 feet"
              - "12 feet"
              - "18 feet"
            correct: 2
            explanation: "Per 225.18(3), overhead conductors must maintain a clearance of not less than 12 feet above residential property and driveways."
          - id: outdoor-p2
            type: multiple_choice
            question: "Per 225.18, what is the minimum clearance for overhead conductors above a commercial parking area?"
            options:
              - "10 feet"
              - "12 feet"
              - "15 feet"
              - "18 feet"
            correct: 3
            explanation: "Per 225.18(4), overhead conductors above public streets, alleys, roads, parking areas subject to truck traffic, driveways on other than residential property, and similar areas must have a minimum clearance of 18 feet."
          - id: outdoor-p3
            type: multiple_choice
            question: "Per 225.18, what is the minimum clearance for overhead conductors above finished grade (pedestrian areas)?"
            options:
              - "8 feet"
              - "10 feet"
              - "12 feet"
              - "15 feet"
            correct: 1
            explanation: "Per 225.18(1), the minimum clearance above finished grade, sidewalks, or from any platform or projection from which the conductors might be reached is 10 feet."
          - id: outdoor-p4
            type: ordering
            question: "Place these overhead conductor clearance requirements from lowest to highest per 225.18."
            options:
              - "Above commercial driveways/parking — 18 feet"
              - "Above finished grade/sidewalks — 10 feet"
              - "Above residential driveways — 12 feet"
            correct: "1,2,0"
            explanation: "Per 225.18: pedestrian areas = 10 feet, residential driveways = 12 feet, commercial driveways/parking = 18 feet."

  - id: cable-tray
    name: "Article 392 — Cable Tray Systems"
    difficulty: 4
    estimatedMinutes: 15
    tags: [cable-tray, article-392]
    sourceRef: "NEC 2023 Article 392"
    prerequisites:
      - wiring-methods-overview
    knowledgePoints:
      - id: cable-tray-rules
        instruction: "Article 392 covers cable tray systems. Cable trays are permitted as a support system for cables, raceways, and conductors. Cable tray fill is determined by the cross-sectional area of the tray and conductor types. For multiconductor cables (392.22(A)): if all cables are 4/0 or larger, the sum of the diameters of all cables cannot exceed the cable tray width. If all are smaller than 4/0, the sum of cross-sectional areas cannot exceed the maximum fill area for the tray. Single conductor cables rated 1/0 and larger are permitted in cable trays per 392.10. Cable trays must be supported at intervals per the manufacturer's instructions but not exceeding the span ratings for the tray type. Cable trays can serve as the equipment grounding conductor where they meet the requirements of 392.60."
        problems:
          - id: tray-p1
            type: true_false
            question: "Cable tray can serve as an equipment grounding conductor."
            correct: "true"
            explanation: "Per 392.60, metallic cable trays can serve as equipment grounding conductors when they meet specific requirements including adequate cross-sectional area and properly bonded connections."
          - id: tray-p2
            type: multiple_choice
            question: "Per 392.10, single conductor cables in cable trays must be rated at least:"
            options:
              - "8 AWG"
              - "4 AWG"
              - "1/0 AWG"
              - "4/0 AWG"
            correct: 2
            explanation: "Per 392.10, single conductor cables used in cable trays must be 1/0 AWG or larger. Multiconductor cables in cable trays have no minimum size restriction."
          - id: tray-p3
            type: fill_blank
            question: "Per 392.22(A), when all multiconductor cables in a cable tray are 4/0 or larger, the sum of cable ___ cannot exceed the tray width."
            correct: "diameters"
            explanation: "Per 392.22(A)(1), for multiconductor cables 4/0 and larger, the sum of the diameters of all cables must not exceed the cable tray width."
          - id: tray-p4
            type: true_false
            question: "Cable trays are permitted as a support system for both cables and raceways."
            correct: "true"
            explanation: "Per 392.10, cable trays are permitted as a support system for cables, raceways, and conductors in various installation scenarios."

  - id: flexible-conduit
    name: "Articles 348/350 — Flexible Metal Conduit"
    difficulty: 3
    estimatedMinutes: 15
    tags: [conduit, flexible, article-348, article-350]
    sourceRef: "NEC 2023 Articles 348, 350"
    prerequisites:
      - emt-conduit
    knowledgePoints:
      - id: fmc-lfmc
        instruction: "FMC (Flexible Metal Conduit, Article 348) is a helically wound interlocking metal strip raceway. Common uses include connections to motors, vibrating equipment, and where flexibility is needed. FMC must be supported within 12 inches of every box and at intervals not exceeding 4-1/2 feet (348.30(A)). FMC in lengths of 6 feet or less can serve as an EGC if the circuit is 20A or less, the combined ground-fault return path is not more than 6 feet, and fittings are listed for grounding (250.118(5)). LFMC (Liquidtight Flexible Metal Conduit, Article 350) adds a plastic jacket over the metal, making it suitable for wet locations, direct burial, and outdoor use. LFMC support: within 12 inches of boxes, every 4-1/2 feet (350.30)."
        problems:
          - id: flex-p1
            type: multiple_choice
            question: "FMC can serve as an equipment grounding conductor when the length does not exceed:"
            options:
              - "3 feet"
              - "4 feet"
              - "6 feet"
              - "10 feet"
            correct: 2
            explanation: "Per 250.118(5), FMC can serve as an EGC if the combined length of the ground return path is 6 feet or less, the circuit overcurrent protection is 20A or less, and the fittings are listed for grounding."
          - id: flex-p2
            type: fill_blank
            question: "FMC must be supported within 12 inches of every box and at intervals not exceeding ___-1/2 feet per 348.30(A)."
            correct: "4"
            explanation: "Per 348.30(A), FMC must be secured within 12 inches of every box, cabinet, or fitting and at intervals not exceeding 4-1/2 feet (1.4 m)."
          - id: flex-p3
            type: true_false
            question: "LFMC (Liquidtight Flexible Metal Conduit) adds a plastic jacket and is suitable for wet locations."
            correct: "true"
            explanation: "LFMC (Article 350) adds a liquid-tight plastic jacket over the metal armor, making it suitable for wet locations, direct burial (where listed), and outdoor use."
          - id: flex-p4
            type: matching
            question: "Match each flexible conduit type with its key distinction."
            options:
              - "FMC (Article 348)|Helically wound metal, no outer jacket, dry locations"
              - "LFMC (Article 350)|Metal with plastic jacket, wet locations, outdoor use"
            correct: "0,1"
            explanation: "FMC is bare flexible metal conduit for dry locations. LFMC adds a liquidtight plastic jacket, making it suitable for wet, damp, and outdoor environments."

  - id: ground-fault-equipment
    name: "Article 230.95 — Ground-Fault Protection of Equipment (GFPE)"
    difficulty: 5
    estimatedMinutes: 15
    tags: [gfpe, ground-fault, article-230]
    sourceRef: "NEC 2023 Section 230.95"
    prerequisites:
      - service-entrance
      - grounding-fundamentals
    knowledgePoints:
      - id: gfpe-requirements
        instruction: "Section 230.95 requires ground-fault protection of equipment (GFPE) for solidly grounded wye electric services of more than 150V to ground but not exceeding 1000V phase-to-phase, for each service disconnect rated 1000A or more. This primarily applies to 277/480V, 3-phase, 4-wire wye services with disconnects of 1000A or more. GFPE is NOT the same as GFCI -- GFPE protects equipment, not people. The maximum setting is 1200A ground-fault current with a maximum delay of 1 second for ground-fault currents of 3000A or more (230.95(A)). GFPE is also required for health care facilities (Article 517) at both the normal and alternate power source disconnect levels."
        problems:
          - id: gfpe-p1
            type: multiple_choice
            question: "GFPE is required for solidly grounded wye services rated 1000A or more at what voltage?"
            options:
              - "120/208V"
              - "120/240V"
              - "277/480V"
              - "Any voltage"
            correct: 2
            explanation: "Per 230.95, GFPE is required for solidly grounded wye services of more than 150V to ground. A 277/480V wye system has 277V to ground, triggering this requirement. 120/208V and 120/240V systems have 120V to ground, which is less than 150V."
          - id: gfpe-p2
            type: true_false
            question: "GFPE and GFCI provide the same level of protection."
            correct: "false"
            explanation: "GFPE (Ground-Fault Protection of Equipment) protects equipment from damaging ground-fault currents and trips at much higher levels (up to 1200A). GFCI (Ground-Fault Circuit Interrupter) protects people and trips at 4-6 milliamps."
          - id: gfpe-p3
            type: fill_blank
            question: "Per 230.95(A), the maximum GFPE setting is ___ amperes of ground-fault current."
            correct: "1200"
            explanation: "Per 230.95(A), the maximum setting of the ground-fault protection device is 1200 amperes, with a maximum time delay of 1 second for ground-fault currents of 3000 amperes or more."
          - id: gfpe-p4
            type: multiple_choice
            question: "GFPE is required for solidly grounded wye services when the disconnect is rated at:"
            options:
              - "400A or more"
              - "600A or more"
              - "800A or more"
              - "1000A or more"
            correct: 3
            explanation: "Per 230.95, GFPE is required for solidly grounded wye services of more than 150V to ground with each service disconnect rated 1000 amperes or more."

  - id: conductor-ampacity-correction
    name: "Conductor Ampacity Correction Factors"
    difficulty: 7
    estimatedMinutes: 25
    tags: [ampacity, correction, derating, article-310]
    sourceRef: "NEC 2023 Article 310, Tables 310.15(C)(1) and 310.15(C)(1)"
    prerequisites:
      - conductor-sizing
      - conduit-fill
    knowledgePoints:
      - id: temperature-correction
        instruction: "When ambient temperature differs from the 30 degrees C base of Table 310.16, ampacity must be corrected using the factors in Table 310.15(B)(1). For example, at 40 degrees C ambient, the correction factor for 75C-rated conductors is 0.88. Apply this by multiplying: ampacity = table value x correction factor. For conductor fill adjustment (Table 310.15(C)(1)), when more than 3 current-carrying conductors are in a raceway or cable: 4-6 conductors = 80%, 7-9 = 70%, 10-20 = 50%, 21-30 = 45%, 31-40 = 40%, 41+ = 35%. When both corrections apply, multiply both factors: adjusted ampacity = table ampacity x temp factor x fill factor. Neutral conductors carrying only unbalanced current are not counted as current-carrying conductors (310.15(E))."
        workedExample: "Example: Six 10 AWG THWN copper conductors in a conduit, ambient temperature 40 degrees C. Step 1: Table 310.16 at 75C: 10 AWG = 35A. Step 2: Temperature correction at 40C for 75C conductor = 0.88 (Table 310.15(B)(1)). Step 3: Fill adjustment for 6 conductors = 80% (Table 310.15(C)(1)). Step 4: Adjusted ampacity = 35 x 0.88 x 0.80 = 24.64A."
        problems:
          - id: derating-p1
            type: multiple_choice
            question: "Per Table 310.15(C)(1), what is the ampacity adjustment factor for 7-9 current-carrying conductors in a raceway?"
            options:
              - "80%"
              - "70%"
              - "60%"
              - "50%"
            correct: 1
            explanation: "Per Table 310.15(C)(1), for 7-9 current-carrying conductors in a raceway, the ampacity adjustment factor is 70%."
          - id: derating-p2
            type: multiple_choice
            question: "When calculating conductor fill for ampacity adjustment, a neutral conductor that carries only unbalanced load:"
            options:
              - "Always counts as a current-carrying conductor"
              - "Counts as half a current-carrying conductor"
              - "Is not counted as a current-carrying conductor"
              - "Counts only if the circuit exceeds 20A"
            correct: 2
            explanation: "Per 310.15(E), a neutral conductor that carries only the unbalanced current from other conductors of the same circuit is not required to be counted as a current-carrying conductor for fill adjustment purposes."
          - id: derating-p3
            type: fill_blank
            question: "Table 310.16 ampacities are based on an ambient temperature of ___ degrees C."
            correct: "30"
            explanation: "Table 310.16 provides ampacities based on an ambient temperature of 30 degrees C (86 degrees F). When ambient temperature exceeds 30C, correction factors from Table 310.15(B)(1) must be applied."
          - id: derating-p4
            type: ordering
            question: "Place these conductor fill adjustment factors in order from highest to lowest percentage per Table 310.15(C)(1)."
            options:
              - "10-20 current-carrying conductors — 50%"
              - "4-6 current-carrying conductors — 80%"
              - "7-9 current-carrying conductors — 70%"
            correct: "1,2,0"
            explanation: "Per Table 310.15(C)(1): 4-6 conductors = 80%, 7-9 conductors = 70%, 10-20 conductors = 50%. More conductors in a raceway means more derating."


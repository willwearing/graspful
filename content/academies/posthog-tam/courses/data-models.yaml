course:
  id: data-models
  name: Data Models
  description: >-
    Generic data modeling concepts — entities, attributes, keys, relationships,
    cardinality, join tables, and the design process.
  estimatedHours: 2
  version: '2026.1'
  sourceDocument: PostHog product documentation and data modeling fundamentals, reviewed March 2026

sections:
  - id: data-modeling-basics
    name: Data Modeling Basics
    description: Entities, attributes, and keys — the building blocks of any data model.
    sectionExam:
      enabled: true
      passingScore: 0.75
      timeLimitMinutes: 12
      questionCount: 6
      blueprint:
        - conceptId: entities
          minQuestions: 2
        - conceptId: attributes
          minQuestions: 2
        - conceptId: keys-and-identity
          minQuestions: 2
      instructions: >-
        Work without step-by-step cues. Show that you can distinguish entities, attributes, and keys,
        then apply those ideas to realistic PostHog-flavored examples.
  - id: data-modeling-design
    name: Data Modeling Design
    description: Relationships, cardinality, join tables, and the design process.

concepts:
  - id: entities
    name: Entities — Things That Exist
    difficulty: 2
    estimatedMinutes: 10
    tags:
      - foundational
      - data-modeling
    prerequisites: []
    encompassing: []
    knowledgePoints:
      - id: what-is-an-entity
        instruction: >-
          An **entity** is anything you need to store information about in a system. Entities are the nouns — the people, places, things, and concepts that matter to your business.


          If you find yourself wanting to describe something with multiple facts (attributes), you are looking at an entity. A Customer is an entity because you want to track their name, email, and signup date. An Order is an entity because it has an order number, total, and status. A Product is an entity because it has a SKU, price, and description.


          Entities are not actions or verbs — those become relationships later.


          **The key test:** can you have more than one of this thing, and do you need to tell them apart? If yes, it is an entity.


          In a hospital system, Patient, Doctor, Appointment, and Medication are all entities. In a music streaming app, User, Song, Playlist, and Artist are entities.


          Recognizing entities is the first and most important step in data modeling because everything else — attributes, keys, relationships — hangs off of them.
        instructionContent:
          - type: callout
            title: Entity identification shortcut
            body: >-
              Ask three questions in order: can there be many of these, do we need to distinguish one from another, and do we track multiple facts about each one?
          - type: link
            url: https://www.lucidchart.com/pages/er-diagrams
            title: Visual ER diagram primer
            description: Use this when the learner needs a picture of how entities become boxes in a model.
        problems:
          - id: entities-p1
            type: multiple_choice
            question: Which of the following best describes an entity in data modeling?
            options:
              - A verb that describes an action in the system
              - A thing you need to store information about, like a Customer or Order
              - A single data value, like a name or email address
              - A rule that governs how data is validated
            correct: 1
            explanation: >-
              An entity is a noun — a thing you need to store information about. Customer, Order, and Product are classic examples. Verbs become relationships, single values become attributes, and
              rules become constraints.
          - id: entities-p2
            type: true_false
            question: In data modeling, an entity represents a single data value like a phone number or email address.
            correct: 'false'
            explanation: >-
              A single data value like a phone number is an attribute, not an entity. An entity is a thing (like a Customer) that has multiple attributes (name, phone number, email). Entities are the
              nouns; attributes are the facts about those nouns.
          - id: entities-p3
            type: scenario
            question: You are building a project management tool. Users create projects, add tasks to projects, and assign tasks to team members. Which of the following is NOT an entity in this system?
            options:
              - User
              - Project
              - Assigns (the act of assigning a task)
              - Task
            correct: 2
            explanation: >-
              'Assigns' is a verb describing the relationship between a User and a Task — it is a relationship, not an entity. User, Project, and Task are all nouns that you would store information
              about, making them entities.
      - id: identifying-entities
        instruction: >-
          The first step in any data modeling exercise is identifying entities. A reliable technique: read or write a plain-English description of the system and **circle the nouns**.


          In the sentence "Customers place orders for products," the nouns are Customer, Order, and Product — those are your candidate entities. Verbs like "place" and "for" hint at relationships you will define later.


          Not every noun becomes an entity. A good entity has three qualities: it has **multiple instances** (there are many customers, not just one), it needs to be **uniquely identified** (Customer 42 vs Customer 43), and it has **its own attributes** worth tracking.


          If a noun is really just a single attribute of another entity, it is not its own entity. For example, "color" is probably an attribute of Product, not a standalone entity — unless your system needs to track detailed information about each color (name, hex code, pantone number), in which case it might become one.
        workedExample: >-
          Consider an e-commerce system described as: 'Customers browse a catalog of products. They add items to a shopping cart and place orders. Each order contains one or more line items, and
          payments are processed for each order.' Step 1: Circle the nouns — Customer, Catalog, Product, Shopping Cart, Order, Line Item, Payment. Step 2: Evaluate each. Catalog is probably just the
          collection of products, not a separate entity. Shopping Cart might be an entity or might be a temporary state of an Order. The strong entities are: Customer, Product, Order, Line Item, and
          Payment. Each has multiple instances, needs unique identification, and has its own attributes.
        problems:
          - id: identifying-entities-p1
            type: multiple_choice
            question: In the sentence 'Students enroll in courses taught by professors,' how many entities can you identify?
            options:
              - 1 — only Student
              - 2 — Student and Course
              - 3 — Student, Course, and Professor
              - 4 — Student, Course, Professor, and Enroll
            correct: 2
            explanation: Student, Course, and Professor are the three entities (nouns that need to be tracked). 'Enroll' and 'taught by' are verbs describing relationships, not entities.
          - id: identifying-entities-p2
            type: multiple_choice
            question: The first step in data modeling is to identify entities by looking for the ___ in a system description.
            options:
              - nouns
              - verbs
              - numbers
              - dates
            correct: 0
            explanation: Entities are the nouns in your system — the people, places, things, and concepts you need to store information about. Verbs become relationships.
          - id: identifying-entities-p3
            type: scenario
            question: >-
              You read this product brief: 'Drivers deliver packages to customers. Each delivery has a timestamp and a signature.' A teammate says Delivery is not an entity because it started as a verb.
              How do you respond?
            options:
              - They are correct — 'deliver' is a verb, so Delivery cannot be an entity
              - Delivery has its own attributes (timestamp, signature) and multiple instances, so it qualifies as an entity
              - Delivery should be stored as an attribute on Package instead
              - Delivery is only a relationship and can never become an entity
            correct: 1
            explanation: >-
              The three-part test still applies. Delivery has multiple instances, needs unique identification, and has its own attributes (timestamp, signature). Some words that start as verbs evolve
              into entities once they accumulate their own facts. If you agreed with the teammate, revisit the entity identification shortcut.
    section: data-modeling-basics
  - id: attributes
    name: Attributes — Properties of Entities
    difficulty: 2
    estimatedMinutes: 14
    tags:
      - foundational
      - data-modeling
    prerequisites:
      - entities
    encompassing: []
    knowledgePoints:
      - id: what-are-attributes
        instruction: >-
          Attributes are the individual facts stored about one entity instance. A Customer might have first_name, email, and signup_date. An Order might have order_number, total_amount, and status.
          The first quality bar is atomicity: each attribute should hold one fact, not a bundled sentence. A field like 'name_and_address' is really several attributes hiding inside one column.
          Atomic attributes are easier to validate, filter, sort, and reuse in analysis.
        instructionContent:
          - type: callout
            title: Atomic first
            body: >-
              If you cannot answer "what single fact does this field store?" without saying "and", the field is probably too wide.
          - type: link
            url: https://www.postgresql.org/docs/current/datatype.html
            title: PostgreSQL data types overview
            description: Use this as a concrete reference for the kinds of atomic values attributes are usually meant to hold.
        problems:
          - id: attributes-p1
            type: multiple_choice
            question: Which of the following is the best set of attributes for a Product entity in an e-commerce system?
            options:
              - product_info (containing name, price, and description in one field)
              - sku, name, price, description, category, created_at
              - product, details, misc_data
              - name, order_id, customer_email
            correct: 1
            explanation: >-
              Good attributes are atomic (one fact each), descriptive, and belong to the entity. Option B has clear, atomic attributes that all describe a Product. Option A violates atomicity by
              combining values. Option C is too vague. Option D mixes in attributes from other entities (order_id, customer_email).
          - id: attributes-p2
            type: true_false
            question: An attribute called 'full_address' that stores '123 Main St, Springfield, IL 62704' follows good data modeling practice.
            correct: 'false'
            explanation: >-
              This violates the atomicity principle. A good data model would break this into separate attributes: street, city, state, and zip_code. Atomic attributes make it possible to query,
              filter, and sort by individual components (e.g., find all customers in Illinois).
          - id: attributes-p5
            type: scenario
            question: >-
              A teammate designs a Customer table with a field called 'contact_info' that stores 'jane@co.com | 555-1234 | San Francisco'. What feedback would you give?
            options:
              - This is efficient because it saves columns
              - The field violates atomicity — it should be split into email, phone, and city
              - Contact info is not an attribute at all
              - This is fine as long as the application parses it correctly
            correct: 1
            explanation: >-
              Bundling multiple facts into one field makes filtering, sorting, and validating each fact impossible at the database level. Split it into email, phone, and city so each attribute holds
              one fact. If you thought application parsing is good enough, consider what happens when someone queries 'find all customers in San Francisco' — a bundled field makes that painful.
      - id: attribute-boundaries
        instruction: >-
          After you list candidate attributes, ask two follow-up questions. First: does this field really belong to this entity? Second: is this still an attribute, or has it become its own entity or
          relationship? Repeated structured data often signals a missing relationship. If Order and Invoice both store customer_name, that fact probably belongs on Customer instead. Attribute design is
          really boundary design: one fact, owned by one entity, in the place where it can stay accurate over time.
        workedExample: >-
          Imagine a catalog where every Product row stores color_name, color_hex, and pantone_code. That works until the business wants one shared color catalog used across many products. At that
          point, Color is no longer just a label on Product. It has its own reusable structure, so Product should reference Color instead of duplicating those fields everywhere.
        instructionContent:
          - type: link
            url: https://www.postgresql.org/docs/current/tutorial-fk.html
            title: PostgreSQL foreign key tutorial
            description: Helpful once a learner sees that repeated attributes usually point to a missing reference entity.
        problems:
          - id: attributes-p3
            type: multiple_choice
            question: If you find the attribute 'customer_name' appearing on both the Order entity and the Invoice entity, what does this likely indicate?
            options:
              - This is good practice — data should be duplicated for safety
              - A missing relationship — both entities should reference the Customer entity instead
              - The Order and Invoice entities should be combined into one
              - customer_name should be removed from both entities
            correct: 1
            explanation: >-
              When the same attribute appears on multiple entities, it usually means there is a missing relationship. Both Order and Invoice should reference a Customer entity via a foreign key,
              rather than duplicating the customer's name.
          - id: attributes-p4
            type: scenario
            question: >-
              A merch store keeps color_name, color_hex, and pantone_code directly on every Product row. The team now wants one reusable color catalog shared across many products. What is the best next
              move?
            options:
              - Keep the color fields on Product and add more color columns as needed
              - Create a Color entity and reference it from Product
              - Combine the three fields into one text blob so the row stays shorter
              - Remove color entirely because attributes should never repeat
            correct: 1
            explanation: >-
              Once color has its own reusable structure, it has crossed the line from "simple attribute" into "reference entity." A Color entity keeps the shared facts in one place and lets Product
              point to them cleanly.
          - id: attributes-p6
            type: true_false
            question: If the same structured data (like color_name, color_hex) appears on multiple entities, it is always best to leave those fields duplicated on each entity.
            correct: 'false'
            explanation: >-
              Repeated structured data across entities usually signals a missing reference entity. When the same cluster of fields appears in multiple places, extract them into their own entity and
              reference it via foreign key. This avoids duplication and keeps updates consistent.
    section: data-modeling-basics
  - id: keys-and-identity
    name: Keys — Uniquely Identifying Things
    difficulty: 3
    estimatedMinutes: 18
    tags:
      - foundational
      - data-modeling
    prerequisites:
      - entities
      - attributes
    encompassing: []
    knowledgePoints:
      - id: primary-keys
        instruction: >-
          Every entity needs a primary key: the attribute, or combination of attributes, that uniquely identifies one instance. Customer 42 is different from Customer 43 because their keys are
          different. The first job of a primary key is identity inside the entity itself. A good primary key is unique, stable over time, and never null. If any of those fail, the entity becomes hard
          to trust because duplicates, broken references, or missing records start to appear.
        instructionContent:
          - type: callout
            title: Three tests for a primary key
            body: >-
              Ask three questions: can two rows share it, can it change later, and can it ever be missing? If the answer is yes to any of those, it is a weak primary key candidate.
          - type: link
            url: https://www.postgresql.org/docs/current/ddl-constraints.html#DDL-CONSTRAINTS-PRIMARY-KEYS
            title: PostgreSQL primary key reference
            description: A concrete reference for how databases enforce the uniqueness and non-null guarantees discussed here.
        workedExample: >-
          Imagine an Order table keyed by order_id. If order_id is unique, present on every row, and never reused, then each order stays distinguishable even when many orders have the same amount,
          date, or customer. That is what makes order_id a real identity field instead of just another attribute.
        problems:
          - id: keys-p1
            type: multiple_choice
            question: What is the primary purpose of a primary key in data modeling?
            options:
              - To store the most important attribute of an entity
              - To uniquely identify each instance of an entity
              - To encrypt sensitive data in the entity
              - To define the data type of each attribute
            correct: 1
            explanation: >-
              A primary key uniquely identifies each instance of an entity. It ensures no two records are the same and allows other entities to reference it. It is not about importance, encryption, or
              data types.
          - id: keys-p4
            type: multiple_choice
            question: Which combination best describes a strong primary key?
            options:
              - Easy to memorize, human-readable, and optional
              - Unique, stable over time, and never null
              - Long text, frequently updated, and visible to users
              - Derived from several changing business rules
            correct: 1
            explanation: >-
              If you were drawn to readability, you focused on convenience instead of identity quality. A strong primary key must stay unique, stable, and present even when business labels change.
          - id: keys-p7
            type: scenario
            question: >-
              A developer proposes using 'order_date' as the primary key for an Orders table because each order has a different date. On a busy day the system creates two orders at the exact same
              timestamp. What problem does this cause?
            options:
              - No problem — timestamps are always unique
              - The primary key constraint fails because two rows share the same value
              - The database automatically adds a suffix to make them unique
              - The second order overwrites the first
            correct: 1
            explanation: >-
              Timestamps are not guaranteed unique, especially under high throughput. A primary key must be unique for every row. If you assumed timestamps are always distinct, the mental model fix
              is to separate 'usually unique' from 'guaranteed unique.' Use a surrogate key instead.
      - id: foreign-keys-need-stable-targets
        instruction: >-
          Once an entity has a trustworthy primary key, other entities can point at it with foreign keys. That is how a model expresses connections such as "this Order belongs to Customer 42." This
          only works if the referenced key stays stable. If the target key changes, every relationship that points to it becomes harder to maintain. That is why key choice is not just a local table
          decision. It shapes whether the rest of the model can connect safely.
        instructionContent:
          - type: callout
            title: Identity spreads outward
            body: >-
              A weak key does not stay a local problem. The moment another table references it, that weakness becomes a relationship problem too.
          - type: link
            url: https://www.postgresql.org/docs/current/tutorial-fk.html
            title: PostgreSQL foreign key tutorial
            description: Useful reference for how foreign keys depend on stable primary keys.
        workedExample: >-
          Suppose Orders stores customer_id to show which customer placed each order. If customer_id is a stable surrogate key, every order can keep pointing to the right customer even if the
          customer's email or company name changes later.
        problems:
          - id: keys-p5
            type: scenario
            question: An Order row stores customer_id = 42. What role is customer_id playing inside the Order entity?
            options:
              - It is the Order's primary key
              - It is a foreign key pointing to the Customer entity
              - It is an optional display label
              - It is a session identifier
            correct: 1
            explanation: >-
              Inside Order, customer_id points to a Customer record, so it is a foreign key. If you chose "primary key," you mixed up "identifies this row" with "references another row."
          - id: keys-p6
            type: multiple_choice
            question: Why does key stability matter beyond the table where the key lives?
            options:
              - Stable keys make column names shorter
              - Other entities may reference that key, so changing it can break relationships
              - Stable keys automatically improve query speed
              - Only unstable keys can be indexed
            correct: 1
            explanation: >-
              Other entities depend on that key as a reference target. If you missed this, the misconception is treating key design as a local table concern instead of the backbone of relationships.
          - id: keys-p8
            type: true_false
            question: A foreign key can safely point to a primary key that is occasionally updated, as long as the updates are small.
            correct: 'false'
            explanation: >-
              Any change to a referenced primary key risks breaking every foreign key that points to it. Size of change does not matter — even a small edit creates a mismatch. Stability means no
              changes, not small changes.
      - id: choosing-key-types
        instruction: >-
          Once you know an entity needs a key, the next decision is what kind. Surrogate keys are system-generated IDs such as integers or UUIDs. Natural keys come from the business domain, like email
          or SKU. Composite keys combine multiple fields. Surrogate keys are usually the safest default because they stay stable even when business data changes. Natural and composite keys can still be
          useful, but only when their uniqueness and stability are truly dependable.
        workedExample: >-
          Suppose a User table uses email as its primary key. That feels convenient until someone changes their email address, or two employees share a team inbox. A surrogate user_id avoids that
          instability, while email can remain a normal attribute with its own unique constraint if the business needs it.
        instructionContent:
          - type: callout
            title: Safe default
            body: >-
              If the business field might change, let it be an attribute with a uniqueness rule and keep a surrogate ID as the true primary key.
        problems:
          - id: keys-p2
            type: multiple_choice
            question: A system-generated ID with no business meaning (like an auto-incrementing integer) is called what kind of key?
            options:
              - natural key
              - surrogate key
              - composite key
              - foreign key
            correct: 1
            explanation: >-
              A surrogate key is a system-generated identifier with no inherent business meaning. It is preferred over natural keys (like email or SSN) because surrogate keys are guaranteed to be
              stable and unique.
          - id: keys-p3
            type: true_false
            question: Using an email address as a primary key is always a good choice because every user has a unique email.
            correct: 'false'
            explanation: >-
              Email addresses can change and they are not guaranteed to map cleanly to one durable identity. If you answered true, the likely mistake is confusing "often unique right now" with
              "safe primary key for the life of the record." Surrogate keys are safer because they stay stable even when business data changes.
          - id: keys-p9
            type: scenario
            question: >-
              A Product table uses SKU as its primary key. The business decides to change the SKU format from '5-digit number' to 'prefix-5-digit' for all existing products. What risk does this create?
            options:
              - No risk — SKUs are just labels
              - Every table with a foreign key referencing Product.sku must also be updated, which is error-prone at scale
              - The database automatically cascades the change
              - Only new products are affected
            correct: 1
            explanation: >-
              Changing a natural key that is referenced as a foreign key in other tables requires coordinated updates everywhere. This is exactly why surrogate keys are the safer default — they never
              need to change when business labels evolve. Cascade rules can help but add complexity and risk.
    section: data-modeling-basics
  - id: relationships
    name: Relationships — How Entities Connect
    difficulty: 3
    estimatedMinutes: 12
    tags:
      - foundational
      - data-modeling
    prerequisites:
      - entities
      - keys-and-identity
    encompassing: []
    knowledgePoints:
      - id: what-are-relationships
        instruction: >-
          A **relationship** describes how two entities interact or connect. In the sentence "Customers place Orders," the verb "places" is the relationship between the Customer entity and the Order entity.


          Relationships are the verbs and prepositions in your system description. They have a direction (Customer places Order, not the reverse) and a name that describes the interaction.


          **Implementation:** relationships are implemented through foreign keys — an attribute on one entity that references the primary key of another. For example, the Order entity would have a customer_id attribute that points to the Customer entity's primary key.


          Without relationships, your entities would be isolated silos of data with no way to answer questions like "which customer placed this order?" or "what orders does this customer have?"
        instructionContent:
          - type: callout
            title: Read the arrow carefully
            body: >-
              The foreign key usually lives on the side that has many records. In Customer -> Order, the relationship is implemented by customer_id on Order.
          - type: link
            url: https://www.lucidchart.com/pages/er-diagrams
            title: Relationship and foreign-key visual guide
            description: Helpful when a learner needs to see one-to-many and many-to-many relationships drawn out.
        problems:
          - id: relationships-p1
            type: multiple_choice
            question: In data modeling, how are relationships between entities typically implemented?
            options:
              - By storing all related data in a single large table
              - By using foreign keys — an attribute on one entity that references the primary key of another
              - By duplicating data across multiple entities
              - By creating a separate configuration file
            correct: 1
            explanation: >-
              Relationships are implemented through foreign keys. A foreign key is an attribute on one entity (like customer_id on Order) that references the primary key of another entity (Customer).
              This creates a link between the two without duplicating data.
          - id: relationships-p2
            type: scenario
            question: >-
              You are designing a blog platform. Posts are written by Authors, and each Post can have many Comments. A junior developer suggests storing the author's name and email directly on every
              Post record instead of using a foreign key to an Author entity. What is the main problem with this approach?
            options:
              - It makes the Post table too wide
              - It creates data duplication — if the author changes their email, you must update every Post
              - It violates naming conventions
              - It makes the database slower to read
            correct: 1
            explanation: >-
              Duplicating author data on every Post creates an update anomaly — if the author changes their email, you must find and update every Post record. Using a foreign key (author_id on Post
              referencing the Author entity) means the email is stored once and changes propagate automatically.
          - id: relationships-p3
            type: true_false
            question: Without relationships (foreign keys), you could still answer the question 'which customer placed this order?' using only the Order table.
            correct: 'false'
            explanation: >-
              Without a foreign key connecting Order to Customer, the Order table has no reference to the Customer entity. You could not determine which customer placed which order. Relationships are
              what make cross-entity questions answerable.
      - id: optional-vs-mandatory
        instruction: >-
          Relationships can be **optional** or **mandatory**.


          A **mandatory** relationship means every instance of one entity must be connected to the other. An Order must have a Customer — it makes no sense to have an order with no buyer.


          An **optional** relationship means the connection may or may not exist. A Customer may have zero orders (they signed up but never purchased).


          These participation rules reflect real business logic and prevent invalid data.


          **In database terms:** mandatory relationships translate to NOT NULL foreign keys — the foreign key column cannot be empty. Optional relationships allow NULL foreign keys.


          Getting this right matters for data quality. If your model says "every order must have a customer" but the database allows null customer_id, you will eventually get orphaned orders that break reports and analytics.
        problems:
          - id: optional-mandatory-p1
            type: multiple_choice
            question: In a system where every Invoice must belong to a Customer, but a Customer may have zero invoices, which statement is correct?
            options:
              - Both sides of the relationship are mandatory
              - The Invoice-to-Customer side is mandatory; the Customer-to-Invoice side is optional
              - Both sides of the relationship are optional
              - The Customer-to-Invoice side is mandatory; the Invoice-to-Customer side is optional
            correct: 1
            explanation: >-
              Every Invoice must have a Customer (mandatory from Invoice side — the foreign key customer_id cannot be null). But a Customer can exist without any Invoices (optional from Customer
              side). This asymmetry is very common in real data models.
          - id: optional-mandatory-p2
            type: true_false
            question: If a relationship is optional on one side, it must also be optional on the other side.
            correct: 'false'
            explanation: Relationships can have different participation on each side. An Order must have a Customer (mandatory), but a Customer may have zero Orders (optional). The two sides are independent.
          - id: optional-mandatory-p3
            type: scenario
            question: >-
              A User entity has a profile_photo_id foreign key pointing to a Photo entity. Some users have not uploaded a photo. Should this foreign key be NOT NULL or nullable?
            options:
              - NOT NULL — every user must have a photo
              - Nullable — the relationship is optional because not every user has a photo
              - Remove the foreign key and store the photo data directly on User
              - Use a default placeholder photo_id that all users without photos share
            correct: 1
            explanation: >-
              Since some users have no photo, the relationship is optional and the foreign key should be nullable. Making it NOT NULL would prevent creating users who have not uploaded a photo yet.
              The placeholder option works but masks the optionality with a workaround rather than modeling it cleanly.
    section: data-modeling-design
  - id: cardinality
    name: Cardinality — How Many of Each?
    difficulty: 4
    estimatedMinutes: 18
    tags:
      - foundational
      - data-modeling
    prerequisites:
      - relationships
    encompassing: []
    knowledgePoints:
      - id: cardinality-types
        instruction: >-
          Cardinality answers the question "how many of A can connect to how many of B?" There are three patterns to recognize. One-to-one means each side matches one instance on the other side.
          One-to-many means one record on the left can connect to many on the right, but each right-side record points back to only one left-side record. Many-to-many means both sides can have many
          matches. Cardinality is the bridge between business rules and table design.
        instructionContent:
          - type: callout
            title: Read both directions
            body: >-
              Always say the relationship out loud both ways. "One customer has many orders" and "each order belongs to one customer" is how you confirm you are truly looking at one-to-many.
        problems:
          - id: cardinality-p1
            type: multiple_choice
            question: A single Author can write many Books, but each Book has exactly one Author. What is the cardinality of this relationship?
            options:
              - One-to-one
              - One-to-many
              - Many-to-many
              - Many-to-one
            correct: 1
            explanation: One Author to many Books is a one-to-many (1:N) relationship. The foreign key (author_id) goes on the Book entity — the 'many' side.
          - id: cardinality-p2
            type: matching
            question: Match each real-world scenario to its cardinality type.
            options:
              - Person and Social Security Number|One-to-one
              - Department and Employees|One-to-many
              - Students and Courses|Many-to-many
              - Country and Capital City|One-to-one
            correct: 0,1,2,3
            explanation: >-
              A Person has one SSN and vice versa (1:1). A Department has many Employees, each Employee in one Department (1:N). Students take many Courses and Courses have many Students (M:N). A
              Country has one Capital and each Capital belongs to one Country (1:1).
          - id: cardinality-p5
            type: true_false
            question: In a one-to-many relationship, records on the 'many' side can each point to a different record on the 'one' side.
            correct: 'true'
            explanation: >-
              In one-to-many, each record on the 'many' side points to exactly one record on the 'one' side — but different 'many' records can point to different 'one' records. For example, different
              Orders can belong to different Customers. If you answered false, you may have confused this with one-to-one.
      - id: implementing-cardinality
        instruction: >-
          Once you know the cardinality, you can decide the implementation pattern. One-to-many is usually implemented with a foreign key on the many side. One-to-one often uses a foreign key plus a
          unique constraint, or it may signal that two entities should really be one. Many-to-many cannot be represented by a single foreign key, so it becomes a join table. The key move is to derive
          the storage pattern from the business rule instead of memorizing table shapes.
        instructionContent:
          - type: link
            url: https://www.postgresql.org/docs/current/tutorial-fk.html
            title: PostgreSQL foreign key tutorial
            description: Use this when the learner wants to see how one-to-many relationships become actual foreign-key columns.
        problems:
          - id: cardinality-p3
            type: scenario
            question: >-
              You are modeling a music streaming service. Users can create many Playlists, and each Playlist belongs to one User. However, each Playlist can contain many Songs, and each Song can
              appear in many Playlists. Which relationship is many-to-many?
            options:
              - User to Playlist
              - Playlist to Song
              - User to Song
              - Both User to Playlist and Playlist to Song
            correct: 1
            explanation: >-
              Playlist to Song is many-to-many: a Playlist contains many Songs, and a Song can appear in many Playlists. User to Playlist is one-to-many: one User creates many Playlists, but each
              Playlist has one creator.
          - id: cardinality-p4
            type: multiple_choice
            question: In a one-to-many relationship, where does the foreign key go?
            options:
              - On the 'one' side
              - On the 'many' side
              - On both sides
              - In a separate table
            correct: 1
            explanation: The foreign key always goes on the 'many' side. In Customer (one) to Orders (many), the Order table gets a customer_id foreign key. Each Order points to its one Customer.
          - id: cardinality-p6
            type: scenario
            question: >-
              You discover that a one-to-one relationship between Employee and ParkingPass is implemented with a foreign key on ParkingPass but no unique constraint. What could go wrong?
            options:
              - Nothing — the foreign key is sufficient
              - Without a unique constraint, one employee could accidentally get multiple parking passes, violating the one-to-one rule
              - The database will enforce one-to-one automatically
              - ParkingPass should not have a foreign key at all
            correct: 1
            explanation: >-
              A foreign key alone enforces referential integrity, not uniqueness. For one-to-one, you also need a unique constraint on the foreign key column so that no two ParkingPass rows point
              to the same Employee. Without it, the relationship silently degrades to one-to-many.
    section: data-modeling-design
  - id: associative-entities
    name: Associative Entities — Join Tables
    difficulty: 4
    estimatedMinutes: 14
    tags:
      - foundational
      - data-modeling
    prerequisites:
      - cardinality
    encompassing: []
    knowledgePoints:
      - id: resolving-many-to-many
        instruction: >-
          Many-to-many relationships cannot be implemented with one foreign-key column. You need a third entity, usually called a join table or associative entity, that turns one many-to-many into two
          one-to-many relationships. Students and Courses become Enrollment. Orders and Products become OrderLineItem. The join table is not a workaround; it is the real entity that represents each
          pairing.
        instructionContent:
          - type: callout
            title: Think in pairings
            body: >-
              A join-table row represents one specific pairing: this student in this course, this product in this order, this user in this role.
        problems:
          - id: assoc-p1
            type: multiple_choice
            question: Why can't a many-to-many relationship be implemented with a simple foreign key?
            options:
              - Foreign keys only support numeric data types
              - A single foreign key column can only point to one record, but many-to-many requires pointing to multiple records on both sides
              - Most databases do not support foreign keys
              - Many-to-many relationships are not allowed in data modeling
            correct: 1
            explanation: >-
              A foreign key column holds one value pointing to one record. In a many-to-many, each Student relates to multiple Courses and vice versa — a single column cannot represent this. A join
              table with rows for each pairing solves the problem.
          - id: assoc-p2
            type: multiple_choice
            question: An associative entity that resolves a many-to-many relationship between Order and Product is commonly called what?
            options:
              - OrderStatus
              - OrderLineItem
              - CustomerProfile
              - ProductCatalog
            correct: 1
            explanation: OrderLineItem (or line_item) is the classic join table between Order and Product. Each row represents one product in one order, with its own attributes like quantity and unit_price.
          - id: assoc-p5
            type: true_false
            question: A join table (associative entity) is just a workaround for a database limitation and does not represent a real concept in the data model.
            correct: 'false'
            explanation: >-
              A join table is a real entity that represents each specific pairing. Enrollment is a real thing (this student in this course), not just a technical workaround. It can have its own
              attributes like enrollment_date and grade. If you answered true, revisit the idea that the pairing itself is a first-class concept.
      - id: relationship-level-attributes
        instruction: >-
          The most important mental model is this: some facts belong to the relationship itself, not to either side of the relationship. Grade belongs to an Enrollment. Quantity belongs to an
          OrderLineItem. Assigned_at belongs to a RoleAssignment. If you find yourself wondering where a fact goes, ask: "does this describe the left entity, the right entity, or this specific
          pairing?"
        workedExample: >-
          In a hospital, Doctor and Patient are separate entities. But diagnosis_date and treatment_notes do not belong permanently to either Doctor or Patient. They describe one encounter between
          them, so they belong on a Visit entity that links the two.
        instructionContent:
          - type: link
            url: https://www.postgresql.org/docs/current/tutorial-fk.html
            title: PostgreSQL foreign key tutorial
            description: Once the learner accepts the join table as a real entity, this is the next step for seeing how the references are stored.
        problems:
          - id: assoc-p3
            type: scenario
            question: >-
              A hospital system has Doctors and Patients with a many-to-many relationship (a doctor treats many patients, a patient sees many doctors). You need to track the date of each visit and the
              diagnosis. Where should these attributes live?
            options:
              - On the Doctor entity
              - On the Patient entity
              - On an associative entity (e.g., Visit) between Doctor and Patient
              - In a separate configuration table
            correct: 2
            explanation: >-
              Visit date and diagnosis describe the specific interaction between a Doctor and a Patient — they belong on the associative entity (Visit). They are not properties of the Doctor or
              Patient alone, but of the relationship between them.
          - id: assoc-p4
            type: scenario
            question: >-
              Users can have many Roles, and Roles can be granted to many Users. You also need to store assigned_by and assigned_at. Where should those two fields live?
            options:
              - On User, because the grant affects the user
              - On Role, because the grant describes the role
              - On a RoleAssignment join table between User and Role
              - In a separate audit table only
            correct: 2
            explanation: >-
              assigned_by and assigned_at describe one specific grant of one role to one user. That makes them attributes of the relationship row, not permanent attributes of User or Role alone.
          - id: assoc-p6
            type: multiple_choice
            question: >-
              An e-commerce system has Orders and Products linked through OrderLineItem. The attribute 'quantity' describes how many of a specific product are in a specific order. Where does 'quantity'
              belong?
            options:
              - On the Order entity
              - On the Product entity
              - On the OrderLineItem (the join table)
              - In a separate configuration table
            correct: 2
            explanation: >-
              Quantity describes one specific pairing of one product in one order — it is a relationship-level attribute. It does not belong on Order (which may have many products) or on Product
              (which appears in many orders). It belongs on the join table that represents that specific pairing.
    section: data-modeling-design
  - id: data-modeling-process
    name: The Data Modeling Design Process
    difficulty: 3
    estimatedMinutes: 15
    tags:
      - foundational
      - data-modeling
    prerequisites:
      - associative-entities
    encompassing: []
    knowledgePoints:
      - id: five-step-workflow
        instruction: >-
          Data modeling works best as a fixed sequence. First identify entities. Then list attributes. Then define relationships. Then decide the cardinality of those relationships. Finally, resolve
          many-to-many relationships into join tables. The value of the workflow is not paperwork. It prevents you from jumping into tables too early and hiding structural mistakes inside SQL.
        instructionContent:
          - type: callout
            title: Sequence matters
            body: >-
              If you skip straight to table creation, you usually discover entity, relationship, and cardinality mistakes after code has already made them expensive.
        problems:
          - id: process-p1
            type: ordering
            question: Place these data modeling steps in the correct order.
            options:
              - Determine cardinality for each relationship
              - Identify entities
              - Resolve many-to-many into join tables
              - List attributes for each entity
              - Define relationships between entities
            correct: 1,3,4,0,2
            explanation: >-
              The five steps in order: (1) Identify entities, (2) List attributes, (3) Define relationships, (4) Determine cardinality, (5) Resolve many-to-many. You must know your entities before
              their attributes, and relationships before their cardinality.
          - id: process-p3
            type: multiple_choice
            question: What is the main benefit of designing a data model before writing code or SQL?
            options:
              - It guarantees the system will never need changes
              - It produces cleaner queries, fewer bugs, and a system that is easier to evolve
              - It eliminates the need for a database entirely
              - It makes the system run faster at the hardware level
            correct: 1
            explanation: >-
              Upfront data modeling produces a well-structured foundation. This leads to cleaner queries, fewer bugs, and a system that is easier to evolve as new features arrive.
          - id: process-p5
            type: true_false
            question: It is fine to write SQL CREATE TABLE statements before identifying entities and their relationships, as long as you refactor later.
            correct: 'false'
            explanation: >-
              Jumping to tables before identifying entities, attributes, and relationships hides structural mistakes inside SQL that become expensive to fix. The five-step workflow exists to prevent
              rework. If you answered true, the misconception is treating modeling as optional paperwork rather than a design step that prevents downstream bugs.
      - id: applying-the-workflow
        instruction: >-
          The five-step process becomes useful only when you can run it on a real system description. The goal is to move from vague product prose to concrete modeling choices. At each step, ask a
          narrower question than the last: what things exist, what facts matter, how do they connect, how many of each connect, and which many-to-many pairings need their own entity?
        workedExample: >-
          Model a simple library system. Step 1 — Entities: Book, Member, Loan. Step 2 — Attributes: Book (isbn, title, author, published_year), Member (member_id, name, email, joined_date), Loan
          (loan_id, borrowed_date, due_date, returned_date). Step 3 — Relationships: Members borrow Books via Loans. Step 4 — Cardinality: One Member has many Loans. One Book has many Loans over
          time. Step 5 — Loan is the associative entity resolving the many-to-many between Member and Book.
        problems:
          - id: process-p2
            type: scenario
            question: >-
              A startup asks you to model their system: 'Users create Projects. Each Project has many Tasks. Users can be assigned to Tasks, and each Task can have multiple Users assigned.' You have
              identified User, Project, and Task as entities. What is the next modeling decision you need to make?
            options:
              - Choose a database vendor
              - Write SQL CREATE TABLE statements
              - Recognize that User-to-Task is many-to-many and create an associative entity (e.g., TaskAssignment)
              - Delete the Task entity since it is redundant with Project
            correct: 2
            explanation: >-
              User-to-Task is many-to-many (one User has many Tasks, one Task has many Users). You need an associative entity like TaskAssignment with user_id, task_id, and potentially attributes like
              assigned_date and role. This is step 5 of the data modeling process.
          - id: process-p4
            type: scenario
            question: >-
              You are modeling a subscription product. You have identified Customer and Plan. The business rule says one Customer can change Plans over time, and the team wants to keep started_at and
              cancelled_at for each change. What is the next strong modeling move?
            options:
              - Put started_at and cancelled_at directly on Customer
              - Create a Subscription entity linking Customer and Plan
              - Delete Plan because the dates matter more than the plan itself
              - Skip the model and let the application code track history
            correct: 1
            explanation: >-
              Once the relationship itself has history and dates, it deserves its own entity. Subscription captures the pairing between Customer and Plan over time, instead of forcing that history into
              Customer.
          - id: process-p6
            type: multiple_choice
            question: >-
              In the five-step modeling workflow, at which step do you decide that Student-to-Course needs a join table?
            options:
              - Step 1 — Identify entities
              - Step 3 — Define relationships
              - Step 4 — Determine cardinality
              - Step 5 — Resolve many-to-many into join tables
            correct: 3
            explanation: >-
              The decision to create a join table happens at step 5, after you have already identified entities, listed attributes, defined relationships, and determined cardinality. You must know
              the relationship is many-to-many (step 4) before resolving it (step 5).
    section: data-modeling-design

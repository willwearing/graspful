course:
  id: posthog-ingestion-pipeline
  name: PostHog Ingestion Pipeline
  description: >-
    PostHog-specific ingestion — event capture, the Kafka-to-ClickHouse
    pipeline, storage architecture, and person processing.
  estimatedHours: 2
  version: '2026.1'
  sourceDocument: PostHog product documentation (ingestion pipeline and ClickHouse architecture docs), reviewed March 2026

sections:
  - id: posthog-ingestion
    name: PostHog Ingestion Pipeline
    description: How events flow from capture through Kafka to ClickHouse storage.
    sectionExam:
      enabled: true
      passingScore: 0.75
      timeLimitMinutes: 12
      questionCount: 6
      blueprint:
        - conceptId: ph-event-capture
          minQuestions: 2
        - conceptId: ph-ingestion-pipeline

concepts:
  # ============================================================
  # Section: posthog-data-model
  # ============================================================
  - id: ph-events
    name: PostHog Events — The Atomic Unit
    difficulty: 3
    estimatedMinutes: 18
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/new-to-posthog/understand-posthog
    prerequisites:
      - data-pipelines:what-is-a-pipeline
    encompassing:
      - concept: data-models:entities
        weight: 0.35
    knowledgePoints:
      - id: what-is-a-posthog-event
        instruction: >-
          An **event** is the atomic unit of data in PostHog: one record of something that happened at a specific moment. Every event answers four questions:


          **What happened:** the event name. **When did it happen:** the timestamp. **Who or which device did it:** the distinct_id. **What extra context came with it:** the properties object.


          If one of those pieces is wrong or missing, PostHog can still ingest the record, but the downstream analysis gets weaker because the fact is harder to group, filter, or attribute correctly.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/new-to-posthog/understand-posthog
            title: PostHog data model overview
            description: Use this visual overview to anchor the idea that events sit at the center of the PostHog model.
          - type: image
            url: https://posthog.com/images/products/product-analytics/screenshot-product-analytics.png
            alt: PostHog product analytics interface built on event data
            caption: The UI is downstream of the event model. Every chart here starts from captured events.
            width: 960
        workedExample: >-
          A user visits your pricing page. PostHog's JS SDK automatically captures a '$pageview' event. The event looks like this internally: event name = '$pageview', timestamp =
          '2025-01-15T14:32:00Z', distinct_id = '018d4f2a-random-uuid', properties = { '$current_url': '/pricing', '$browser': 'Chrome', '$os': 'Mac OS X', '$device_type':
          'Desktop', '$referrer': 'google', '$referring_domain': 'google.com' }. Every one of these properties was set automatically by the SDK — the developer did not write any code
          beyond initializing PostHog.
        workedExampleContent:
          - type: callout
            title: Coaching angle
            body: >-
              When a customer says 'PostHog missed the user,' inspect the event first. Event name, timestamp, distinct_id, and properties usually reveal the real issue.
        problems:
          - id: ph-events-p1
            type: multiple_choice
            question: What are the four required components of every PostHog event?
            options:
              - Name, description, category, and priority
              - Event name, timestamp, distinct_id, and properties
              - Source, destination, payload, and status code
              - User ID, session ID, page URL, and browser
            correct: 1
            explanation: >-
              The mistake to avoid is swapping in examples like browser, URL, or session ID for the real event shape. Those may appear as properties, but the core event record is name, timestamp,
              distinct_id, and properties.
          - id: ph-events-p4
            type: multiple_choice
            question: In PostHog's data model, which entity is the central building block that all other entities relate to?
            options:
              - Person
              - Session
              - Event
              - Action
            correct: 2
            explanation: >-
              If you picked Person or Session, you are treating a derived layer as the raw fact. Event is the base record. Persons, sessions, actions, and groups are all built on top of event data.
          - id: ph-events-p5
            type: scenario
            question: >-
              A customer reports that some events in PostHog are missing the distinct_id field. They captured the events using a custom script that sends raw JSON to the capture API. What is the most
              likely cause of the problem?
            options:
              - PostHog silently drops events without distinct_id
              - The capture API requires distinct_id but the script is not including it in the payload
              - distinct_id is optional and only needed for identified events
              - The events are stored but hidden in the UI
            correct: 1
            explanation: >-
              Every PostHog event needs a distinct_id to answer 'who or which device did this.' The capture API expects it in the payload. If the custom script omits it, the event either fails
              validation or gets assigned a default that makes downstream analysis unreliable. Always check the four required components: event name, timestamp, distinct_id, and properties.
      - id: immutable-facts-and-default-events
        instruction: >-
          Events are **immutable facts** in PostHog. Once captured, they are records of what the system believed happened at that moment, so you do not edit them later the way you would update a person or company profile.


          PostHog also ships with **default events**, usually prefixed with `$`, such as `$pageview`, `$pageleave`, `$autocapture`, `$identify`, and `$set`.


          The useful distinction: default events tell you what the SDK already records for you, while immutability tells you how to react when the instrumentation was wrong.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/capture-events
            title: PostHog event capture docs
            description: Official reference for default events, SDK capture behavior, and event instrumentation patterns.
        problems:
          - id: ph-events-p2
            type: true_false
            question: PostHog events can be updated after they are captured to correct mistakes.
            correct: 'false'
            explanation: >-
              The common misconception is treating events like mutable profile rows. When event tracking is wrong, the fix is to correct the instrumentation going forward or adjust analysis logic, not
              to rewrite yesterday's event payloads.
          - id: ph-events-p3
            type: multiple_choice
            question: Events with names prefixed by which symbol are PostHog defaults, automatically captured by the SDKs?
            options:
              - "$"
              - "#"
              - "@"
              - "_"
            correct: 0
            explanation: >-
              The `$` prefix marks PostHog-defined default events. If you chose another symbol, you likely remembered a naming style rather than the actual SDK convention. Custom business events
              normally do not use the `$` prefix.
          - id: ph-events-p6
            type: scenario
            question: >-
              A customer realizes they misspelled a custom event name as 'singup_completed' instead of 'signup_completed' for the past two weeks. They ask you to fix the historical events. What do you
              tell them?
            options:
              - You can bulk-edit event names in the PostHog UI
              - Events are immutable — fix the instrumentation going forward and use an action to group both spellings for analysis
              - Delete the misspelled events and re-ingest them with the correct name
              - PostHog automatically corrects common typos
            correct: 1
            explanation: >-
              PostHog events are immutable facts. Once captured, they cannot be edited. The practical fix is to correct the instrumentation code so future events have the right name, then create
              an action that matches both spellings so historical analysis is not disrupted.
      - id: custom-vs-autocapture
        instruction: >-
          PostHog gives you two capture patterns. Autocapture records UI interactions automatically, which is useful for fast discovery and exploratory analysis. Custom events are emitted explicitly in
          your code and describe business actions in stable terms such as `signup_completed` or `subscription_upgraded`. The key judgment is knowing when to promote a behavior from convenient
          autocapture into intentional instrumentation. If the metric matters to the business, tie it to the business fact rather than to the text, selector, or layout of a button.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/capture-events
            title: PostHog capture events docs
            description: SDK examples and guidance for when to rely on autocapture versus when to ship custom events.
        problems:
          - id: ph-autocapture-p1
            type: multiple_choice
            question: What is the main risk of relying solely on autocapture for critical business metrics?
            options:
              - Autocapture does not work in web browsers
              - Autocapture events break when UI text or element structure changes
              - Autocapture is too expensive to use
              - Autocapture only works on mobile apps
            correct: 1
            explanation: >-
              Autocapture identifies elements by their text, CSS classes, and position. When a button changes from 'Sign Up' to 'Get Started,' the autocapture event properties change too, breaking any
              analysis that relied on the old text. Custom events avoid this because you control the event name.
          - id: ph-autocapture-p2
            type: scenario
            question: >-
              A customer wants to track how many users complete their checkout flow. They currently rely on autocapture to detect clicks on the 'Place Order' button. Their frontend team is about to
              redesign the checkout page. What do you recommend?
            options:
              - Keep using autocapture — it will adapt to the new design automatically
              - Add a custom event like posthog.capture('order_completed') that fires on successful checkout, independent of UI elements
              - Disable autocapture entirely to save costs
              - Ask the frontend team not to change the button text
            correct: 1
            explanation: >-
              A custom event like 'order_completed' is tied to the business action (a successful checkout), not the UI element (a button with specific text). It will survive any redesign. Autocapture
              is fragile for critical metrics because it depends on element properties that change with UI updates.
          - id: ph-autocapture-p3
            type: true_false
            question: Autocapture and custom events are mutually exclusive — you must choose one or the other.
            correct: 'false'
            explanation: >-
              You can (and should) use both. Autocapture gives you broad coverage for exploration and discovery. Custom events give you reliable, stable tracking for critical business actions. They
              complement each other.
    section: posthog-data-model
  - id: ph-event-properties
    name: Event Properties — Metadata on Events
    difficulty: 3
    estimatedMinutes: 12
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/product-analytics/capture-events
    prerequisites:
      - ph-events
    encompassing: []
    knowledgePoints:
      - id: default-vs-custom-properties
        instruction: >-
          Every PostHog event carries **properties** — a JSON object of key-value pairs that provide context about the event. Properties come in two flavors.


          **Default properties** are set automatically by the SDK with no code from you. These include: `$browser` (Chrome, Firefox, Safari), `$os` (Mac OS X, Windows, iOS), `$current_url` (the page URL when the event fired), `$referrer` (the referring page), `$device_type` (Desktop, Mobile, Tablet), `$screen_height` and `$screen_width`, `$timestamp`, and `$lib` (which SDK sent it).


          **Custom properties** are ones you define when capturing events, for example passing plan, amount, and currency alongside a purchase event. Custom properties let you attach business context that the SDK cannot infer.


          Properties are the backbone of analysis — you use them to filter events ("show me purchases where plan = pro"), break down metrics ("pageviews by browser"), and segment users. Without properties, events would be bare "something happened" records with no useful context.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/capture-events
            title: Event capture docs
            description: Official reference for default properties and custom capture payloads.
        problems:
          - id: ph-props-p1
            type: multiple_choice
            question: Which of the following is a default property automatically set by the PostHog JS SDK?
            options:
              - plan
              - amount
              - $browser
              - signup_source
            correct: 2
            explanation: >-
              $browser is automatically set by the SDK based on the user's browser. 'plan', 'amount', and 'signup_source' are custom properties that a developer would need to explicitly include when
              capturing events.
          - id: ph-props-p2
            type: multiple_choice
            question: To filter insights by the page where an event occurred, which default property should you use?
            options:
              - $pathname
              - $current_url
              - $host
              - $pageview_id
            correct: 1
            explanation: $current_url is the default property that captures the full URL of the page when the event was fired. It is automatically set by the JS SDK on every event.
          - id: ph-props-p3
            type: true_false
            question: Custom event properties must be defined in the PostHog UI before they can be used in code.
            correct: 'false'
            explanation: >-
              Custom properties are schemaless — you can send any key-value pair in your capture call and PostHog will accept it. No pre-registration or UI configuration is needed. Properties appear
              in the UI automatically after the first event containing them is captured.
      - id: event-vs-person-properties
        instruction: >-
          PostHog has two types of properties that are often confused: **event properties** and **person properties**.


          **Event properties** are attached to a specific event and describe the context of that action at that moment. They are per-event — each event carries its own snapshot. Example: `$current_url`, `button_text`, `cart_value`. If a user visits page A, the event has $current_url = /page-a. If they visit page B, that event has $current_url = /page-b.


          **Person properties** are stored on the person profile and describe the user across all their events. They persist and apply globally. Example: `email`, `plan`, `company_name`. A user on the "pro" plan has that property on their profile regardless of which event you are looking at.


          **The rule of thumb:** "Is this fact about the user generally, across all events?" Use a person property. "Is this fact about this specific action, right now?" Use an event property.


          Event properties do not retroactively change — each event is an immutable snapshot. Person properties are mutable — when you change someone's plan from "free" to "pro," the person property updates immediately.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/person-properties
            title: Person properties docs
            description: Use this when a learner needs the official rule set for persistent user attributes.
        workedExample: >-
          A user clicks "Upgrade" on `/pricing` while still on the free plan. The page URL belongs on the event because it describes that click. The plan belongs on the person because it describes the
          user across many events. Mixing them up either loses history or stores duplicate user facts on every event.
        problems:
          - id: ph-evperson-p1
            type: multiple_choice
            question: A user's subscription plan (free, pro, enterprise) should be stored as which type of property?
            options:
              - Event property — it describes what happened
              - Person property — it describes the user across all events
              - Session property — it describes the visit
              - Group property — it describes the company
            correct: 1
            explanation: >-
              A subscription plan describes the user generally, not a specific action. It should be a person property so it persists on the user's profile. If stored as an event property, you would
              need to attach it to every single event.
          - id: ph-evperson-p2
            type: scenario
            question: >-
              A customer tracks the page URL where a button was clicked. They store this as a person property ($set: { last_clicked_page: '/pricing' }). Every time the user clicks a different button
              on a different page, the person property updates. When they build a funnel analysis, they see unexpected results because the person property reflects the latest click, not the click at
              each funnel step. What went wrong?
            options:
              - They should have used a group property instead
              - Page URL at click time is per-event context and should be an event property, not a person property
              - They need to use $set_once instead of $set
              - Funnel analysis does not support properties
            correct: 1
            explanation: >-
              Page URL at click time is event-specific context — it varies per event. Storing it as a person property overwrites on every click, losing the history. It should be an event property so
              each event preserves the URL at the time of that specific click.
          - id: ph-evperson-p3
            type: matching
            question: Classify each property as event property or person property.
            options:
              - $current_url (page URL at event time)|Event property
              - email (user's email address)|Person property
              - cart_value (value of items in cart at checkout)|Event property
              - plan (user's subscription tier)|Person property
            correct: 0,1,2,3
            explanation: $current_url and cart_value are snapshots of context at event time (event properties). Email and plan describe the user generally and persist across events (person properties).
    section: posthog-data-model
  - id: ph-persons
    name: Persons & Person Profiles
    difficulty: 4
    estimatedMinutes: 18
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/data/persons
    prerequisites:
      - ph-events
      - data-models:keys-and-identity
      - data-models:relationships
    encompassing:
      - concept: data-models:keys-and-identity
        weight: 0.7
      - concept: data-models:relationships
        weight: 0.45
    knowledgePoints:
      - id: what-is-a-person
        instruction: >-
          A person in PostHog represents one user identity whose events, sessions, and properties can be tied together in one profile. In graph terms, Person is a one-to-many parent of Events: one
          person can have many events, but events can also exist without a person profile when the user is still anonymous. That distinction matters because new learners often assume every event must
          belong to a person. In PostHog, that is not true.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/data/persons
            title: Persons docs
            description: Official explanation of when person profiles exist and how they relate to identified events.
        problems:
          - id: ph-persons-p1
            type: multiple_choice
            question: Which of the following actions does NOT create a person profile in PostHog?
            options:
              - Calling posthog.identify()
              - Setting person properties with $set
              - Capturing an event with posthog.capture() without any identification
              - Calling posthog.group()
            correct: 2
            explanation: >-
              A plain posthog.capture() call without identification only creates an event with a distinct_id. It does not create a person profile (when using identified_only mode). identify(), $set,
              and group() all trigger person profile creation.
          - id: ph-persons-p2
            type: true_false
            question: Every event in PostHog must have an associated person profile.
            correct: 'false'
            explanation: >-
              Events can exist without a person profile. Anonymous events have a distinct_id but no person record. This is especially true in 'identified_only' mode where person profiles are only
              created when explicit identification occurs.
          - id: ph-persons-p3
            type: multiple_choice
            question: Which PostHog features require a person profile to function?
            options:
              - Viewing raw event data
              - Feature flags, experiments, and cohort targeting
              - Counting total pageviews
              - Viewing the project settings page
            correct: 1
            explanation: >-
              Feature flags need to know who the user is to decide which flag variant to serve. Experiments need person profiles for consistent bucketing. Cohorts group users by properties. All of
              these require person profiles. Raw event counting works without them.
      - id: what-person-profiles-enable
        instruction: >-
          Person profiles matter because several higher-level PostHog capabilities depend on stable user identity. Person properties power segmentation. Feature flags and experiments need a known user
          identity for consistent evaluation and bucketing. Cohorts use person state to build reusable groups. Without person profiles, you can still count events, but you lose person-level targeting,
          longitudinal user context, and many debugging workflows.
        problems:
          - id: ph-persons-p3a
            type: multiple_choice
            question: Which activity still works even if a project has event data but no usable person profiles?
            options:
              - Cohort targeting for feature flags
              - Consistent experiment bucketing per user
              - Counting total pageviews by day
              - Inspecting one user's merged identity history
            correct: 2
            explanation: >-
              Aggregate event counting still works because it does not require stable person identity. The other choices all depend on knowing which events belong to which user over time.
          - id: ph-persons-p4
            type: scenario
            question: >-
              A customer can count pageviews and signups, but they cannot target a feature to users on the `pro` plan or inspect one user's full journey. What missing layer should you look for first?
            options:
              - Session properties only
              - Person profiles with stable identity and person properties
              - Actions built from autocapture
              - Batch exports to a warehouse
            correct: 1
            explanation: >-
              Aggregate events alone are not enough for person-level tooling. Feature targeting and user-level debugging need person profiles plus person properties such as `plan`.
          - id: ph-persons-p5
            type: true_false
            question: Person properties in PostHog can be used to segment users in insights (e.g., 'show me pageviews broken down by plan tier') even without feature flags or experiments.
            correct: 'true'
            explanation: >-
              Person properties power segmentation in insights, not just feature flags. You can break down any event by person properties like plan, role, or signup_source. If you answered false,
              you may have thought person properties are only for targeting features — they are also the backbone of user-level analysis.
      - id: viewing-person-profiles
        instruction: >-
          In the PostHog UI, the person profile is the operational debugging surface. It brings together the user's distinct_ids, person properties, event history, session recordings, feature flag
          evaluations, and group memberships. When a customer asks 'what did user X do?' or 'why is user X seeing this feature?', the person profile is usually the fastest way to inspect the full
          identity state in one place.
        instructionContent:
          - type: callout
            title: Debugging shortcut
            body: >-
              If the question mentions one specific user, start at the person profile before diving into insights. It is the best place to catch duplicate IDs, stale person properties, or unexpected
              flag evaluations.
        workedExample: >-
          A TAM investigates why one customer claims a beta feature never appeared. The person profile shows the user's distinct_ids, recent events, current person properties, and feature flag
          evaluations in one place. That is usually faster than jumping between raw event tables and flag settings separately.
        problems:
          - id: ph-viewing-p1
            type: multiple_choice
            question: Where in the PostHog UI can you see all distinct_ids associated with a person, their properties, event history, and feature flag evaluations?
            options:
              - The Events tab
              - The Person profile page (under People/Persons)
              - The Dashboard settings
              - The Project settings page
            correct: 1
            explanation: >-
              The Person profile page is the central view for an individual user. It shows all distinct_ids, person properties, event history, session recordings, and feature flag evaluations in one
              place.
          - id: ph-viewing-p2
            type: true_false
            question: If two person profiles in PostHog represent the same real human, they can be manually merged in the UI.
            correct: 'true'
            explanation: PostHog supports manual merging of person profiles. This is useful for fixing identification mistakes where the same user accidentally created two separate profiles.
          - id: ph-viewing-p3
            type: scenario
            question: >-
              A customer says 'User X should be seeing the beta feature, but they report it is not showing up.' As a TAM, what is the fastest first debugging step in PostHog?
            options:
              - Re-deploy the feature flag configuration
              - Open User X's person profile to inspect their distinct_ids, person properties, and feature flag evaluations
              - Ask the customer to clear their browser cache
              - Check the ClickHouse query logs
            correct: 1
            explanation: >-
              The person profile is the debugging surface that brings together identity, properties, and flag evaluations in one place. It is the fastest way to see why a specific user is or is not
              seeing a feature. Start there before diving into infrastructure or asking the customer to troubleshoot.
    section: posthog-data-model
  - id: ph-person-properties
    name: Person Properties — $set and $set_once
    difficulty: 4
    estimatedMinutes: 18
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/product-analytics/person-properties
    prerequisites:
      - ph-persons
    encompassing: []
    knowledgePoints:
      - id: setting-person-properties
        instruction: >-
          Person properties live on the person profile rather than on one event. They are meant to describe the user over time. The two main write modes are `$set` and `$set_once`. `$set` overwrites
          the current value. `$set_once` writes only if the property does not already exist. That means changing facts like plan or subscription_status usually use `$set`, while first-touch facts like
          signup_source usually use `$set_once`.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/person-properties
            title: Person properties docs
            description: Official reference for the write patterns and SDK helpers mentioned in this lesson.
        problems:
          - id: ph-personprops-p1
            type: multiple_choice
            question: What is the difference between $set and $set_once in PostHog?
            options:
              - $set is for strings and $set_once is for numbers
              - $set always overwrites the value; $set_once only sets it if no value exists yet
              - $set works on events and $set_once works on persons
              - $set is synchronous and $set_once is asynchronous
            correct: 1
            explanation: >-
              $set always overwrites the current value, regardless of what was there before. $set_once only writes the value if the property does not already exist on the person profile.
          - id: ph-personprops-p3
            type: true_false
            question: If you call $set_once with a property that already has a value on the person profile, PostHog will overwrite it with the new value.
            correct: 'false'
            explanation: >-
              $set_once explicitly does NOT overwrite existing values. If the property already has a value, $set_once silently does nothing.
          - id: ph-personprops-p5
            type: scenario
            question: >-
              A customer calls $set_once({ signup_source: 'google_ads' }) for a user, then later calls $set_once({ signup_source: 'organic' }) for the same user after they visit again through a
              different channel. What value does signup_source have on the person profile?
            options:
              - The value is 'organic' because the latest call wins
              - The value is 'google_ads' because $set_once preserves the first value and ignores subsequent writes
              - Both values are stored as an array
              - The property is deleted because of the conflict
            correct: 1
            explanation: >-
              $set_once writes only if the property does not already exist. Since signup_source was already set to 'google_ads', the second call with 'organic' is silently ignored. This is exactly
              the intended behavior for first-touch attribution data.
      - id: choosing-person-property-updates
        instruction: >-
          The real skill is deciding which facts should stay historically fixed and which should reflect the latest truth. Attribution, original referrer, or first signup date are first-touch facts.
          Plan tier, lifecycle stage, or last_seen_at are current-state facts. If you use `$set` where you needed `$set_once`, you erase history. If you use `$set_once` where you needed `$set`, the
          profile gets stuck with stale data.
        workedExample: >-
          A user signs up through Google Ads. Your code sets plan with `$set` and signup_source with `$set_once`. Months later they upgrade and arrive through a different campaign. Plan should update
          to reflect the user's current state, but signup_source should stay tied to the original acquisition channel.
        problems:
          - id: ph-personprops-p2
            type: scenario
            question: >-
              A customer wants to track each user's original marketing channel (the first channel that brought them) and their current subscription plan. The marketing channel should never change once
              set, but the plan updates on upgrade/downgrade. Which approach is correct?
            options:
              - Use $set for both properties
              - Use $set_once for both properties
              - Use $set_once for marketing channel and $set for plan
              - Use event properties for both instead of person properties
            correct: 2
            explanation: >-
              $set_once for marketing channel preserves the original acquisition source. $set for plan ensures it always reflects the current subscription tier.
          - id: ph-personprops-p4
            type: multiple_choice
            question: To set person properties that should never change after their initial value (like signup_source), which operator should you use?
            options:
              - $set
              - $append
              - $set_once
              - $identify
            correct: 2
            explanation: >-
              Use `$set_once` when the first value should win. If you chose `$set`, you would keep overwriting the history you were trying to preserve.
          - id: ph-personprops-p6
            type: multiple_choice
            question: A customer wants to track both a user's current plan and their original signup date. Which combination of operators is correct?
            options:
              - $set for both plan and signup_date
              - $set_once for both plan and signup_date
              - $set for plan (changes on upgrade) and $set_once for signup_date (never changes)
              - $set_once for plan and $set for signup_date
            correct: 2
            explanation: >-
              Plan changes when users upgrade or downgrade, so it needs $set to reflect the current state. Signup date is a historical fact that should never be overwritten, so it needs $set_once.
              The pattern is: current-state facts use $set, first-touch facts use $set_once.
    section: posthog-data-model
  - id: ph-distinct-id
    name: distinct_id — Linking Events to Persons
    difficulty: 5
    estimatedMinutes: 18
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/data/persons
    prerequisites:
      - ph-persons
      - data-models:keys-and-identity
    encompassing:
      - concept: data-models:keys-and-identity
        weight: 0.8
    knowledgePoints:
      - id: what-is-distinct-id
        instruction: >-
          The `distinct_id` is the identity key on every PostHog event. It answers the question 'who or which device did this?' and acts like the foreign key from Event to Person. If two events have
          different distinct_ids and nothing links them, PostHog treats them as different identities. That is why distinct_id mistakes create duplicate users so quickly.
        instructionContent:
          - type: callout
            title: Identity question
            body: >-
              When you inspect an event and ask "who is this?", `distinct_id` is the first field doing that work.
          - type: link
            url: https://posthog.com/docs/data/persons
            title: PostHog identity and persons docs
            description: Reference for how distinct_ids, persons, and identification flows relate.
        problems:
          - id: ph-did-p3
            type: true_false
            question: The distinct_id on PostHog events serves as a foreign key linking each event to a person.
            correct: 'true'
            explanation: >-
              If you answered false, the likely confusion is treating `distinct_id` as just another property. It is the identity key on the event. Other properties add context, but `distinct_id`
              determines which user or device the event belongs to.
          - id: ph-did-p4
            type: scenario
            question: >-
              A customer sees two otherwise similar signup events, but one has `distinct_id = anon-123` and the other has `distinct_id = user_42`. No identify or alias link exists between them. How
              will PostHog interpret those events?
            options:
              - As the same person because the event names match
              - As two separate identities until something links the IDs
              - As invalid events that will be rejected
              - As one person if they came from the same IP address
            correct: 1
            explanation: >-
              The event name does not define identity. `distinct_id` does. If the IDs differ and no linkage exists, PostHog keeps them separate. The thing to inspect is the identifier flow, not the
              event label.
          - id: ph-did-p5
            type: multiple_choice
            question: If two PostHog events share the same distinct_id, what can you conclude?
            options:
              - They happened at the same time
              - They were captured by the same SDK
              - PostHog attributes both events to the same identity
              - They have identical properties
            correct: 2
            explanation: >-
              The distinct_id is the identity key. Events with the same distinct_id are attributed to the same user or device. They can have different timestamps, different SDKs, and completely
              different properties. The only thing distinct_id guarantees is identity linkage.
      - id: frontend-vs-backend-distinct-id
        instruction: >-
          Frontend and backend SDKs behave differently. Frontend SDKs generate and persist an anonymous distinct_id automatically on first use, which lets PostHog track pre-login behavior. Backend SDKs
          do not do that. On the server, you must pass a distinct_id yourself on every capture call. That difference is easy to miss, and it explains many 'why did my backend event create a new user?'
          support threads.
        workedExample: >-
          On the web, a visitor lands on `/pricing` and the JS SDK creates `anon-abc`. Later, after login, the app identifies them as `user_42`. On the backend, an API event for that same user must
          also use `user_42`, because the backend will not infer it automatically.
        problems:
          - id: ph-did-p1
            type: multiple_choice
            question: What happens when a frontend PostHog SDK initializes for the first time on a user's device?
            options:
              - It waits for the user to log in before generating an ID
              - It generates a random UUID as the distinct_id and persists it locally
              - It uses the user's IP address as the distinct_id
              - It sends events without any distinct_id
            correct: 1
            explanation: >-
              The frontend SDK creates the anonymous identity for you. If you chose 'waits for login', you are thinking in backend terms, where the application usually has to provide the known user ID.
          - id: ph-did-p2
            type: multiple_choice
            question: Backend PostHog SDKs do not auto-generate a distinct_id. What must you do on every capture call?
            options:
              - Provide a distinct_id
              - Call identify() first
              - Enable autocapture
              - Attach a $session_id
            correct: 0
            explanation: >-
              The server has no browser state to fall back on. If you omit `distinct_id`, PostHog cannot attach the event to the intended user, so the recovery step is to pass the same canonical ID
              your other systems use.
          - id: ph-did-p6
            type: scenario
            question: >-
              A customer's backend Python SDK sends a 'payment_processed' event but does not include a distinct_id in the capture call. What is the most likely outcome?
            options:
              - PostHog auto-generates an anonymous distinct_id like the frontend SDK does
              - The event is rejected or attributed incorrectly because backend SDKs require an explicit distinct_id
              - PostHog infers the user from the IP address
              - The event is stored without any identity and cannot be queried
            correct: 1
            explanation: >-
              Backend SDKs do not auto-generate distinct_ids. If you omit it, the SDK may raise an error or the event may be attributed to a meaningless default. The fix is to always pass the
              known user ID explicitly on every backend capture call.
      - id: multiple-distinct-ids
        instruction: >-
          A single person in PostHog can have **multiple distinct_ids**. This is not a bug — it is by design and essential for linking anonymous and identified behavior.


          **The most common scenario:** a user visits your site and the SDK generates a random distinct_id (say "abc-random-uuid"). They browse several pages. Then they log in, and you call posthog.identify("user_42"). Now this person has two distinct_ids: "abc-random-uuid" and "user_42". All events from both IDs belong to the same person.


          **Other scenarios that create multiple distinct_ids:** a user visits from a second device (generates another random ID), then logs in on that device too — both random IDs plus the known ID are now linked. Or you use posthog.alias to explicitly link two IDs.


          In data modeling terms, this is a **one-to-many relationship:** one Person has many distinct_ids. The person profile page in PostHog shows all distinct_ids associated with a person, which is useful for debugging identification issues.
        workedExample: >-
          Pre-login web browsing might create `anon-web-123`, the mobile app might create `anon-mobile-456`, and login might attach both to `user_42`. One person, several identifiers, one combined
          history.
        problems:
          - id: ph-multi-did-p1
            type: multiple_choice
            question: Why can a single person in PostHog have multiple distinct_ids?
            options:
              - This is a bug in PostHog's identification system
              - Because users generate anonymous IDs before logging in, and identification links the anonymous and known IDs together
              - Because PostHog randomly reassigns distinct_ids every session
              - Because each event must have a unique distinct_id
            correct: 1
            explanation: >-
              Multiple distinct_ids per person is by design. The anonymous ID from before login and the known ID from after login both belong to the same person. PostHog links them via identify() so
              the full user journey is captured.
          - id: ph-multi-did-p2
            type: scenario
            question: >-
              A user browses your site on their laptop (distinct_id: laptop-uuid) and their phone (distinct_id: phone-uuid). They log in on the laptop and you call identify('user_42'). Later they log
              in on the phone and you call identify('user_42') again. How many distinct_ids does this person have?
            options:
              - 1 — only user_42
              - 2 — laptop-uuid and phone-uuid
              - 3 — laptop-uuid, phone-uuid, and user_42
              - 4 — two per device
            correct: 2
            explanation: >-
              The person has three distinct_ids: laptop-uuid (from laptop's first visit), phone-uuid (from phone's first visit), and user_42 (the known ID from both identify calls). All three are
              linked to one person profile.
          - id: ph-multi-did-p3
            type: true_false
            question: In PostHog, the relationship between a Person and their distinct_ids is one-to-one.
            correct: 'false'
            explanation: 'It is one-to-many: one Person can have many distinct_ids. This happens through anonymous browsing on multiple devices, identify() calls, and alias() calls that link IDs together.'
    section: posthog-data-model
  - id: ph-sessions
    name: Sessions — Grouping Events by Visit
    difficulty: 3
    estimatedMinutes: 12
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/data/sessions
    prerequisites:
      - ph-events
      - ph-distinct-id
    encompassing: []
    knowledgePoints:
      - id: how-sessions-work
        instruction: >-
          A **session** in PostHog represents a single visit — a contiguous period of user activity. The JS web SDK and mobile SDKs automatically generate a `$session_id` and attach it to every event. Events with the same `$session_id` belong to the same session.


          **Two rules control session boundaries:** a new session starts after **30 minutes of inactivity** (no events for 30 minutes means the old session ends and the next event starts a new one), and sessions have a **maximum duration of 24 hours** (even with continuous activity, a new session starts after 24 hours).


          **Server-side SDKs** do NOT automatically generate or attach `$session_id` — you must set it manually if you want server events to belong to a session. This means server-side events are typically not associated with sessions unless you explicitly pass the session ID from your frontend.


          Session Replay and Web Analytics both depend on `$session_id` to group events into recordings and visits. Without it, these features cannot function.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/data/sessions
            title: Sessions docs
            description: Official reference for session boundaries and session-scoped properties.
        problems:
          - id: ph-sessions-p1
            type: multiple_choice
            question: What triggers the start of a new session in PostHog?
            options:
              - Every pageview starts a new session
              - 30 minutes of inactivity or 24 hours of continuous activity
              - The user closes and reopens their browser
              - The user navigates to a different domain
            correct: 1
            explanation: >-
              PostHog starts a new session after 30 minutes of inactivity (no events) or after 24 hours of continuous activity. Browser close/open does not necessarily end a session if it happens
              within the 30-minute window.
          - id: ph-sessions-p2
            type: multiple_choice
            question: What is the maximum duration of a single PostHog session, even with continuous activity?
            options:
              - 8 hours
              - 12 hours
              - 24 hours
              - 48 hours
            correct: 2
            explanation: Even with continuous user activity, PostHog caps a session at 24 hours. After that, the next event starts a new session. This prevents infinitely long sessions from skewing analytics.
          - id: ph-sessions-p3
            type: true_false
            question: Server-side PostHog SDKs automatically attach a $session_id to every captured event.
            correct: 'false'
            explanation: >-
              Server-side SDKs do NOT auto-generate or attach $session_id. You must manually pass it if you want server events associated with a session. Only the JS web SDK and mobile SDKs handle
              this automatically.
      - id: session-properties
        instruction: >-
          PostHog computes **session-level properties** automatically from the events within a session. These are distinct from event properties and person properties — they describe the visit as a whole.


          **Key session properties:** `$session_duration` (total time from first to last event), `$entry_current_url` (the URL of the first pageview), `$exit_pathname` (the path of the last pageview), `$pageview_count` (how many pageviews in the session), `$autocapture_count` (how many autocapture events), and `$is_bounce` (whether the session had only one pageview).


          These properties are **computed by PostHog** — you do not set them yourself.


          You can use session properties to filter insights (for example, "show me sessions with duration greater than 5 minutes") and to filter session recordings (for example, "show me bounce sessions on the pricing page"). Session properties are useful for understanding visit quality and user engagement at the session level.
        workedExample: >-
          If a visitor lands on `/pricing`, views three pages, and leaves after six minutes, PostHog can compute entry URL, pageview count, bounce status, and total session duration from that bundle
          of events without you setting those fields manually.
        problems:
          - id: ph-sessprops-p1
            type: multiple_choice
            question: Which of the following is a session property computed by PostHog?
            options:
              - $browser (the user's browser)
              - $session_duration (total time of the visit)
              - plan (the user's subscription tier)
              - $current_url (the page URL at event time)
            correct: 1
            explanation: >-
              $session_duration is a session property computed from the events within a session. $browser is an event property (set per event). 'plan' is a person property. $current_url is an event
              property that varies per event.
          - id: ph-sessprops-p2
            type: true_false
            question: Session properties like $session_duration and $is_bounce must be manually set by the developer.
            correct: 'false'
            explanation: >-
              Session properties are computed automatically by PostHog from the events within a session. You do not set them — PostHog calculates duration, bounce status, pageview counts, entry/exit
              URLs, and other session-level metrics.
          - id: ph-sessprops-p3
            type: scenario
            question: >-
              A customer wants to find session recordings of users who bounced on the pricing page. Which combination of session properties would help filter for this?
            options:
              - $session_duration > 30 minutes and $pageview_count > 10
              - $is_bounce = true and $entry_current_url contains '/pricing'
              - $browser = 'Chrome' and $os = 'Mac OS X'
              - $autocapture_count = 0 and $exit_pathname = '/home'
            correct: 1
            explanation: >-
              $is_bounce identifies single-pageview sessions, and $entry_current_url tells you where the session started. Together they filter for users who landed on /pricing and left without
              viewing another page. These are session properties computed automatically by PostHog.
    section: posthog-data-model
  - id: ph-actions
    name: Actions — Grouping Events for Analysis
    difficulty: 3
    estimatedMinutes: 14
    tags:
      - posthog
      - data-model
    sourceRef: https://posthog.com/docs/data/actions
    prerequisites:
      - ph-events
      - ph-event-properties
    encompassing: []
    knowledgePoints:
      - id: what-are-actions
        instruction: >-
          An action in PostHog is a saved grouping of one or more events that you want to treat as one analytical unit. Instead of rebuilding the same filters in every insight, you define the match
          once in the UI and reuse it. Actions do not create new raw event data. They sit on top of existing events as reusable saved filters, and they apply retroactively to historical matches.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/data/actions#what-is-an-action
            title: Actions docs
            description: Official reference for how actions are defined and where they fit in analysis.
        problems:
          - id: ph-actions-p1
            type: multiple_choice
            question: What is an action in PostHog?
            options:
              - A custom event captured in your product code
              - A saved grouping of events that can be used as a single unit in analysis
              - A webhook that triggers when a specific event occurs
              - A person property that tracks user behavior
            correct: 1
            explanation: >-
              An action is a saved grouping of events defined in PostHog's UI. It lets you combine multiple related events into one analytical unit. Actions are not custom events and are not defined
              in code.
          - id: ph-actions-p2
            type: true_false
            question: Actions in PostHog only apply to events captured after the action is created.
            correct: 'false'
            explanation: >-
              Actions apply retroactively. When you create a new action, it immediately matches all historical events that fit the criteria because actions are saved filters, not rewritten event data.
          - id: ph-actions-p5
            type: multiple_choice
            question: When you create a new action in PostHog, does it generate new event data or work with existing events?
            options:
              - It generates new synthetic events going forward
              - It works with existing events retroactively — actions are saved filters, not new data
              - It only matches events captured after the action is created
              - It creates a copy of matching events in a separate table
            correct: 1
            explanation: >-
              Actions are saved filters that sit on top of existing events. They do not create new data. When you define an action, it immediately matches all historical events that fit the
              criteria. This is why actions apply retroactively.
      - id: actions-vs-custom-events
        instruction: >-
          Actions are best when you already have events and want a reusable analysis layer on top of them, especially for grouping several autocapture patterns without redeploying code. But actions are
          not a substitute for good instrumentation. If a metric is mission-critical and tied to a real business event, a custom event is usually the stronger foundation because it survives UI changes
          better than selector-based matching.
        problems:
          - id: ph-actions-p3
            type: scenario
            question: >-
              A customer has three 'Sign Up' buttons on their site — one in the navbar, one in the hero section, and one in the footer. Each generates a slightly different autocapture event. They want
              to track total signup button clicks as a single metric. What do you recommend?
            options:
              - Rewrite the frontend to use the same CSS class on all three buttons
              - Create an action in PostHog that matches all three autocapture events
              - Use a custom event for each button and add them manually in every insight
              - Ignore two of the buttons and only track one
            correct: 1
            explanation: >-
              An action can group multiple autocapture events into one unit. The customer defines the action once in PostHog's UI, and then uses it anywhere they would use an event — in trends,
              funnels, paths, and other analyses.
          - id: ph-actions-p4
            type: scenario
            question: >-
              A team relies on a "subscription_started" KPI for revenue reporting. Today they approximate it with an action built from checkout-button selectors. What is the stronger long-term
              recommendation?
            options:
              - Keep the action only, because actions are always more reliable than custom events
              - Instrument a custom "subscription_started" event in code and use actions only as a convenience layer when needed
              - Replace the action with a person property
              - Stop tracking the KPI in PostHog
            correct: 1
            explanation: >-
              Actions are useful for grouping existing events, especially UI interactions. But a revenue-critical business event should usually be instrumented explicitly as a custom event so the metric
              survives UI changes and selector drift.
          - id: ph-actions-p6
            type: true_false
            question: For a mission-critical business metric like revenue, relying solely on an action built from autocapture selectors is a strong long-term strategy.
            correct: 'false'
            explanation: >-
              Autocapture-based actions depend on UI element properties (text, selectors, position) that change with redesigns. For mission-critical metrics, a custom event fired explicitly in
              code is the stronger foundation because it survives UI changes. Actions are great as a convenience layer, not as the sole source of truth for revenue.
    section: posthog-data-model

  # ============================================================
  # Section: identification
  # ============================================================
  - id: anonymous-vs-identified
    name: Anonymous vs Identified Events
    difficulty: 4
    estimatedMinutes: 16
    tags:
      - posthog
      - identification
    sourceRef: https://posthog.com/docs/data/persons
    prerequisites:
      - ph-person-properties
    encompassing: []
    knowledgePoints:
      - id: two-modes-of-events
        instruction: >-
          Anonymous events have a distinct_id but no person profile. Identified events are linked to a person profile. Both can be captured and analyzed, but they unlock different capabilities.
          Anonymous events are good for aggregate analytics. Identified events unlock person-scoped features such as feature flags, cohorts, experiments, and richer support workflows.
        instructionContent:
          - type: callout
            title: Shortcut
            body: >-
              Anonymous gets you aggregate analytics. Identified unlocks person-scoped features like feature flags, cohorts, and experiments.
        problems:
          - id: anon-id-p1
            type: multiple_choice
            question: What is the key difference between anonymous and identified events in PostHog?
            options:
              - Anonymous events have no distinct_id; identified events do
              - Anonymous events have a distinct_id but no person profile; identified events are linked to a person profile
              - Anonymous events are not stored; identified events are stored
              - Anonymous events are free; identified events cost extra per event
            correct: 1
            explanation: >-
              Both anonymous and identified events have a distinct_id. The difference is whether a person profile exists behind that identity.
          - id: anon-id-p2
            type: true_false
            question: Anonymous events in PostHog cannot be used for any analysis at all.
            correct: 'false'
            explanation: >-
              Anonymous events are fully queryable for aggregate analysis. They simply do not support person-level features that require a person profile.
          - id: anon-id-p5
            type: matching
            question: Match each PostHog capability to whether it works with anonymous events or requires identified events.
            options:
              - Counting total pageviews per day|Works with anonymous events
              - Feature flag targeting specific users|Requires identified events
              - Aggregate funnel conversion rates|Works with anonymous events
              - Cohort targeting by person properties|Requires identified events
            correct: 0,1,2,3
            explanation: >-
              Aggregate analytics (pageview counts, funnel conversion rates) work with anonymous events because they do not need to know who each user is. Feature flags and cohort targeting require
              person profiles, which means identified events.
      - id: choosing-when-to-identify
        instruction: >-
          Most teams should use a hybrid pattern: capture anonymous browsing before login, then call identify after authentication. That preserves cheap pre-login analytics while still unlocking
          person-level capabilities for known users. The right moment to identify is when you can reliably say which human is behind the session.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/getting-started/identify-users
            title: Identify users guide
            description: Practical checklist for moving from anonymous to identified tracking safely.
        problems:
          - id: anon-id-p3
            type: scenario
            question: A B2B SaaS company wants to use PostHog feature flags to control access to a beta feature for specific users. They currently capture all events anonymously. What must they do first?
            options:
              - Nothing — feature flags work with anonymous events
              - Identify users by calling posthog.identify() after login so person profiles are created
              - Switch to a different analytics tool
              - Create a custom event called 'feature_flag_check'
            correct: 1
            explanation: >-
              Feature flags require person profiles to decide which variant to serve. The company must identify users after login so those profiles exist.
          - id: anon-id-p4
            type: multiple_choice
            question: Which of the following PostHog features works with anonymous events (no person profile)?
            options:
              - Feature flags targeting specific users
              - Experiments with consistent user bucketing
              - Aggregate trend analysis (e.g., total pageviews per day)
              - Cohorts based on person properties
            correct: 2
            explanation: >-
              Aggregate trend analysis works with anonymous events because it does not require knowing who each user is. Feature flags, experiments, and cohorts do.
          - id: anon-id-p6
            type: true_false
            question: The best practice is to identify users as early as possible, even before they authenticate, to capture the most data.
            correct: 'false'
            explanation: >-
              Identifying before authentication risks linking anonymous browsing to the wrong person. The best practice is to call identify() after successful authentication, when you can reliably
              confirm which human is behind the session. Pre-login events are still captured with the anonymous distinct_id and get linked once identify runs.
    section: identification
  - id: identify-call
    name: The Identify Call
    difficulty: 5
    estimatedMinutes: 18
    tags:
      - posthog
      - identification
    sourceRef: https://posthog.com/docs/product-analytics/identify
    prerequisites:
      - anonymous-vs-identified
    encompassing:
      - concept: anonymous-vs-identified
        weight: 0.6
    knowledgePoints:
      - id: how-identify-works
        instruction: >-
          The identify() call is the bridge between anonymous and identified tracking. It links the current anonymous distinct_id to a known ID, creates or reuses the person profile, and applies
          person-property updates from the arguments you pass. After identify runs on the client, subsequent events from that device use the identified distinct_id instead of the anonymous one.
        instructionContent:
          - type: callout
            title: Three things happen at once
            body: >-
              identify links the anonymous browser id to a known id, creates or reuses the person, and updates person properties.
          - type: link
            url: https://posthog.com/docs/product-analytics/identify
            title: Identify docs with SDK examples
            description: Useful for comparing frontend and backend identify behavior side by side.
        workedExample: >-
          User visits your site. The JS SDK generates distinct_id 'abc-random'. They browse several pages. Then they sign up and your code runs posthog.identify('user_42', { email: 'jane@co.com',
          plan: 'free' }). PostHog links the anonymous browsing to user_42, stores both IDs on the same person, and updates the profile properties.
        problems:
          - id: identify-p3
            type: true_false
            question: After calling posthog.identify(), the SDK continues using the original anonymous distinct_id for subsequent events.
            correct: 'false'
            explanation: >-
              After identify(), the SDK switches its internal distinct_id to the one you provided. Subsequent events use the known ID, not the original anonymous one.
          - id: identify-p4
            type: multiple_choice
            question: The second argument to posthog.identify('user_id', { ... }) sets person properties using which semantics?
            options:
              - $set_once
              - $groupset
              - $set
              - It does not set person properties
            correct: 2
            explanation: >-
              Properties passed in the second argument of identify() use `$set` semantics, meaning they overwrite the current value on the person profile.
          - id: identify-p5
            type: multiple_choice
            question: What happens to the anonymous distinct_id after posthog.identify('user_42') is called on the frontend?
            options:
              - The anonymous ID is deleted from the system
              - The anonymous ID is linked to user_42 on the same person profile, and subsequent events use user_42
              - The anonymous ID continues to be used for all future events
              - A new random anonymous ID is generated
            correct: 1
            explanation: >-
              identify() links the anonymous ID and the known ID on the same person profile. After the call, the SDK switches to using the known ID for subsequent events. The anonymous ID is
              preserved as an additional distinct_id on the person, not deleted.
      - id: identify-best-practices
        instruction: >-
          The main risks with identify are timing and identifier quality. Call identify after successful authentication and on each authenticated app load so the client re-establishes the correct
          person context. Use a stable ID that uniquely represents one human being, usually your database user ID. Shared emails or generic account IDs create "frankenstein" profiles by merging
          unrelated people together.
        problems:
          - id: identify-p1
            type: multiple_choice
            question: When should you call posthog.identify() for a user?
            options:
              - Only once ever, on first signup
              - Every time your app loads for an authenticated user and directly after login or signup
              - Only on the very first visit ever
              - Never — PostHog identifies users automatically
            correct: 1
            explanation: >-
              Call identify() every time your app initializes for an authenticated user and directly after login or signup. The SDK deduplicates redundant calls, so this is safe.
          - id: identify-p2
            type: scenario
            question: >-
              A customer calls posthog.identify() with the user's email address as the distinct_id. Two users at the same company share a team email (team@acme.com) and both call identify with it.
              What happens?
            options:
              - PostHog creates two separate person profiles with the same email
              - PostHog merges both users into one person profile, combining all their events — creating a single 'frankenstein' profile
              - PostHog rejects the second identify call
              - Nothing unusual — email is a safe identifier
            correct: 1
            explanation: >-
              If two different anonymous users both identify as the same shared email, PostHog merges them into one person. Use stable unique user IDs instead of shared identifiers.
          - id: identify-p6
            type: true_false
            question: Calling posthog.identify() on every authenticated page load is wasteful and should be avoided.
            correct: 'false'
            explanation: >-
              Calling identify() on every authenticated app load is the recommended practice. The SDK deduplicates redundant calls, so there is no meaningful overhead. This ensures the correct
              person context is always re-established, even if the user returns after their session state was cleared.
    section: identification
  - id: person-merging
    name: Person Merging — Linking Identities
    difficulty: 6
    estimatedMinutes: 15
    tags:
      - posthog
      - identification
    sourceRef: https://posthog.com/docs/data/persons
    prerequisites:
      - identify-call
      - ph-distinct-id
    encompassing:
      - concept: identify-call
        weight: 0.5
      - concept: ph-distinct-id
        weight: 0.45
    knowledgePoints:
      - id: how-merging-works
        instruction: >-
          When you call identify("known-id"), PostHog checks if the current anonymous distinct_id and the known-id already have separate person profiles. If they do, PostHog **merges them into one profile** — combining all events, person properties, and distinct_ids from both profiles.


          **Merge rules:** the most recent value wins for each person property. All distinct_ids from both profiles are linked to the surviving profile. Historical events are re-attributed.


          You can also use **alias("id-a", "id-b")** to explicitly link two IDs without changing the current session's distinct_id. This is useful for connecting IDs across systems, like linking a Stripe customer ID to a PostHog user ID.


          **Reversibility:** merges can be partially reversed using the "Split IDs" feature on person profiles, which splits distinct_ids so future events go to separate profiles. However, historical events are not re-attributed — so it is still critical to use correct, unique identifiers from the start.
        instructionContent:
          - type: callout
            title: Merge effect
            body: >-
              Merging is not just "link these IDs." It can change which profile survives, which properties win, and how history appears on the final person record.
          - type: link
            url: https://posthog.com/docs/data/persons
            title: Persons merge behavior docs
            description: Official reference for merge rules, alias flows, and split-ID recovery behavior.
        problems:
          - id: merge-p1
            type: multiple_choice
            question: When PostHog merges two person profiles, what happens to the events from both profiles?
            options:
              - Events from the older profile are deleted
              - All events from both profiles are combined into the surviving merged profile
              - Events remain in separate profiles but are linked
              - Only the most recent 1000 events are kept
            correct: 1
            explanation: Merging combines all events from both profiles into one. No events are deleted or lost. The merged profile has the complete event history from both original profiles.
          - id: merge-p2
            type: scenario
            question: >-
              User browses anonymously (distinct_id: anon-123, person profile A with 10 events). Then logs in and you call identify('user_42'). User_42 already has a person profile B from a previous
              session with 5 events. What is the final state?
            options:
              - Two separate profiles remain
              - 'One merged profile with 15 events and distinct_ids: anon-123 and user_42'
              - Profile A is deleted and only profile B remains with 5 events
              - A new empty profile is created
            correct: 1
            explanation: PostHog merges profiles A and B into one. The merged profile has all 15 events and both distinct_ids (anon-123 and user_42). No events are lost during merging.
          - id: merge-p3
            type: true_false
            question: Once two person profiles are merged in PostHog, they can be unmerged if the merge was a mistake.
            correct: 'true'
            explanation: >-
              PostHog provides a 'Split IDs' button on person profiles that lets you split previously merged distinct_ids back into separate users. While historical events are not re-attributed, future
              events will go to separate profiles. That said, merges are still risky — use unique, stable identifiers in identify() calls to avoid bad merges in the first place.
      - id: when-merging-goes-wrong
        instruction: >-
          Person merging is powerful but dangerous when misused. Three common mistakes cause bad merges:


          **(1) Identifying with a shared or generic ID:** calling identify("support@company.com") for multiple users merges all of them into one profile. Always use an ID that uniquely identifies one human being — typically a database user ID.


          **(2) Identifying before authentication:** if you call identify() based on a form input before the user actually logs in, you might associate anonymous browsing with the wrong person. Only call identify() after successful authentication.


          **(3) Mismatched IDs across client and server:** if your frontend uses "user_42" but your backend uses "u-42" for the same person, PostHog sees them as different users and creates separate profiles. Use the same canonical ID everywhere.


          **The golden rule:** the distinct_id you pass to identify() must uniquely and permanently identify exactly one human being. When in doubt, use database primary keys.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/getting-started/identify-users
            title: Identify users guide
            description: Best official checklist for avoiding bad merges in production.
        problems:
          - id: merge-wrong-p1
            type: multiple_choice
            question: Which of the following is the safest identifier to use in posthog.identify()?
            options:
              - The user's email address
              - The user's database primary key (e.g., user_42)
              - The user's company name
              - The user's IP address
            correct: 1
            explanation: >-
              Database primary keys are unique per user, stable over time, and not shared. Emails can be shared (team accounts), company names are definitely shared, and IP addresses change and are
              shared across users on the same network.
          - id: merge-wrong-p2
            type: scenario
            question: >-
              A customer's support team all log into PostHog-tracked admin panel using a shared 'admin@company.com' account. They call posthog.identify('admin@company.com') on login. After a month,
              they notice all support agents' actions appear under a single person profile. Why?
            options:
              - PostHog has a bug with email-based identification
              - All agents identified with the same ID, so PostHog merged all their anonymous profiles into one person
              - The admin panel is not compatible with PostHog
              - PostHog only supports one user per email domain
            correct: 1
            explanation: >-
              Every agent's anonymous distinct_id was linked to 'admin@company.com' via identify(). PostHog dutifully merged them all into one person profile. The fix: each agent should identify with
              their own unique ID, not a shared account.
          - id: merge-wrong-p3
            type: multiple_choice
            question: When should you call posthog.identify() in relation to user authentication?
            options:
              - Before the user enters their credentials, to capture login attempts
              - After successful authentication, to ensure you have the correct user ID
              - On every page load, regardless of authentication status
              - Only on the user's very first visit
            correct: 1
            explanation: >-
              Call identify() after successful authentication. Calling it before risks associating anonymous browsing with the wrong user (e.g., if the user types an incorrect email first).
              Authentication confirms the user's identity; identify() should follow, not precede, that confirmation.
    section: identification
  - id: person-modes
    name: Person Modes — identified_only vs Always
    difficulty: 5
    estimatedMinutes: 15
    tags:
      - posthog
      - identification
    sourceRef: https://posthog.com/docs/data/persons
    prerequisites:
      - anonymous-vs-identified
    encompassing: []
    knowledgePoints:
      - id: choosing-a-mode
        instruction: >-
          The `person_profiles` mode controls when person profiles are created. `identified_only` creates them only after explicit identification and is the recommended default for most setups.
          `always` creates a person profile for every distinct_id, including anonymous visitors. The choice is a tradeoff between lower cost and broader anonymous-user capabilities.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/data/persons
            title: Person profiles modes docs
            description: Official reference for `identified_only`, `always`, and the related tradeoffs.
        problems:
          - id: modes-p1
            type: multiple_choice
            question: What is the recommended person_profiles setting for most PostHog implementations?
            options:
              - '''always'' — to capture the most data possible'
              - '''identified_only'' — to reduce costs and only create profiles when needed'
              - '''never'' — to avoid creating any person profiles'
              - '''auto'' — to let PostHog decide automatically'
            correct: 1
            explanation: >-
              `identified_only` is recommended for most use cases because it creates person profiles only when you explicitly identify users.
          - id: modes-p3
            type: scenario
            question: >-
              A high-traffic news website has millions of anonymous visitors per day but only 50,000 registered users. They want to use feature flags for registered users only. Which person_profiles
              mode should they use?
            options:
              - '''always'' — to create profiles for all visitors'
              - '''identified_only'' — to create profiles only for the 50,000 registered users who identify'
              - Disable PostHog on pages without login
              - Use both modes simultaneously
            correct: 1
            explanation: >-
              `identified_only` is ideal here. The anonymous visitors get cheap event tracking without person processing, while identified users still get full person-level features.
          - id: modes-p5
            type: true_false
            question: In 'always' mode, PostHog creates a person profile for every distinct_id, including completely anonymous visitors who never log in.
            correct: 'true'
            explanation: >-
              'always' mode creates a person profile for every distinct_id, regardless of whether the user is identified. This enables person-level features for anonymous users but increases cost.
              If you answered false, you may have been thinking of identified_only mode, which is the opposite behavior.
      - id: mode-gotchas
        instruction: >-
          The biggest gotcha is assuming inline `$set` on a capture call will create a profile in `identified_only` mode. It will not. You still need an identification trigger such as identify, alias,
          group, or the dedicated person-property helper. Use `always` only when you truly need person-level features for anonymous users before login.
        workedExample: >-
          A team sends anonymous `$pageview` events with inline `$set` for `email` and expects feature flags to work before login in `identified_only` mode. They still have no person profile because
          they never triggered identification. The write looked person-shaped, but the identity step never happened.
        problems:
          - id: modes-p2
            type: true_false
            question: In 'identified_only' mode, passing $set properties inside a posthog.capture() call will create a person profile even without calling identify() first.
            correct: 'false'
            explanation: >-
              In `identified_only` mode, inline `$set` on a capture call does NOT create a person profile by itself. You still need an identification trigger.
          - id: modes-p4
            type: scenario
            question: >-
              A consumer app needs to evaluate feature flags for anonymous visitors before signup. Which person_profiles mode is the better fit?
            options:
              - identified_only
              - always
              - neither, because feature flags never work for anonymous users
              - a mix of both in the same project
            correct: 1
            explanation: >-
              If you need person-level capabilities for anonymous visitors before signup, `always` is the better fit because it creates person profiles for every distinct_id.
          - id: modes-p6
            type: scenario
            question: >-
              A team sends anonymous $pageview events with $set: { email: 'test@example.com' } but they are in identified_only mode. They expect the email to appear on a person profile. Why does it not?
            options:
              - $set does not work with email properties
              - In identified_only mode, inline $set on a capture call does not create a person profile without an identification trigger
              - The email format is invalid
              - Person properties only work on mobile SDKs
            correct: 1
            explanation: >-
              This is the biggest gotcha of identified_only mode. Inline $set on a capture call does not trigger person profile creation. The team needs an identification trigger (identify, alias,
              group, or the dedicated person-property helper) to create the profile first.
    section: identification
  - id: identification-pitfalls
    name: Common Identification Pitfalls
    difficulty: 6
    estimatedMinutes: 18
    tags:
      - posthog
      - identification
    sourceRef: https://posthog.com/docs/getting-started/identify-users
    prerequisites:
      - person-merging
      - person-modes
    encompassing: []
    knowledgePoints:
      - id: duplicate-profiles-across-devices
        instruction: >-
          **Duplicate person profiles** — two or more profiles representing the same real human — are the most common identification problem.


          The first version of this problem is **missed identification across devices or platforms**. A user logs in on desktop and gets identified there, but uses the mobile app or another browser without an identify call. That second surface keeps generating anonymous activity under a different distinct_id, so PostHog sees two separate people.


          **The operational rule:** if the same real user can authenticate on multiple surfaces, identify them on every one of those surfaces after authentication.
        instructionContent:
          - type: callout
            title: Same human, different surface
            body: >-
              If one device identifies and another never does, the data model has no reason to treat them as the same person.
        problems:
          - id: pitfall-dup-p1
            type: scenario
            question: >-
              A SaaS customer has both a web app and a mobile app. Users log in on the web app (posthog.identify('user_42') is called), but the mobile app only captures events with the auto-generated
              anonymous distinct_id. What problem will they see in PostHog?
            options:
              - Missing events from the mobile app
              - Duplicate person profiles — one identified from web, one anonymous from mobile, for the same user
              - Events from both platforms merged correctly
              - Error messages in the PostHog UI
            correct: 1
            explanation: >-
              Without identify() on mobile, the mobile events create a separate anonymous profile. The same user now has two profiles: one identified from web and one anonymous from mobile. Fix: call
              identify() on the mobile app after authentication.
          - id: pitfall-dup-p4
            type: true_false
            question: If a user is identified on the web app, PostHog will automatically connect their mobile anonymous events even if the mobile app never calls identify().
            correct: 'false'
            explanation: >-
              PostHog cannot assume the mobile anonymous ID belongs to the same person unless the mobile app also identifies that user. If you answered true, the likely miss was assuming identity
              propagates automatically across platforms.
          - id: pitfall-dup-p5
            type: multiple_choice
            question: What is the operational rule for preventing duplicate profiles across devices?
            options:
              - Only track users on one device at a time
              - Call identify() on every surface (web, mobile, backend) after the user authenticates
              - Use different distinct_ids for each device so PostHog can match them by IP
              - Disable anonymous tracking on all devices except the primary one
            correct: 1
            explanation: >-
              If the same real user can authenticate on multiple surfaces, identify them on every one of those surfaces after authentication. This links all device-specific anonymous IDs to the
              same known identity. PostHog does not infer cross-device identity from IP addresses.
      - id: canonical-ids-across-systems
        instruction: >-
          The second version of duplicate profiles comes from inconsistent IDs across systems. If the web app uses email, the mobile app uses database ID, and the backend uses another string format,
          PostHog receives several unrelated identifiers and cannot safely infer they belong to one person. The fix is to choose one canonical identifier, usually the database primary key, and reuse
          that exact string everywhere. "Close enough" IDs are still different IDs.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/getting-started/identify-users
            title: Identify users guide
            description: Official implementation guide for consistent IDs across SDKs and platforms.
        workedExample: >-
          If the frontend identifies with `user_42`, the backend should also capture with `user_42`, not `usr-42` and not `alice@example.com`. The real job is consistency, not human readability.
        problems:
          - id: pitfall-dup-p2
            type: multiple_choice
            question: What is the best canonical identifier to use across all PostHog SDKs to prevent duplicate profiles?
            options:
              - The user's email address
              - The user's database primary key (e.g., user_id)
              - A random UUID generated per session
              - The user's full name
            correct: 1
            explanation: >-
              Database primary keys are unique, stable, and consistent across all systems. Emails can change or be shared. Session UUIDs change per session. Names are not unique. Use the database
              primary key in every identify() and capture() call.
          - id: pitfall-dup-p3
            type: scenario
            question: 'A customer''s web app calls posthog.identify(''user_42'') and their Node.js backend calls posthog.capture({ distinctId: ''usr-42'', event: ''api_call'' }) for the same user. What happens?'
            options:
              - PostHog automatically recognizes 'user_42' and 'usr-42' are the same person
              - Two separate person profiles are created because the distinct_ids do not match
              - The backend event is rejected
              - PostHog merges them based on IP address
            correct: 1
            explanation: >-
              'user_42' and 'usr-42' are different strings, so PostHog treats them as different users. Two profiles are created. Fix: use the exact same ID string ('user_42') in both the frontend
              identify() call and the backend capture() call.
          - id: pitfall-dup-p6
            type: true_false
            question: Using 'user_42' on the frontend and 'USER_42' on the backend is safe because PostHog treats distinct_ids as case-insensitive.
            correct: 'false'
            explanation: >-
              PostHog treats distinct_ids as exact string matches. 'user_42' and 'USER_42' are different identifiers and will create separate person profiles. Use the exact same canonical string
              everywhere — case, formatting, and all.
      - id: cross-device-gaps
        instruction: >-
          Server-side SDKs do not have a browser session or auto-generated distinct_id. You must always provide a distinct_id explicitly.


          **The common gap:** a user browses anonymously on the web (distinct_id = "abc-random"), then your server captures a backend event with their database ID ("user_42") before the frontend calls identify(). Those events will not link because PostHog has not been told that "abc-random" and "user_42" are the same person.


          **The solution:** always call identify() on the frontend first. Once the frontend SDK knows the user is "user_42," subsequent events from both frontend and backend use the same identity.


          **For fully server-side applications** (no frontend): use the database user ID as distinct_id from the start — there is no anonymous phase.


          **For mobile apps with server-side components:** ensure the mobile app passes its known user ID to the server, and the server uses that same ID in capture() calls.


          **The key principle:** identification flows from the client to the server, not the other way around. The client knows who the user is after login, and the server should use the same identifier.
        workedExample: >-
          If the backend sends `user_created` for `user_42` before the browser identifies its anonymous UUID as `user_42`, you briefly have two identity tracks. The frontend identify call is what
          closes that gap and merges the histories.
        problems:
          - id: pitfall-xdev-p1
            type: scenario
            question: >-
              A user signs up on your website. Your backend immediately sends a 'user_created' event via the Node.js SDK with distinct_id = 'user_42'. One second later, the frontend calls
              posthog.identify('user_42'). Will the pre-signup anonymous browsing events link to 'user_42'?
            options:
              - Yes — the backend event establishes the link
              - Yes — but only after identify() is called on the frontend
              - No — the backend event creates a separate profile for 'user_42' and the frontend anonymous events stay orphaned until identify() runs and merges them
              - No — backend events cannot be linked to frontend events
            correct: 2
            explanation: >-
              The backend event creates a person profile for 'user_42'. When the frontend calls identify('user_42') one second later, PostHog merges the anonymous frontend profile with 'user_42'. The
              events do link — but only because identify() runs on the frontend. If identify() never ran, the anonymous browsing would remain separate.
          - id: pitfall-xdev-p2
            type: true_false
            question: For fully server-side applications with no frontend (e.g., a CLI tool), you should still use random anonymous distinct_ids and call identify() later.
            correct: 'false'
            explanation: >-
              For fully server-side applications, there is no anonymous phase. Use the database user ID as distinct_id from the start in every capture() call. There is no need for random IDs or
              identify() because you always know who the user is on the server.
          - id: pitfall-xdev-p3
            type: multiple_choice
            question: What is the correct order for linking frontend and backend events for the same user?
            options:
              - Backend captures events first, then frontend calls identify()
              - Frontend calls identify() first, then backend uses the same ID in capture calls
              - Both can happen in any order — PostHog handles it automatically
              - Frontend and backend events cannot be linked
            correct: 1
            explanation: >-
              The safest pattern: frontend calls identify() first (linking anonymous browsing to the known ID), then the backend uses the same known ID in all capture() calls. This ensures all events
              — anonymous frontend, identified frontend, and backend — are linked to one person.
    section: identification

  # ============================================================
  # Section: group-analytics
  # ============================================================
  - id: group-types
    name: Group Types — Modeling Organizations
    difficulty: 4
    estimatedMinutes: 15
    tags:
      - posthog
      - groups
    sourceRef: https://posthog.com/docs/product-analytics/group-analytics
    prerequisites:
      - ph-persons
      - ph-event-properties
      - data-models:relationships
    encompassing: []
    knowledgePoints:
      - id: what-are-groups
        instruction: >-
          Groups let you associate events with entities beyond individual users, usually companies, teams, projects, or workspaces. In B2B analytics that matters because the important question is
          often "which account used the feature?" rather than "which user clicked?" A group type defines the kind of higher-level entity you want to analyze.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/group-analytics
            title: Group analytics docs
            description: Official reference for how groups work and where they show up in analysis.
        problems:
          - id: groups-p1
            type: multiple_choice
            question: What is the primary purpose of group analytics in PostHog?
            options:
              - To organize PostHog project settings
              - To associate events with entities like companies or teams, enabling B2B analytics
              - To group similar events into actions
              - To create user segments for email marketing
            correct: 1
            explanation: >-
              Group analytics lets you associate events with higher-level entities such as companies or projects so you can analyze behavior at the organization level.
          - id: groups-p2
            type: multiple_choice
            question: How many group types does PostHog allow per project?
            options:
              - '3'
              - '5'
              - '10'
              - Unlimited
            correct: 1
            explanation: >-
              PostHog allows up to 5 group types per project. If you picked a higher number, the likely miss was treating groups like free-form tags instead of a constrained part of the data model.
          - id: groups-p5
            type: scenario
            question: >-
              A B2B customer asks: 'Can I use person properties to store company_name on each user and then aggregate by company?' What is the limitation of this approach compared to group analytics?
            options:
              - There is no limitation — person properties work just as well
              - Person properties require you to duplicate company data on every user and cannot natively count unique companies or filter insights by company-level attributes
              - Person properties are more expensive than group analytics
              - Person properties do not support string values
            correct: 1
            explanation: >-
              Storing company_name as a person property duplicates the data on every user and does not give you a real company entity to aggregate over. Group analytics creates a proper company
              entity with its own properties, enabling questions like 'how many companies used feature X?' without duplication.
      - id: modeling-with-groups
        instruction: >-
          A good group type represents a real entity you want to aggregate over, not just another label. Company, team, or workspace are strong candidates when multiple users belong to the same
          higher-level account. Groups are also a paid capability, so TAMs need to connect the modeling choice to the customer's B2B reporting needs.
        problems:
          - id: groups-p3
            type: true_false
            question: Group analytics is included in all PostHog plans at no additional cost.
            correct: 'false'
            explanation: >-
              If you answered true because the use case feels core to B2B analytics, that is a packaging mistake rather than a modeling one. Group analytics is a paid capability, so plan fit matters.
          - id: groups-p4
            type: scenario
            question: >-
              A B2B SaaS customer wants to answer "how many companies used feature X this month?" even when multiple users from the same account used it. What is the right modeling tool?
            options:
              - Person properties only
              - Group analytics with a company group type
              - Actions only
              - Session properties
            correct: 1
            explanation: >-
              This is the core use case for group analytics. You need a company-level entity so multiple users can roll up to the same account.
          - id: groups-p6
            type: multiple_choice
            question: Which of the following is NOT a good candidate for a PostHog group type?
            options:
              - Company (multiple users belong to one company)
              - Workspace (multiple users share a workspace)
              - Browser (a property of each event, not a multi-user entity)
              - Team (multiple users belong to one team)
            correct: 2
            explanation: >-
              Browser is an event-level property, not a higher-level entity that multiple users belong to. Group types should represent real organizational entities where you want to aggregate
              user behavior. Company, Workspace, and Team are all valid because multiple users share them.
    section: group-analytics
  - id: group-identify
    name: Group Identify & Group Properties
    difficulty: 5
    estimatedMinutes: 15
    tags:
      - posthog
      - groups
    sourceRef: https://posthog.com/docs/product-analytics/group-analytics
    prerequisites:
      - group-types
      - identify-call
    encompassing:
      - concept: group-types
        weight: 0.7
      - concept: identify-call
        weight: 0.45
    knowledgePoints:
      - id: creating-groups-and-properties
        instruction: >-
          Group identify creates or updates the group profile and, in the frontend SDK, also sets the current session's group context. In the JS web SDK, `posthog.group('company', 'acme-inc', {...})`
          associates subsequent events with that company and updates its group properties. Group properties persist on the group profile the same way person properties persist on a person.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/group-analytics
            title: Group analytics docs
            description: Official reference for group creation, group properties, and frontend versus backend group patterns.
        problems:
          - id: grpid-p1
            type: multiple_choice
            question: 'In the JS Web SDK, what does posthog.group(''company'', ''acme-inc'', { plan: ''enterprise'' }) do?'
            options:
              - Creates a new PostHog project called 'acme-inc'
              - Associates subsequent events with company 'acme-inc' and sets group properties
              - Creates a person profile with company name 'acme-inc'
              - Sends an email notification to the acme-inc team
            correct: 1
            explanation: >-
              If you chose a person-profile answer, you collapsed company identity into user identity. `group()` sets group context for the session and updates properties on that group record.
          - id: grpid-p3
            type: true_false
            question: In the JS Web SDK, after calling posthog.group('company', 'acme-inc'), all subsequent events in the session automatically include the company group association.
            correct: 'true'
            explanation: >-
              This is true in the JS web SDK because it remembers group context for the current session. If you answered false, you were probably thinking of backend SDKs, which do not keep that
              state.
          - id: grpid-p5
            type: scenario
            question: >-
              A customer calls posthog.group('company', 'acme-inc') on their frontend but never passes any group properties. What will they see in the People/Groups tab for 'acme-inc'?
            options:
              - A fully populated company profile
              - The group exists in the data model but may appear empty or invisible in the UI without properties
              - An error because groups require at least one property
              - Nothing — the group call is ignored without properties
            correct: 1
            explanation: >-
              Events will link to the group, but the group profile in the UI needs at least one property to be visible and useful. The group exists in the data model, but the People/Groups view
              may not show it or it appears empty. Always set group properties via the third argument or group_identify.
      - id: backend-group-identify-pattern
        instruction: >-
          Backend SDKs do not have persistent session context, so the pattern is split in two. First call group_identify to create or update the group profile. Then attach the `groups` object on each
          capture call that should link the event to that group. This is also where you decide whether a fact belongs on the company profile or on the individual user profile.
        workedExample: >-
          A customer wants every API call tied to a company account. Their backend first sets group properties with group_identify for company `acme-inc`, then includes `groups: { company:
          'acme-inc' }` on each API event. The company plan belongs on the group, not duplicated as a separate person property on every user.
        problems:
          - id: grpid-p2
            type: scenario
            question: A customer uses the Python backend SDK and wants to set company properties and also link events to companies. What is the correct approach?
            options:
              - Call posthog.group() once and all backend events will automatically link
              - 'Call group_identify to set properties, then attach groups: { company: ''acme-inc'' } on every capture() call'
              - Set company name as a person property on each user
              - Use the HTTP API instead of the Python SDK
            correct: 1
            explanation: >-
              Backend SDKs do not keep persistent session state. You must update the group profile separately and attach the group on each capture call.
          - id: grpid-p4
            type: multiple_choice
            question: A customer's subscription plan is shared by every user in the same company account. Where is the best place to store that fact?
            options:
              - As a group property on the company
              - As a separate person property on every user only
              - As an action
              - As a session property
            correct: 0
            explanation: >-
              If the fact is shared by the whole company, put it on the group. Storing it separately on every person duplicates account state and creates drift when one copy changes.
          - id: grpid-p6
            type: true_false
            question: In a backend SDK, calling group_identify once is sufficient to automatically link all future events from that backend to the group.
            correct: 'false'
            explanation: >-
              group_identify only creates or updates the group profile. It does not set session context on the backend because backend SDKs have no persistent session. You must still attach the
              groups object on every capture() call to link events to the group.
    section: group-analytics
  - id: linking-events-to-groups
    name: Linking Events to Groups
    difficulty: 5
    estimatedMinutes: 15
    tags:
      - posthog
      - groups
    sourceRef: https://posthog.com/docs/product-analytics/group-analytics
    prerequisites:
      - group-identify
    encompassing:
      - concept: group-identify
        weight: 0.55
    knowledgePoints:
      - id: frontend-vs-backend-patterns
        instruction: >-
          Frontend and backend SDKs link events to groups differently. In the frontend, calling `group()` once sets group context for the session. In the backend, there is no session context, so you
          must pass the `groups` object on each capture call. The mental model is simple: frontend can remember state for you; backend cannot.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/group-analytics
            title: Group analytics docs
            description: Official reference for frontend and backend group-linking patterns.
        problems:
          - id: link-grp-p1
            type: multiple_choice
            question: In a backend SDK, how do you associate an event with a group?
            options:
              - Call posthog.group() once at application startup
              - Pass a groups object on every capture() call
              - Set a GROUP_ID environment variable
              - Groups are automatically detected from the user's IP address
            correct: 1
            explanation: >-
              Backend SDKs have no persistent session. You must explicitly pass `groups: { company: 'acme-inc' }` on every capture call that should link to the group.
          - id: link-grp-p2
            type: true_false
            question: A single PostHog event can be linked to multiple groups of the same type (e.g., two different companies).
            correct: 'false'
            explanation: >-
              An event can link to only one group instance per type. You can link to multiple types, but not multiple companies on the same event.
          - id: link-grp-p5
            type: scenario
            question: >-
              A customer uses the JS web SDK and calls posthog.group('company', 'acme-inc') during session start. Later in the same session, they capture a 'feature_used' event. Is this event linked
              to acme-inc?
            options:
              - No — each event needs an explicit group attachment
              - Yes — the frontend SDK remembers group context for the session after group() is called
              - Only if they also call identify() in the same session
              - Only if the event name starts with '$'
            correct: 1
            explanation: >-
              The JS web SDK persists group context for the session. After calling group(), all subsequent events in that session automatically include the group association. This is the key
              difference from backend SDKs, which have no persistent session state.
      - id: group-linking-constraints
        instruction: >-
          One event can carry multiple group types at once, such as company and project, but only one instance of each type. That limitation matters in consulting or marketplace use cases where a
          person may relate to multiple companies. The event still needs one clear company owner unless you redesign the model.
        workedExample: >-
          A consultant might belong to both `acme` and `globex`, but a single invoice export event still needs one company owner if you want clean company-level reporting. If both companies matter,
          the model needs a different event design, not two company IDs on one event.
        problems:
          - id: link-grp-p3
            type: scenario
            question: A customer's user belongs to two companies (they are a consultant). The customer wants every event from this user to be attributed to both companies. Is this possible?
            options:
              - Yes — pass both company IDs in the groups object
              - No — an event can only link to one group per type. They need to choose which company each event belongs to
              - Yes — call posthog.group('company', ...) twice
              - Yes — use the alias() function to link both companies
            correct: 1
            explanation: >-
              PostHog only supports one group instance per group type per event. The model needs to choose one company or use a different grouping design.
          - id: link-grp-p4
            type: multiple_choice
            question: Which combination is allowed on a single PostHog event?
            options:
              - Two companies and one project
              - One company and one project
              - Two projects and two companies
              - Unlimited groups of the same type
            correct: 1
            explanation: >-
              A single event can link to multiple group types at once, such as one company and one project, but only one instance of each type.
          - id: link-grp-p6
            type: true_false
            question: A single PostHog event can be linked to one company group and one project group at the same time.
            correct: 'true'
            explanation: >-
              An event can carry multiple group types simultaneously — for example, one company and one project. The constraint is one instance per type, not one group total. This is useful when
              events need to be analyzed at both the company and project level.
    section: group-analytics
  - id: group-gotchas
    name: Group Analytics Gotchas
    difficulty: 5
    estimatedMinutes: 15
    tags:
      - posthog
      - groups
    sourceRef: https://posthog.com/docs/product-analytics/group-analytics
    prerequisites:
      - linking-events-to-groups
    encompassing: []
    knowledgePoints:
      - id: important-limitations
        instruction: >-
          Two group gotchas show up early. First, groups still depend on identified event flow. Anonymous events in `identified_only` mode do not link to groups. Second, a group needs at least one
          property to show up in the UI. If you only attach group keys to events but never set properties, the group exists in the data model but stays effectively invisible in the People/Groups view.
        instructionContent:
          - type: callout
            title: Data-model vs UI gap
            body: >-
              A group can participate in event linkage before it feels "real" in the UI. Visibility usually arrives only after you also set group properties.
        problems:
          - id: gotcha-p1
            type: true_false
            question: Anonymous events (in 'identified_only' mode) can still be linked to groups.
            correct: 'false'
            explanation: >-
              Anonymous events in `identified_only` mode skip person processing, so group linkage never gets established. If you answered true, the likely miss was assuming groups bypass the normal
              identity pipeline.
          - id: gotcha-p2
            type: multiple_choice
            question: A customer created a group type 'company' and linked events to it, but they cannot see any company groups in the People/Groups tab. What is the most likely cause?
            options:
              - Group analytics is not enabled on their plan
              - They linked events to groups but never set any group properties via group_identify or group()
              - The People/Groups tab does not support group analytics
              - They need to wait 24 hours for groups to appear
            correct: 1
            explanation: >-
              A group needs at least one property to appear in the UI. Linking events alone is not enough to make it visible in the People/Groups view.
          - id: gotcha-p5
            type: scenario
            question: >-
              A customer linked events to a 'company' group type and can filter insights by company. But when they go to People > Groups, the company list is empty. What is the most likely cause?
            options:
              - Group analytics is not enabled on their plan
              - They linked events to groups but never called group_identify or set any group properties
              - Groups only appear after 24 hours
              - The People tab does not support groups
            correct: 1
            explanation: >-
              A group needs at least one property to appear in the People/Groups view. Linking events alone creates the group association in the data model but does not populate the group profile.
              The fix is to call group_identify or pass properties in the group() call.
      - id: limits-and-feature-constraints
        instruction: >-
          The second set of gotchas is product limits. Projects support at most 5 group types, so the customer must model carefully. Some product surfaces also do not support groups directly. That
          means a workable group model can still fail if the team assumes every other feature in PostHog understands groups the same way.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/product-analytics/group-analytics
            title: Group analytics limits and support
            description: Keep this handy when validating whether a specific PostHog surface supports groups the way the customer expects.
        problems:
          - id: gotcha-p3
            type: scenario
            question: 'A customer wants to set up 7 different group types: company, team, department, project, workspace, region, and vertical. What constraint will they hit?'
            options:
              - No constraint — PostHog supports unlimited group types
              - PostHog allows a maximum of 5 group types per project
              - Each group type requires a separate PostHog project
              - Group types must be approved by PostHog support
            correct: 1
            explanation: >-
              If you picked unlimited, you were reasoning from the business model instead of the product constraint. PostHog caps projects at 5 group types, so the customer must prioritize the most
              valuable rollups.
          - id: gotcha-p4
            type: true_false
            question: You can target groups directly with PostHog's early access feature management.
            correct: 'false'
            explanation: Early access feature management does not support groups directly, so teams need to verify feature support instead of assuming every group-aware surface works the same way.
          - id: gotcha-p6
            type: multiple_choice
            question: >-
              A customer wants to use groups in PostHog Session Replay to filter recordings by company. Before recommending this, what should you verify first?
            options:
              - That the customer has more than 5 group types configured
              - Whether Session Replay supports group-level filtering, since not all PostHog surfaces support groups equally
              - That the customer is on the free plan
              - That the customer has disabled person profiles
            correct: 1
            explanation: >-
              Not every PostHog product surface supports groups the same way. Before recommending group-based filtering in a specific feature, verify that the feature actually supports it. A
              workable group model can still fail if the team assumes every surface understands groups identically.
    section: group-analytics

  # ============================================================
  # Section: posthog-cdp
  # ============================================================
  - id: ph-cdp-overview
    name: PostHog CDP — Sources, Transformations, Destinations
    difficulty: 4
    estimatedMinutes: 16
    tags:
      - posthog
      - cdp
    sourceRef: https://posthog.com/docs/cdp
    prerequisites:
      - data-pipelines:transformation-etl-elt
    encompassing:
      - concept: data-pipelines:transformation-etl-elt
        weight: 0.4
    knowledgePoints:
      - id: three-pieces
        instruction: >-
          PostHog's CDP breaks into three surfaces. Sources bring external data into PostHog's warehouse. Transformations modify events during ingestion. Destinations send data out of PostHog to
          other tools. The important idea is that these surfaces map to different moments in the data flow: import, modify, export.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/cdp
            title: PostHog CDP docs
            description: Best reference when a conversation spans imports, in-flight changes, and downstream delivery.
        problems:
          - id: cdp-p1
            type: matching
            question: Match each PostHog CDP component to its function.
            options:
              - Sources|Import external data into PostHog's data warehouse
              - Transformations|Modify events in-flight during ingestion
              - Destinations|Export PostHog data to other tools
              - Batch exports|Scheduled dumps to data warehouses like BigQuery
            correct: 0,1,2,3
            explanation: Sources bring external data in. Transformations modify events during ingestion. Destinations send data out. Batch exports are one destination type.
          - id: cdp-p2
            type: multiple_choice
            question: A customer wants to remove email addresses from all event properties before they are stored in PostHog. Which CDP component should they use?
            options:
              - Sources
              - Transformations
              - Batch exports
              - Cohorts
            correct: 1
            explanation: >-
              Transformations modify events in-flight during ingestion, which is where PII scrubbing belongs. If you chose Source or Destination, you placed the fix on the wrong side of storage.
          - id: cdp-p5
            type: true_false
            question: PostHog CDP Transformations can modify events after they have already been stored in ClickHouse.
            correct: 'false'
            explanation: >-
              Transformations modify events in-flight during ingestion, before they reach storage. Once events are stored in ClickHouse, they are immutable. If you answered true, the likely
              confusion is between in-flight transformation and post-storage editing.
      - id: choosing-the-cdp-surface
        instruction: >-
          The practical skill is choosing the right surface for the job. If the customer wants extra data available inside PostHog, think Sources. If they need to change incoming events before
          storage, think Transformations. If they need PostHog data to leave for another system, think Destinations.
        workedExample: >-
          A TAM helps a customer bring Stripe billing data into PostHog, strip email addresses from signup events before storage, and then export cleaned usage data to BigQuery every night. That one
          workflow touches all three CDP surfaces in sequence: import, modify, export.
        problems:
          - id: cdp-p3
            type: true_false
            question: PostHog CDP Sources allow you to query external data (like Stripe or Hubspot) alongside PostHog event data.
            correct: 'true'
            explanation: >-
              Sources are the import surface. If you answered false, you likely mixed them up with destinations, which move PostHog data out to other tools.
          - id: cdp-p4
            type: scenario
            question: A customer wants Stripe subscription data available inside PostHog so they can join it with product usage in SQL. Which CDP surface is the best fit?
            options:
              - Source
              - Transformation
              - Realtime destination
              - Cohort
            correct: 0
            explanation: >-
              If the goal is to bring external data into PostHog for analysis, the right surface is a Source. Choosing Transformation or Destination would confuse "bring data in" with "modify data"
              or "send data out."
          - id: cdp-p6
            type: scenario
            question: >-
              A customer workflow requires three things: import Stripe billing data into PostHog, strip PII from incoming events before storage, and send cleaned usage data to BigQuery nightly. How
              many CDP surfaces does this touch?
            options:
              - One — Destinations handles all three
              - Two — Sources and Destinations
              - Three — Sources (import), Transformations (PII stripping), and Destinations (BigQuery export)
              - None — this requires custom code outside PostHog
            correct: 2
            explanation: >-
              Each step maps to a different CDP surface. Sources bring Stripe data in. Transformations strip PII during ingestion. Destinations export cleaned data to BigQuery. This is a real-world
              example of all three surfaces working together in sequence.
    section: posthog-cdp
  - id: ph-destinations-exports
    name: Destinations & Batch Exports
    difficulty: 4
    estimatedMinutes: 15
    tags:
      - posthog
      - cdp
    sourceRef: https://posthog.com/docs/cdp/batch-exports
    prerequisites:
      - ph-cdp-overview
    encompassing:
      - concept: ph-cdp-overview
        weight: 0.55
    knowledgePoints:
      - id: realtime-vs-batch
        instruction: >-
          PostHog destinations come in two broad forms. Realtime destinations push matching events out immediately. Batch exports send data out on a schedule in bulk. Realtime is for triggers and
          alerts. Batch is for warehouses, archives, and downstream modeling at scale.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/cdp/batch-exports
            title: Batch exports docs
            description: Good reference when learners need concrete examples of realtime versus scheduled export patterns.
        problems:
          - id: dest-p1
            type: multiple_choice
            question: When should a customer use a realtime destination instead of a batch export?
            options:
              - When they need to export millions of events to a data warehouse daily
              - When they need immediate notifications or triggers based on specific events
              - When they want to reduce PostHog costs
              - When they need to import data into PostHog
            correct: 1
            explanation: Realtime destinations are for immediate, event-driven actions. Batch exports are for scheduled bulk movement to other systems.
          - id: dest-p2
            type: matching
            question: Match each export type to its best use case.
            options:
              - Realtime destination|Slack alert when a VIP user churns
              - Batch export to BigQuery|Nightly sync of all events for cross-platform analysis
              - Batch export to S3|Archive raw event data for compliance
              - Realtime webhook|Trigger a workflow in another tool when a signup event fires
            correct: 0,1,2,3
            explanation: Realtime destinations handle immediate triggers. Batch exports handle scheduled bulk movement for analytics and archival.
          - id: dest-p5
            type: true_false
            question: Batch exports are the right choice when a customer needs sub-second delivery of every event to an external system.
            correct: 'false'
            explanation: >-
              Batch exports run on a schedule (hourly, daily) and send data in bulk. For sub-second delivery, a realtime destination is the right choice. Batch is for warehouses and archives where
              freshness of minutes to hours is acceptable.
      - id: operating-exports
        instruction: >-
          The second decision is operational: filtering, testing, and monitoring. Realtime flows should send only the events that matter. Batch exports should be tested before scheduling and monitored
          once live. The wrong export type is usually expensive or noisy, but the unmonitored export is worse because it quietly fails.
        workedExample: >-
          A customer wants a Slack alert whenever an enterprise account churns and a nightly Snowflake sync of all events for BI reporting. The correct design uses both destination types together: a
          realtime destination for the alert and a batch export for the nightly warehouse sync.
        problems:
          - id: dest-p3
            type: scenario
            question: A customer needs all their PostHog event data in Snowflake for their data team to run custom SQL analysis. They need data updated daily, not in real-time. What should you recommend?
            options:
              - A realtime destination pushing every event to Snowflake
              - A batch export to Snowflake scheduled to run daily
              - Manually exporting CSV files from the PostHog UI
              - Using PostHog's HogQL instead of Snowflake
            correct: 1
            explanation: >-
              A batch export to Snowflake is the right fit: scheduled, bulk data transfer to a warehouse. Daily updates match the requirement.
          - id: dest-p4
            type: multiple_choice
            question: Which extra step most helps prevent a batch export from failing silently after launch?
            options:
              - Turning every batch export into a realtime destination
              - Monitoring export runs and logs after scheduling it
              - Removing all filters from the export
              - Replacing Snowflake with CSV downloads
            correct: 1
            explanation: >-
              Monitoring is what catches broken credentials, schema drift, and downstream delivery failures before the customer discovers missing data.
          - id: dest-p6
            type: scenario
            question: >-
              A customer wants both a Slack alert when a VIP customer churns and a nightly sync of all events to Snowflake. How many destination types do they need?
            options:
              - One — a single batch export can handle both
              - One — a single realtime destination can handle both
              - Two — a realtime destination for Slack alerts and a batch export for the Snowflake sync
              - None — PostHog does not support both at the same time
            correct: 2
            explanation: >-
              These are two different delivery patterns. The Slack alert needs immediate, event-driven delivery (realtime destination). The Snowflake sync needs scheduled bulk transfer (batch
              export). The right design uses both destination types together.
    section: posthog-cdp

  # ============================================================
  # Section: querying
  # ============================================================
  - id: cohorts
    name: Cohorts — Static and Dynamic User Groups
    difficulty: 4
    estimatedMinutes: 15
    tags:
      - posthog
      - querying
    sourceRef: https://posthog.com/docs/data/cohorts
    prerequisites:
      - ph-person-properties
      - ph-event-properties
    encompassing:
      - concept: ph-person-properties
        weight: 0.45
    knowledgePoints:
      - id: static-vs-dynamic
        instruction: >-
          A cohort is a saved group of persons you can reuse in analysis and targeting. Static cohorts are fixed lists. Dynamic cohorts recalculate based on criteria such as person properties,
          behavior, or lifecycle state. That makes dynamic cohorts great for living segments and static cohorts great for frozen snapshots.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/data/cohorts
            title: Cohorts docs
            description: Official reference for static cohorts, dynamic cohorts, and operational recalc behavior.
        problems:
          - id: cohort-p1
            type: multiple_choice
            question: What is the key difference between static and dynamic cohorts in PostHog?
            options:
              - Static cohorts are faster to query
              - Static cohorts have fixed membership; dynamic cohorts automatically update based on criteria
              - Static cohorts support more filter types
              - Dynamic cohorts are only available on paid plans
            correct: 1
            explanation: >-
              Static cohorts are fixed lists, while dynamic cohorts recalculate membership based on criteria. If you chose another option, the likely mistake was focusing on performance or plan limits
              instead of membership behavior.
          - id: cohort-p4
            type: multiple_choice
            question: How often do dynamic cohorts in PostHog recalculate their membership?
            options:
              - In real-time, on every event
              - Every hour
              - Approximately every 24 hours
              - Only when manually triggered
            correct: 2
            explanation: >-
              Dynamic cohorts update on a schedule, not on every event. If you expected instant membership changes, that is the operational assumption to correct.
          - id: cohort-p5
            type: scenario
            question: >-
              A customer wants to freeze the list of users who were active in January for a one-time promotion. They do not want the list to change as new users become active. Which cohort type
              should they use?
            options:
              - Dynamic cohort — it will automatically keep January users
              - Static cohort — a fixed list that does not change after creation
              - A feature flag instead of a cohort
              - A HogQL query saved as a view
            correct: 1
            explanation: >-
              A static cohort is a frozen snapshot of users. Once created, it does not change. A dynamic cohort would keep recalculating and might include or exclude users as their behavior changes.
              For a one-time promotion tied to a specific historical window, static is the right choice.
      - id: cohorts-for-analysis-vs-rollout
        instruction: >-
          The common trap is assuming every cohort that is valid for analysis is also valid for feature-flag targeting. It is not. Behavioral and lifecycle dynamic cohorts are great for analysis, but
          feature flags only support dynamic cohorts based on person properties. If you need a rollout based on recent behavior, create the behavioral cohort for analysis and then snapshot it into a
          static cohort for targeting.
        workedExample: >-
          A product team wants to analyze users who completed onboarding in the last 7 days and also roll out a feature to that same set. The dynamic behavioral cohort works for analysis. The rollout
          needs a static snapshot because feature flags cannot target dynamic behavioral cohorts directly.
        problems:
          - id: cohort-p2
            type: true_false
            question: You can target a feature flag using a dynamic cohort based on behavioral criteria (e.g., 'performed login in last 7 days').
            correct: 'false'
            explanation: >-
              This is the common trap: a dynamic behavioral cohort works for analysis but not for feature-flag rollout. Flag targeting only supports dynamic cohorts based on person properties.
          - id: cohort-p3
            type: scenario
            question: >-
              A customer wants to roll out a feature flag to all users who completed onboarding in the last 30 days. They create a dynamic cohort with behavioral criteria 'performed
              onboarding_complete in last 30 days.' They try to use it in a feature flag but it does not work. Why?
            options:
              - The cohort has too many members
              - Feature flags cannot target dynamic cohorts with behavioral criteria — only person property criteria
              - The event name 'onboarding_complete' is invalid
              - Feature flags do not support cohort targeting at all
            correct: 1
            explanation: >-
              Feature flags only support dynamic cohorts based on person properties. The workaround is to snapshot the behavioral cohort into a static cohort for targeting.
          - id: cohort-p6
            type: multiple_choice
            question: >-
              A product team creates a dynamic cohort defined as 'users who performed purchase in last 7 days.' They want to use it for both a trends insight and a feature flag rollout. What will
              happen?
            options:
              - Both uses work perfectly
              - The trends insight works, but the feature flag will not accept a behavioral dynamic cohort — only person-property-based dynamic cohorts
              - Neither use works because dynamic cohorts are only for email targeting
              - The feature flag works but the trends insight does not
            correct: 1
            explanation: >-
              Behavioral dynamic cohorts work in analysis (trends, funnels) but feature flags only support dynamic cohorts based on person properties. The workaround for rollout is to snapshot the
              behavioral cohort into a static cohort and target the flag at that.
    section: querying
  - id: hogql-basics
    name: HogQL — SQL in PostHog
    difficulty: 5
    estimatedMinutes: 16
    tags:
      - posthog
      - querying
    sourceRef: https://posthog.com/docs/sql
    prerequisites:
      - ph-events
      - ph-event-properties
      - ph-persons
    encompassing:
      - concept: ph-events
        weight: 0.35
      - concept: ph-event-properties
        weight: 0.45
      - concept: ph-persons
        weight: 0.3
    knowledgePoints:
      - id: sql-expressions-and-insights
        instruction: >-
          HogQL shows up in two forms inside PostHog. SQL expressions are short snippets used inside existing UI builders. SQL insights are full queries with SELECT, FROM, WHERE, GROUP BY, ORDER BY,
          and JOIN. Both are built on PostHog's SQL layer, but they solve different levels of problem.
        instructionContent:
          - type: link
            url: https://posthog.com/docs/sql
            title: HogQL docs
            description: Keep this handy when moving from the insight builder to direct SQL.
        problems:
          - id: hogql-p1
            type: multiple_choice
            question: In PostHog, what are the two ways HogQL can be used?
            options:
              - As a programming language and a database engine
              - As SQL expressions within UI builders and as full SQL insights
              - As a frontend framework and a backend API
              - As a data import tool and a data export tool
            correct: 1
            explanation: HogQL appears as short SQL expressions inside UI builders and as full SQL insights when you need complete query control.
          - id: hogql-p2
            type: true_false
            question: HogQL should be the first tool you reach for when creating PostHog insights.
            correct: 'false'
            explanation: >-
              If you reached for HogQL first, you skipped the simpler tool. Start with the UI builder and drop to HogQL only when the query shape, joins, or custom logic truly require it.
          - id: hogql-p5
            type: scenario
            question: >-
              A customer wants to add a custom column to a PostHog Trends breakdown that concatenates browser and OS into a single label (e.g., 'Chrome / Mac OS X'). They do not need a full SQL query.
              Which HogQL form should they use?
            options:
              - A full SQL insight with SELECT, FROM, and GROUP BY
              - A HogQL expression inside the existing Trends UI builder
              - An action with a custom event name
              - A person property combining browser and OS
            correct: 1
            explanation: >-
              For small, targeted customizations within the existing UI, a HogQL expression is the right tool. You can write concat(properties.$browser, ' / ', properties.$os) directly in the
              breakdown field. A full SQL insight would be overkill for this use case.
      - id: when-to-use-hogql
        instruction: >-
          HogQL earns its complexity when the UI builder runs out of room. If you need custom bucketing logic, joins to persons or warehouse tables, or a query shape the insight builder cannot
          express, HogQL becomes the right tool. The best practice is still the same: begin simple, then drop to SQL only when the extra flexibility is justified.
        workedExample: >-
          A customer wants to group browser values into custom families and join the result to person properties. A standard trend may get part of the way there, but the join and custom bucketing are
          the signal that HogQL is now the better fit.
        problems:
          - id: hogql-p3
            type: multiple_choice
            question: In HogQL, which table do you query to access all captured events in PostHog?
            options:
              - persons
              - events
              - sessions
              - groups
            correct: 1
            explanation: >-
              If you chose `persons` or `sessions`, you mixed up supporting tables with the main event log. `events` is the base table for captured event records.
          - id: hogql-p4
            type: scenario
            question: >-
              A customer needs to join product events to person properties and a warehouse table with billing data, and the insight builder cannot express the full logic. What is the best next step?
            options:
              - Keep forcing the Trends UI to do it
              - Use HogQL in a SQL insight
              - Create an action and hope it is enough
              - Export the data manually as CSV first
            correct: 1
            explanation: >-
              This is the kind of case where HogQL earns its complexity. Once you need joins and custom query structure beyond the UI, a SQL insight is the right tool.
          - id: hogql-p6
            type: true_false
            question: HogQL queries in PostHog can join the events table to external data warehouse tables that have been connected via Sources.
            correct: 'true'
            explanation: >-
              HogQL supports joins to warehouse tables, which is one of its key advantages over the UI builder. Once external data (like Stripe billing) is connected via Sources, you can join
              it to event data in a SQL insight. This is the kind of use case where HogQL earns its complexity.
    section: querying

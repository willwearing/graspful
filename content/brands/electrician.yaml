      answer: "All content is based on the 2023 NEC edition. We update when new editions are adopted."
    - question: "Can I study on the jobsite?"
      answer: "Yes -- that is exactly the point. Audio plays through your earbuds while you work. No screen needed."
    - question: "How long until I am ready?"
      answer: "Most students feel exam-ready after 4-6 weeks of daily 30-minute sessions. The adaptive engine adjusts to your pace."

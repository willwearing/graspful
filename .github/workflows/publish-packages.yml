name: Publish packages to npm

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cli
          - mcp
      dry_run:
        description: 'Dry run (no actual publish)'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'
      - 'cli@*'
      - 'mcp@*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Determine target
        id: target
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          INPUT="${{ github.event.inputs.package }}"
          if [ -n "$INPUT" ]; then
            echo "target=$INPUT" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == cli@* ]]; then
            echo "target=cli" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == mcp@* ]]; then
            echo "target=mcp" >> "$GITHUB_OUTPUT"
          else
            echo "target=all" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish @graspful/shared
        run: cd packages/shared && bun run build

      - name: Publish @graspful/shared
        if: github.event.inputs.dry_run != 'true'
        run: cd packages/shared && bun publish --access public || echo "shared already published at this version"
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build CLI
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'cli'
        run: cd packages/cli && bun run build

      - name: Build MCP
        if: steps.target.outputs.target == 'all' || steps.target.outputs.target == 'mcp'
        run: cd packages/mcp && bun run build

      - name: Publish @graspful/cli
        if: (steps.target.outputs.target == 'all' || steps.target.outputs.target == 'cli') && github.event.inputs.dry_run != 'true'
        run: cd packages/cli && bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @graspful/mcp
        if: (steps.target.outputs.target == 'all' || steps.target.outputs.target == 'mcp') && github.event.inputs.dry_run != 'true'
        run: cd packages/mcp && bun publish --access public
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Dry run — CLI
        if: (steps.target.outputs.target == 'all' || steps.target.outputs.target == 'cli') && github.event.inputs.dry_run == 'true'
        run: cd packages/cli && bun publish --access public --dry-run

      - name: Dry run — MCP
        if: (steps.target.outputs.target == 'all' || steps.target.outputs.target == 'mcp') && github.event.inputs.dry_run == 'true'
        run: cd packages/mcp && bun publish --access public --dry-run
